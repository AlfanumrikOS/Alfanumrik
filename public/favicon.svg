<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Teal gradient for left pencil + flask -->
    <linearGradient id="tealG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8DD8C8"/>
      <stop offset="50%" stop-color="#6CC4B0"/>
      <stop offset="100%" stop-color="#4DB09C"/>
    </linearGradient>
    <!-- Orange gradient for right pencil -->
    <linearGradient id="orangeG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5B840"/>
      <stop offset="60%" stop-color="#F0A030"/>
      <stop offset="100%" stop-color="#E88820"/>
    </linearGradient>
    <!-- Lighter teal for flask body -->
    <linearGradient id="flaskG" x1="0%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#A8E6D8" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#7ECFC0" stop-opacity="0.7"/>
    </linearGradient>
  </defs>

  <!-- FLASK / BEAKER (behind pencils, bottom-left) -->
  <path d="
    M 148 260
    C 130 280, 120 320, 140 360
    C 155 390, 200 410, 240 400
    C 265 394, 275 370, 268 340
    C 260 310, 230 280, 200 260
    Z
  " fill="url(#flaskG)"/>
  <!-- Flask liquid line -->
  <path d="
    M 155 330
    C 170 318, 210 312, 250 340
  " fill="none" stroke="#B8E8DC" stroke-width="3" opacity="0.6"/>

  <!-- LEFT PENCIL (teal, going up-left) -->
  <rect x="-24" y="-130" width="48" height="220" rx="24" fill="url(#tealG)"
    transform="translate(220, 300) rotate(-55)"/>
  <!-- Left pencil hole -->
  <circle cx="148" cy="198" r="9" fill="#FBF8F4" opacity="0.8"/>

  <!-- RIGHT PENCIL (orange, going up-right) — overlaps on top -->
  <rect x="-24" y="-140" width="48" height="240" rx="24" fill="url(#orangeG)"
    transform="translate(290, 290) rotate(55)"/>
  <!-- Right pencil hole -->
  <circle cx="318" cy="155" r="9" fill="#FBF8F4" opacity="0.9"/>

  <!-- Small teal circle accent (bottom right of flask) -->
  <circle cx="280" cy="388" r="12" fill="#8DD8C8" opacity="0.5"/>
</svg>
