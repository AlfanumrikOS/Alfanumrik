<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="teal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7ECFC0"/>
      <stop offset="100%" style="stop-color:#5BB8A6"/>
    </linearGradient>
    <linearGradient id="orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5A623"/>
      <stop offset="100%" style="stop-color:#E8881C"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <rect width="512" height="512" rx="112" fill="#FBF8F4"/>
  <!-- Teal pencil/bar (left leg of A) -->
  <g transform="translate(256,256)">
    <rect x="-120" y="-60" width="180" height="48" rx="24" fill="url(#teal)" transform="rotate(-60)"/>
    <!-- Teal pencil tip circle -->
    <circle cx="-90" cy="90" r="10" fill="#A8DDD0" opacity="0.7"/>
  </g>
  <!-- Orange pencil/bar (right leg of A) -->
  <g transform="translate(256,256)">
    <rect x="-60" y="-60" width="200" height="48" rx="24" fill="url(#orange)" transform="rotate(60)"/>
    <!-- Orange pencil hole circle -->
    <circle cx="30" cy="-80" r="8" fill="#FBF8F4"/>
  </g>
  <!-- Teal flask shape at bottom left -->
  <g transform="translate(256,256)">
    <path d="M -100 20 Q -110 80, -50 90 Q -10 95, -20 50 Z" fill="url(#teal)" opacity="0.5"/>
  </g>
</svg>
