name: Production Cron Runner - Alfanumrik

# Phase 0: Vercel is the sole scheduler. This manual break-glass path remains
# disabled until its protected environment has required reviewers.
on:
  workflow_dispatch:
    inputs:
      job_path:
        description: 'Exactly one allowlisted production cron route'
        type: choice
        required: true
        options:
          - /api/cron/school-operations
          - /api/cron/daily-cron
          - /api/cron/irt-calibrate
          - /api/cron/reconcile-payments
          - /api/cron/payments-health
          - /api/cron/expired-subscriptions
          - /api/cron/account-purge
          - /api/cron/pre-debit-notice
          - /api/cron/board-score
          - /api/cron/reverify-domains
          - /api/cron/foxy-quality-sample
          - /api/internal/cron/fix-failed-questions
          - /api/cron/streak-guardian
          - /api/cron/flag-posture-canary
          - /api/cron/adaptive-loops-monitor
          - /api/cron/synthesis-delivery-monitor
          - /api/cron/synthesis-quality-sample
      reason:
        description: 'Incident/change reference and reason'
        type: string
        required: true
      confirmation:
        description: 'Type RUN_ONE_PRODUCTION_CRON exactly'
        type: string
        required: true

concurrency:
  group: production-cron-runner
  cancel-in-progress: false

permissions:
  contents: read

env:
  NODE_VERSION: '22'
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-south-1' }}
  # Security boundary: never send CRON_SECRET to a mutable repository variable.
  TARGET_URL: 'https://alfanumrik.com'
  CRON_SECRET_AWS_SECRET_ID: ${{ vars.CRON_SECRET_AWS_SECRET_ID || 'alfa-prod/app' }}

jobs:
  gate:
    name: Authorize Production Cron Break-Glass
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions: {}
    steps:
      - name: Fail closed unless controls are active
        env:
          ENABLED: ${{ vars.ENABLE_PRODUCTION_CRON_BREAK_GLASS }}
          JOB_PATH: ${{ inputs.job_path }}
          REASON: ${{ inputs.reason }}
          CONFIRMATION: ${{ inputs.confirmation }}
        run: |
          if [ "$ENABLED" != "true" ]; then
            echo "::error::Break-glass is disabled until production-break-glass has required reviewers."
            exit 1
          fi
          if [ "$GITHUB_REF" != "refs/heads/main" ]; then
            echo "::error::Break-glass may run only from main."
            exit 1
          fi
          if [ "$CONFIRMATION" != "RUN_ONE_PRODUCTION_CRON" ]; then
            echo "::error::Confirmation must exactly match RUN_ONE_PRODUCTION_CRON."
            exit 1
          fi
          if [ -z "${REASON//[[:space:]]/}" ]; then
            echo "::error::A non-empty incident/change reason is required."
            exit 1
          fi
          case "$JOB_PATH" in
            /api/cron/school-operations|/api/cron/daily-cron|/api/cron/irt-calibrate|/api/cron/reconcile-payments|/api/cron/payments-health|/api/cron/expired-subscriptions|/api/cron/account-purge|/api/cron/pre-debit-notice|/api/cron/board-score|/api/cron/reverify-domains|/api/cron/foxy-quality-sample|/api/internal/cron/fix-failed-questions|/api/cron/streak-guardian|/api/cron/flag-posture-canary|/api/cron/adaptive-loops-monitor|/api/cron/synthesis-delivery-monitor|/api/cron/synthesis-quality-sample) ;;
            *) echo "::error::JOB_PATH is not one allowlisted production cron route."; exit 1 ;;
          esac
  run:
    name: Run One Production Cron
    runs-on: ubuntu-latest
    needs: gate
    environment: production-break-glass
    timeout-minutes: 90
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: alfa-github-cron-${{ github.run_id }}

      - name: Load CRON_SECRET from AWS Secrets Manager
        shell: bash
        run: |
          set -euo pipefail
          SECRET_ID="${CRON_SECRET_AWS_SECRET_ID:-alfa-prod/app}"
          SECRET_JSON="$(aws secretsmanager get-secret-value --secret-id "$SECRET_ID" --query SecretString --output text)"
          CRON_SECRET="$(SECRET_JSON="$SECRET_JSON" node - <<'NODE'
          const raw = process.env.SECRET_JSON || '';
          let parsed = raw;
          try {
            parsed = JSON.parse(raw);
          } catch {
            parsed = raw;
          }

          let value = '';
          if (parsed && typeof parsed === 'object' && !Array.isArray(parsed)) {
            value = parsed.CRON_SECRET || parsed.cron_secret || '';
          } else if (typeof parsed === 'string') {
            value = parsed;
          }

          process.stdout.write(String(value || '').trim());
          NODE
          )"

          if [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_SECRET was not found in AWS Secrets Manager secret $SECRET_ID"
            exit 1
          fi

          echo "::add-mask::$CRON_SECRET"
          {
            echo 'CRON_SECRET<<__CRON_SECRET__'
            printf '%s\n' "$CRON_SECRET"
            echo '__CRON_SECRET__'
          } >> "$GITHUB_ENV"
          echo "Loaded CRON_SECRET from AWS Secrets Manager secret: $SECRET_ID"

      - name: Run selected production crons
        env:
          JOB_PATH: ${{ inputs.job_path }}
          BREAK_GLASS_REASON: ${{ inputs.reason }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: node scripts/run-production-crons.mjs

      - name: Upload cron run summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-cron-runner-summary
          path: artifacts/production-cron-runner-summary.json
          if-no-files-found: ignore
          retention-days: 14
