name: Deploy Production — Alfanumrik

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_deploy_all_functions:
        description: 'Force-redeploy ALL active Edge Functions regardless of git diff'
        type: boolean
        default: false

concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  SUPABASE_CLI_VERSION: '2.109.1'
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  PRODUCTION_DOMAIN: 'https://alfanumrik.com'

jobs:
  # ── Step 0: Wait for CI to pass ──
  # Instead of re-running the FULL quality pipeline (lint + type-check +
  # test + build = ~15 min duplicate work), verify that the CI workflow
  # passed for this commit. CI already runs on push to main and is the
  # authoritative quality gate.
  #
  # For workflow_dispatch (manual triggers), CI may not have run, so the
  # build job below handles that case with its own build step.
  wait-for-ci:
    name: Verify CI passed
    runs-on: ubuntu-latest
    # Skip for manual triggers — no CI run to wait for.
    if: github.event_name == 'push'
    steps:
      - name: Wait for CI workflow to complete
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          # Poll for up to 20 minutes (CI typically takes 10-15 min)
          for i in $(seq 1 40); do
            STATUS=$(gh api "repos/$REPO/actions/runs?head_sha=$HEAD_SHA&event=push&per_page=20" \
              --jq '.workflow_runs[] | select(.name == "CI — Alfanumrik") | "\(.status) \(.conclusion)"' \
              2>/dev/null | head -1)

            if [ -z "$STATUS" ]; then
              echo "Attempt $i/40: CI workflow not found yet"
            else
              WF_STATUS=$(echo "$STATUS" | awk '{print $1}')
              WF_CONCLUSION=$(echo "$STATUS" | awk '{print $2}')

              if [ "$WF_STATUS" = "completed" ]; then
                if [ "$WF_CONCLUSION" = "success" ]; then
                  echo "CI passed"
                  exit 0
                else
                  echo "CI failed with conclusion: $WF_CONCLUSION. Fix CI before deploying."
                  exit 1
                fi
              fi
              echo "Attempt $i/40: CI still running (status: $WF_STATUS)"
            fi

            sleep 30
          done

          echo "Timed out waiting for CI workflow to complete."
          exit 1

  # ── Step 1: Pre-Deployment Checklist ──
  pre-deploy-checklist:
    name: Pre-Deployment Checklist
    runs-on: ubuntu-latest
    needs: wait-for-ci
    if: always() && (needs.wait-for-ci.result == 'success' || needs.wait-for-ci.result == 'skipped')
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 10

      - name: Check for pending migrations
        run: |
          echo "## Pre-Deployment Checklist" >> $GITHUB_STEP_SUMMARY
          MIGRATION_FILES=$(git diff --name-only HEAD~10..HEAD -- 'supabase/migrations/' 2>/dev/null || true)
          if [ -n "$MIGRATION_FILES" ]; then
            echo "### Migrations Detected" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$MIGRATION_FILES" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "**Ensure migrations have been applied to the production database before this deploy completes.**" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Migrations | None detected in recent commits |" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Check for destructive changes
        run: |
          DESTRUCTIVE=$(git diff HEAD~10..HEAD -- 'supabase/migrations/' 2>/dev/null | grep -iE '^\+.*(DROP TABLE|DROP COLUMN|TRUNCATE)' || true)
          if [ -n "$DESTRUCTIVE" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### DESTRUCTIVE CHANGES DETECTED" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$DESTRUCTIVE" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "**Verify these were approved and compensating migration exists.**" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Scan for secrets in diff
        run: |
          ADDED=$(git diff HEAD~1..HEAD 2>/dev/null | grep -E '^\+[^+]' || true)
          NON_COMMENT=$(echo "$ADDED" | grep -vE '^\+[[:space:]]*(//|#|\*|<!--)' || true)
          SECRETS_FOUND=$(echo "$NON_COMMENT" | grep -iE 'sk_live_[A-Za-z0-9]{24,}|rzp_live_[A-Za-z0-9]{14,}|eyJ[A-Za-z0-9_\-]{40,}\.[A-Za-z0-9_\-]{40,}|SERVICE_ROLE_KEY[[:space:]]*[=:][[:space:]]*[A-Za-z0-9._\-]{20,}' || true)
          if [ -n "$SECRETS_FOUND" ]; then
            echo "BLOCKED: Potential secrets in deployment diff."
            echo "$SECRETS_FOUND"
            exit 1
          fi
          echo "| Secret scan | Passed |" >> $GITHUB_STEP_SUMMARY

      - name: Verify environment requirements
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Environment" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Node version | ${{ env.NODE_VERSION }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | main |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${GITHUB_SHA:0:7}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Region | bom1 (Mumbai) |" >> $GITHUB_STEP_SUMMARY

  # ── Step 2: Apply Database Migrations ──
  migrations:
    name: Apply Database Migrations
    runs-on: ubuntu-latest
    needs: pre-deploy-checklist
    environment: production
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Detect migration changes
        id: migration-diff
        run: |
          MIGRATION_FILES=$(git diff --name-only HEAD~1 HEAD -- 'supabase/migrations/' || true)
          if [ -n "$MIGRATION_FILES" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "### Production migrations detected" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "$MIGRATION_FILES" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "| Production migrations | None in this push; skipped db push |" >> "$GITHUB_STEP_SUMMARY"
          fi

      - uses: supabase/setup-cli@v2
        if: steps.migration-diff.outputs.changed == 'true'
        with:
          version: ${{ env.SUPABASE_CLI_VERSION }}

      - name: Push migrations to production
        if: steps.migration-diff.outputs.changed == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} --password "$SUPABASE_DB_PASSWORD"
          supabase db push --linked --include-all

  # ── Step 3: Deploy to Vercel Production (optional CLI path) ──
  deploy:
    name: Deploy to Vercel Production
    runs-on: ubuntu-latest
    needs: [pre-deploy-checklist, migrations]
    environment: production
    if: ${{ vars.USE_CLI_DEPLOY == 'true' }}
    outputs:
      deploy-url: ${{ steps.deploy.outputs.deploy_url }}
      app-version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache node_modules
        id: cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Read package version
        id: version
        run: |
          VERSION=$(node --input-type=module -e "import{readFileSync}from'fs';process.stdout.write(JSON.parse(readFileSync('./apps/host/package.json','utf8')).version)")
          if [ -z "$VERSION" ] || [ "$VERSION" = "undefined" ]; then
            echo "::error::Could not resolve apps/host package version for production release"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      # Pin Vercel CLI to avoid unexpected breakage from @latest.
      - name: Install Vercel CLI
        run: npm install -g vercel@39

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Reject placeholder env values from Vercel
        run: |
          if [ -f .vercel/.env.production.local ]; then
            ENVFILE=.vercel/.env.production.local
          elif [ -f .vercel/.env.preview.local ]; then
            ENVFILE=.vercel/.env.preview.local
          else
            echo "::error::No Vercel env file found after 'vercel pull'"
            exit 1
          fi
          BAD=0
          if grep -q "placeholder.supabase.co" "$ENVFILE" 2>/dev/null; then
            echo "::error::Vercel project has placeholder NEXT_PUBLIC_SUPABASE_URL"
            BAD=1
          fi
          if grep -q "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.placeholder" "$ENVFILE" 2>/dev/null; then
            echo "::error::Vercel project has placeholder NEXT_PUBLIC_SUPABASE_ANON_KEY"
            BAD=1
          fi
          if [ "$BAD" = "1" ]; then
            echo "Refusing to build with placeholder Supabase credentials."
            exit 1
          fi

      - name: Build with Vercel
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          NODE_OPTIONS: --max-old-space-size=6144

      - name: Deploy to Vercel Production
        id: deploy
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "deploy_url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
          echo "Deployed to: $DEPLOY_URL"

  # ── Step 3a: Deploy Changed Edge Functions ──
  deploy-functions:
    name: Deploy Changed Edge Functions
    runs-on: ubuntu-latest
    needs: [pre-deploy-checklist, migrations]
    environment: production
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Detect changed Edge Functions
        id: changed
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'supabase/functions/' \
            | grep -vE '(_archive|_shared|__tests__)' \
            | awk -F/ 'NF>=3 {print $3}' | sort -u | grep -v '^$' || true)
          if git diff --name-only HEAD~1 HEAD -- 'supabase/functions/_shared/' | grep -q .; then
            CHANGED=$(ls -d supabase/functions/*/ | grep -vE '(_archive|_shared)' | xargs -n1 basename | sort -u)
            echo "_shared changed → deploying ALL active functions"
          fi
          if [ "${{ inputs.force_deploy_all_functions }}" = "true" ]; then
            CHANGED=$(ls -d supabase/functions/*/ | grep -vE '(_archive|_shared)' | xargs -n1 basename | sort -u)
            echo "force_deploy_all_functions=true → deploying ALL active functions"
          fi
          echo "Changed functions:"
          echo "$CHANGED"
          {
            echo 'functions<<EOF'
            echo "$CHANGED"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - uses: supabase/setup-cli@v2
        if: steps.changed.outputs.functions != ''
        with:
          version: ${{ env.SUPABASE_CLI_VERSION }}

      - name: Deploy each changed function
        if: steps.changed.outputs.functions != ''
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          while IFS= read -r fn; do
            [ -z "$fn" ] && continue
            echo "Deploying $fn"
            supabase functions deploy "$fn" --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} --no-verify-jwt
          done <<< "${{ steps.changed.outputs.functions }}"

  # ── Step 4: Health Check ──
  health-check:
    name: Post-Deploy Health Check
    runs-on: ubuntu-latest
    needs: [migrations, deploy-functions]
    steps:
      - name: Wait for deployment to stabilize
        # Reduced from 90s. Vercel deploys propagate within ~30s; the retry
        # loop handles slower propagation.
        run: sleep 30

      - name: Health check
        id: health
        env:
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          TARGET_URL="${PRODUCTION_DOMAIN}"
          echo "Checking: $TARGET_URL/api/v1/health"

          BYPASS_HEADER=()
          if [ -n "$VERCEL_AUTOMATION_BYPASS_SECRET" ]; then
            BYPASS_HEADER=(-H "x-vercel-protection-bypass: $VERCEL_AUTOMATION_BYPASS_SECRET")
            echo "Using Vercel automation bypass secret"
          else
            echo "::notice::VERCEL_AUTOMATION_BYPASS_SECRET not set — verification will fall back to soft-success on 429s."
          fi

          LAST_STATUS=""
          ALL_429=1
          for i in 1 2 3 4 5; do
            RESPONSE=$(curl -s -w "\n%{http_code}" \
              -A "Alfanumrik-CI-HealthCheck/1.0 (+https://alfanumrik.com; vercel-monitoring)" \
              -H "Accept: application/json" \
              -H "x-health-probe: github-actions" \
              "${BYPASS_HEADER[@]}" \
              "${TARGET_URL}/api/v1/health" 2>/dev/null)
            STATUS=$(echo "$RESPONSE" | tail -1)
            BODY=$(echo "$RESPONSE" | head -1)
            LAST_STATUS="$STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (attempt $i)"
              echo "$BODY" | head -c 500
              echo "all_429=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            if [ "$STATUS" != "429" ]; then
              ALL_429=0
            fi
            echo "Attempt $i/5 returned HTTP $STATUS"
            if [ "$STATUS" = "429" ]; then
              sleep 15
            else
              sleep 10
            fi
          done

          if [ "$ALL_429" = "1" ]; then
            echo "::warning::All 5 attempts returned HTTP 429 — Vercel Security Checkpoint. Soft-passing."
            echo "all_429=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "all_429=false" >> "$GITHUB_OUTPUT"
          echo "Health check failed after 5 attempts (last status: $LAST_STATUS)"
          exit 1

      - name: Auto-rollback on health check failure
        if: failure() && steps.health.outputs.all_429 != 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          echo "Health check failed — rolling back to previous deployment"
          npm install -g vercel@39
          PREV_URL=$(vercel ls --prod --token="$VERCEL_TOKEN" 2>/dev/null \
            | grep "Ready" | head -2 | tail -1 | awk '{print $2}')
          if [ -n "$PREV_URL" ]; then
            vercel promote "$PREV_URL" --token="$VERCEL_TOKEN" --yes
            echo "Rolled back to: $PREV_URL"
          else
            echo "WARNING: Could not find previous deployment to rollback to"
          fi

  # ── Step 5: Post-Deploy Verification ──
  post-deploy-verify:
    name: Post-Deploy Verification
    runs-on: ubuntu-latest
    needs: [health-check]
    steps:
      - name: Verify critical endpoints
        env:
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          TARGET_URL="${PRODUCTION_DOMAIN}"
          echo "## Post-Deploy Verification" >> $GITHUB_STEP_SUMMARY
          echo "Probed domain: \`$TARGET_URL\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Endpoint | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY

          BYPASS_HEADER=()
          if [ -n "$VERCEL_AUTOMATION_BYPASS_SECRET" ]; then
            BYPASS_HEADER=(-H "x-vercel-protection-bypass: $VERCEL_AUTOMATION_BYPASS_SECRET")
          fi

          REAL_FAIL=0
          BYPASS_BLOCKED=0
          PROBES=0

          check() {
            local label="$1"
            local path="$2"
            shift 2
            local accepted=("$@")
            PROBES=$((PROBES + 1))
            local status
            local curl_exit
            local headers_file
            local body_file
            headers_file=$(mktemp)
            body_file=$(mktemp)
            status=$(curl -sS -D "$headers_file" -o "$body_file" -w "%{http_code}" \
              -A "Alfanumrik-CI-PostDeploy/1.0 (+https://alfanumrik.com)" \
              "${BYPASS_HEADER[@]}" \
              "${TARGET_URL}${path}" 2>/dev/null)
            curl_exit=$?
            if [ "$curl_exit" -ne 0 ] && [ "$status" = "000" ]; then
              if grep -qiE 'Vercel Security Checkpoint|x-vercel-mitigated: challenge|x-vercel-challenge-token' "$headers_file" "$body_file" 2>/dev/null; then
                status="429"
              else
                echo "| $label | FAIL (curl-exit-$curl_exit) |" >> "$GITHUB_STEP_SUMMARY"
                REAL_FAIL=$((REAL_FAIL + 1))
                rm -f "$headers_file" "$body_file"
                return 1
              fi
            fi
            for code in "${accepted[@]}"; do
              if [ "$status" = "$code" ]; then
                echo "| $label | $status |" >> $GITHUB_STEP_SUMMARY
                rm -f "$headers_file" "$body_file"
                return 0
              fi
            done
            if [ "$status" = "429" ]; then
              echo "| $label | 429 (Vercel checkpoint) |" >> $GITHUB_STEP_SUMMARY
              BYPASS_BLOCKED=$((BYPASS_BLOCKED + 1))
              rm -f "$headers_file" "$body_file"
              return 0
            fi
            echo "| $label | FAIL ($status) |" >> $GITHUB_STEP_SUMMARY
            REAL_FAIL=$((REAL_FAIL + 1))
            rm -f "$headers_file" "$body_file"
            return 1
          }

          check "/api/v1/health" "/api/v1/health" "200"
          check "/ (homepage)"   "/"              "200" "307" "308"
          check "/login"         "/login"         "200" "307"

          if [ "$BYPASS_BLOCKED" -lt "$PROBES" ]; then
            HEADERS=$(curl -sI "${BYPASS_HEADER[@]}" "${TARGET_URL}/" 2>/dev/null)
            if echo "$HEADERS" | grep -qi "x-frame-options"; then
              echo "| Security headers | Present |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| Security headers | MISSING |" >> $GITHUB_STEP_SUMMARY
              REAL_FAIL=$((REAL_FAIL + 1))
            fi
          else
            echo "| Security headers | skipped (checkpoint engaged) |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "$REAL_FAIL" -gt 0 ]; then
            echo "Post-deploy verification found real failures."
            exit 1
          fi

          if [ "$BYPASS_BLOCKED" -gt 0 ] && [ "$BYPASS_BLOCKED" = "$PROBES" ]; then
            echo "::warning::All $PROBES probes returned HTTP 429. Soft-passing."
            exit 0
          fi

          echo "All post-deploy verifications passed."

  # ── Step 6: Release Tag & Summary ──
  release:
    name: Create Release & Summary
    runs-on: ubuntu-latest
    needs: [health-check, post-deploy-verify]
    if: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.health-check.result == 'success' && needs.post-deploy-verify.result == 'success' }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Read package version
        id: version
        run: |
          VERSION=$(node --input-type=module -e "import{readFileSync}from'fs';process.stdout.write(JSON.parse(readFileSync('./apps/host/package.json','utf8')).version)")
          if [ -z "$VERSION" ] || [ "$VERSION" = "undefined" ]; then
            echo "::error::Could not resolve apps/host package version for production release"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release tag
        uses: actions/github-script@v9
        with:
          script: |
            const version = '${{ steps.version.outputs.version }}';
            const sha = context.sha;
            const tagName = `v${version}`;
            const releaseName = `v${version}`;

            try {
              await github.rest.git.getRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `tags/${tagName}`,
              });

              const uniqueTag = `${tagName}+${sha.substring(0, 7)}`;
              console.log(`Tag ${tagName} already exists. Using ${uniqueTag} instead.`);

              await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: uniqueTag,
                target_commitish: sha,
                name: `${releaseName} (${sha.substring(0, 7)})`,
                body: [
                  `## Alfanumrik ${uniqueTag}`,
                  '',
                  `**Commit:** \`${sha}\``,
                  `**Deployed to:** ${process.env.PRODUCTION_DOMAIN}`,
                  '',
                  '_Automatically released by the production deploy workflow._',
                ].join('\n'),
                draft: false,
                prerelease: false,
              });
            } catch (e) {
              if (e.status === 404) {
                await github.rest.repos.createRelease({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  tag_name: tagName,
                  target_commitish: sha,
                  name: releaseName,
                  body: [
                    `## Alfanumrik ${tagName}`,
                    '',
                    `**Commit:** \`${sha}\``,
                    `**Deployed to:** ${process.env.PRODUCTION_DOMAIN}`,
                    '',
                    '_Automatically released by the production deploy workflow._',
                  ].join('\n'),
                  draft: false,
                  prerelease: false,
                });
              } else {
                throw e;
              }
            }

      - name: Post deployment summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Production Deployment Summary

          | Detail | Value |
          |--------|-------|
          | **Version** | \`v${{ steps.version.outputs.version }}\` |
          | **Commit** | \`${GITHUB_SHA:0:7}\` |
          | **Branch** | \`main\` |
          | **Deploy URL** | ${{ env.PRODUCTION_DOMAIN }} |
          | **Health Check** | Passed |
          | **Post-Deploy Verify** | Passed |
          | **Deployed at** | $(date -u '+%Y-%m-%d %H:%M:%S UTC') |

          Deployment triggered by push to \`main\`.
          EOF
