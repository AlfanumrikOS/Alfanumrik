name: Deploy Production — Alfanumrik

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  NEXT_PUBLIC_SUPABASE_URL: 'https://placeholder.supabase.co'
  NEXT_PUBLIC_SUPABASE_ANON_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.placeholder'
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  # ── Step 1: Full Quality Pipeline ──
  quality:
    name: Lint, Type-check & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Run tests
        run: npm test -- --reporter=verbose

      - name: Build
        run: npm run build

  # ── Step 1b: Pre-Deployment Checklist ──
  pre-deploy-checklist:
    name: Pre-Deployment Checklist
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 10

      - name: Check for pending migrations
        run: |
          echo "## Pre-Deployment Checklist" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Check if any migrations were added in the last 10 commits
          MIGRATION_FILES=$(git diff --name-only HEAD~10..HEAD -- 'supabase/migrations/' 2>/dev/null || true)
          if [ -n "$MIGRATION_FILES" ]; then
            echo "### Migrations Detected" >> $GITHUB_STEP_SUMMARY
            echo "The following migrations are included in this deploy:" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$MIGRATION_FILES" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "**Ensure migrations have been applied to the production database before this deploy completes.**" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Migrations | None detected in recent commits |" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Check for destructive changes
        run: |
          # Scan recent commits for DROP TABLE/COLUMN in migrations
          DESTRUCTIVE=$(git diff HEAD~10..HEAD -- 'supabase/migrations/' 2>/dev/null | grep -iE '^\+.*(DROP TABLE|DROP COLUMN|TRUNCATE)' || true)
          if [ -n "$DESTRUCTIVE" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### DESTRUCTIVE CHANGES DETECTED" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$DESTRUCTIVE" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "**Verify these were approved and compensating migration exists.**" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Scan for secrets in diff
        run: |
          # Final secret scan on what is being deployed
          SECRETS_FOUND=$(git diff HEAD~1..HEAD 2>/dev/null | grep -iE '^\+.*(sk_live_|rzp_live_|service_role.*eyJ|NEXT_PUBLIC_.*SERVICE_ROLE)' || true)
          if [ -n "$SECRETS_FOUND" ]; then
            echo ""
            echo "BLOCKED: Potential secrets in deployment diff."
            echo "$SECRETS_FOUND"
            exit 1
          fi
          echo "| Secret scan | Passed |" >> $GITHUB_STEP_SUMMARY

      - name: Verify environment requirements
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Environment" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Node version | ${{ env.NODE_VERSION }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | main |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${GITHUB_SHA:0:7}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Region | bom1 (Mumbai) |" >> $GITHUB_STEP_SUMMARY

  # ── Step 2: Deploy to Vercel Production (requires approval) ──
  deploy:
    name: Deploy to Vercel Production
    runs-on: ubuntu-latest
    needs: [quality, pre-deploy-checklist]
    environment: production
    outputs:
      deploy-url: ${{ steps.deploy.outputs.deploy_url }}
      app-version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Read package version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Package version: $VERSION"

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build with Vercel
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel Production
        id: deploy
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "deploy_url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
          echo "Deployed to: $DEPLOY_URL"

  # ── Step 3: Health Check ──
  health-check:
    name: Post-Deploy Health Check
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Wait for deployment to stabilize
        run: sleep 60

      - name: Health check
        run: |
          DEPLOY_URL="${{ needs.deploy.outputs.deploy-url }}"
          echo "Checking: $DEPLOY_URL"

          for i in 1 2 3; do
            RESPONSE=$(curl -s -w "\n%{http_code}" \
              "${DEPLOY_URL}/api/v1/health" 2>/dev/null)
            STATUS=$(echo "$RESPONSE" | tail -1)
            BODY=$(echo "$RESPONSE" | head -1)
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (attempt $i)"
              echo "$BODY" | head -c 500
              exit 0
            fi
            echo "Attempt $i/3 returned HTTP $STATUS"
            sleep 15
          done
          echo "Health check failed after 3 attempts"
          exit 1

  # ── Step 3b: Post-Deploy Verification ──
  post-deploy-verify:
    name: Post-Deploy Verification
    runs-on: ubuntu-latest
    needs: [deploy, health-check]
    steps:
      - name: Verify critical endpoints
        run: |
          DEPLOY_URL="${{ needs.deploy.outputs.deploy-url }}"
          echo "## Post-Deploy Verification" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Endpoint | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY

          FAIL=0

          # Health API
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${DEPLOY_URL}/api/v1/health" 2>/dev/null)
          if [ "$STATUS" = "200" ]; then
            echo "| /api/v1/health | $STATUS |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| /api/v1/health | FAIL ($STATUS) |" >> $GITHUB_STEP_SUMMARY
            FAIL=1
          fi

          # Homepage loads
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${DEPLOY_URL}/" 2>/dev/null)
          if [ "$STATUS" = "200" ]; then
            echo "| / (homepage) | $STATUS |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| / (homepage) | FAIL ($STATUS) |" >> $GITHUB_STEP_SUMMARY
            FAIL=1
          fi

          # Login page loads
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${DEPLOY_URL}/login" 2>/dev/null)
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "307" ]; then
            echo "| /login | $STATUS |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| /login | FAIL ($STATUS) |" >> $GITHUB_STEP_SUMMARY
            FAIL=1
          fi

          # Security headers check
          HEADERS=$(curl -sI "${DEPLOY_URL}/" 2>/dev/null)
          if echo "$HEADERS" | grep -qi "x-frame-options"; then
            echo "| Security headers | Present |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Security headers | MISSING |" >> $GITHUB_STEP_SUMMARY
            FAIL=1
          fi

          if [ "$FAIL" = "1" ]; then
            echo ""
            echo "Post-deploy verification found issues. Review the summary."
            echo "Rollback: Vercel Dashboard > Deployments > Promote previous deployment"
            exit 1
          else
            echo ""
            echo "All post-deploy verifications passed."
          fi

  # ── Step 4: Release Tag & Summary ──
  release:
    name: Create Release & Summary
    runs-on: ubuntu-latest
    needs: [deploy, health-check, post-deploy-verify]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub release tag
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ needs.deploy.outputs.app-version }}';
            const sha = context.sha;
            const tagName = `v${version}`;
            const releaseName = `v${version}`;

            // Check if tag already exists
            try {
              await github.rest.git.getRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `tags/${tagName}`,
              });

              // Tag exists — append short SHA to make it unique
              const uniqueTag = `${tagName}+${sha.substring(0, 7)}`;
              console.log(`Tag ${tagName} already exists. Using ${uniqueTag} instead.`);

              await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: uniqueTag,
                target_commitish: sha,
                name: `${releaseName} (${sha.substring(0, 7)})`,
                body: [
                  `## Alfanumrik ${uniqueTag}`,
                  '',
                  `**Commit:** \`${sha}\``,
                  `**Deployed to:** ${{ needs.deploy.outputs.deploy-url }}`,
                  '',
                  '_Automatically released by the production deploy workflow._',
                ].join('\n'),
                draft: false,
                prerelease: false,
              });
            } catch (e) {
              if (e.status === 404) {
                // Tag does not exist — create release normally
                await github.rest.repos.createRelease({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  tag_name: tagName,
                  target_commitish: sha,
                  name: releaseName,
                  body: [
                    `## Alfanumrik ${tagName}`,
                    '',
                    `**Commit:** \`${sha}\``,
                    `**Deployed to:** ${{ needs.deploy.outputs.deploy-url }}`,
                    '',
                    '_Automatically released by the production deploy workflow._',
                  ].join('\n'),
                  draft: false,
                  prerelease: false,
                });
              } else {
                throw e;
              }
            }

      - name: Post deployment summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Production Deployment Summary

          | Detail | Value |
          |--------|-------|
          | **Version** | \`v${{ needs.deploy.outputs.app-version }}\` |
          | **Commit** | \`${GITHUB_SHA:0:7}\` |
          | **Branch** | \`main\` |
          | **Deploy URL** | ${{ needs.deploy.outputs.deploy-url }} |
          | **Health Check** | Passed |
          | **Post-Deploy Verify** | Passed |
          | **Deployed at** | $(date -u '+%Y-%m-%d %H:%M:%S UTC') |

          Deployment triggered by push to \`main\`.
          EOF
