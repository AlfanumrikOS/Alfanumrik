name: Deploy Production — Alfanumrik

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  NODE_VERSION: '22'
  # Pin Supabase CLI in CI so production deploys do not depend on unauthenticated
  # GitHub release lookups for "latest", which can rate-limit before deploy.
  SUPABASE_CLI_VERSION: '2.109.1'
  # Rollback syntax and JSON inspection are policy-checked against this version.
  VERCEL_CLI_VERSION: '55.0.0'
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  # Canonical production domain — already aliased to the latest deployment after
  # `vercel deploy --prod`, and bypasses Vercel deployment-protection auth that
  # blocks the deployment-specific *.vercel.app URLs.
  PRODUCTION_DOMAIN: 'https://alfanumrik.com'

jobs:
  production-verification-gate:
    name: Prove Vercel Bypass Reaches App
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions: {}
    outputs:
      rollback_baseline_valid: ${{ steps.baseline.outputs.rollback_baseline_valid }}
      rollback_baseline_deployment_id: ${{ steps.baseline.outputs.rollback_baseline_deployment_id }}
      rollback_baseline_git_sha: ${{ steps.baseline.outputs.rollback_baseline_git_sha }}
      rollback_baseline_project_id: ${{ steps.baseline.outputs.rollback_baseline_project_id }}
      rollback_baseline_owner_id: ${{ steps.baseline.outputs.rollback_baseline_owner_id }}
    steps:
      - name: Resolve canonical deployment before preflight
        id: baseline-before
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          echo "identity_valid=false" >> "$GITHUB_OUTPUT"
          echo "deployment_id=" >> "$GITHUB_OUTPUT"
          echo "git_sha=" >> "$GITHUB_OUTPUT"
          echo "project_id=" >> "$GITHUB_OUTPUT"
          echo "owner_id=" >> "$GITHUB_OUTPUT"
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::warning::VERCEL_TOKEN is unavailable; automatic rollback baseline capture is disabled."
            exit 0
          fi
          CANONICAL_HOST="${PRODUCTION_DOMAIN#https://}"
          if [ "$CANONICAL_HOST" != "alfanumrik.com" ]; then
            echo "::warning::Canonical host is not the pinned production host; rollback baseline capture is disabled."
            exit 0
          fi
          DEPLOYMENT_FILE=$(mktemp)
          trap 'rm -f "$DEPLOYMENT_FILE"' EXIT
          if ! curl --fail --silent --show-error --max-time 15 \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Accept: application/json" \
            "https://api.vercel.com/v13/deployments/${CANONICAL_HOST}" \
            -o "$DEPLOYMENT_FILE"; then
            echo "::warning::Could not resolve the canonical Vercel deployment; automatic rollback is disabled."
            exit 0
          fi
          mapfile -t IDENTITY < <(node - "$DEPLOYMENT_FILE" "$GITHUB_REPOSITORY" <<'NODE'
          const fs = require('fs');
          try {
            const d = JSON.parse(fs.readFileSync(process.argv[2], 'utf8'));
            const [org, repo] = process.argv[3].split('/');
            const sha = d.gitSource?.sha || d.meta?.githubCommitSha || '';
            const valid = /^dpl_[A-Za-z0-9]+$/.test(d.id || '')
              && /^prj_[A-Za-z0-9]+$/.test(d.projectId || '')
              && /^(team|user)_[A-Za-z0-9]+$/.test(d.ownerId || '')
              && /^[0-9a-f]{40}$/.test(sha)
              && d.target === 'production'
              && d.readyState === 'READY'
              && d.gitSource?.type === 'github'
              && d.gitSource?.ref === 'main'
              && d.meta?.githubCommitOrg === org
              && d.meta?.githubCommitRepo === repo;
            console.log(valid ? 'true' : 'false');
            console.log(valid ? d.id : '');
            console.log(valid ? sha : '');
            console.log(valid ? d.projectId : '');
            console.log(valid ? d.ownerId : '');
          } catch {
            console.log('false\n\n\n\n');
          }
          NODE
          )
          if [ "${IDENTITY[0]:-false}" != "true" ]; then
            echo "::warning::Canonical deployment metadata is incomplete or unexpected; automatic rollback is disabled."
            exit 0
          fi
          echo "identity_valid=true" >> "$GITHUB_OUTPUT"
          echo "deployment_id=${IDENTITY[1]}" >> "$GITHUB_OUTPUT"
          echo "git_sha=${IDENTITY[2]}" >> "$GITHUB_OUTPUT"
          echo "project_id=${IDENTITY[3]}" >> "$GITHUB_OUTPUT"
          echo "owner_id=${IDENTITY[4]}" >> "$GITHUB_OUTPUT"

      - name: Prove semantic application health JSON
        id: preflight
        env:
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          echo "app_healthy=false" >> "$GITHUB_OUTPUT"
          echo "app_sha=" >> "$GITHUB_OUTPUT"
          echo "app_timestamp_fresh=false" >> "$GITHUB_OUTPUT"
          if [ -z "$VERCEL_AUTOMATION_BYPASS_SECRET" ]; then
            echo "::error::VERCEL_AUTOMATION_BYPASS_SECRET is required."
            exit 1
          fi
          TARGET_URL="${PRODUCTION_DOMAIN}/api/v1/health"
          set +e
          for attempt in 1 2 3; do
            BODY_FILE=$(mktemp)
            STATUS=$(curl -sS --max-time 10 -o "$BODY_FILE" -w "%{http_code}" \
              -H "Accept: application/json" \
              -H "x-health-probe: github-actions-pre-deploy" \
              -H "x-vercel-protection-bypass: $VERCEL_AUTOMATION_BYPASS_SECRET" \
              "$TARGET_URL" 2>/dev/null)
            CURL_EXIT=$?
            APP_RESPONSE=false
            if [ "$CURL_EXIT" = "0" ] && [ "$STATUS" = "200" ]; then
              APP_RESPONSE=$(node -e "const fs=require('fs');try{const b=JSON.parse(fs.readFileSync(process.argv[1],'utf8'));const known=['healthy','degraded','unhealthy'].includes(b.status);const valid=typeof b.ok==='boolean'&&known&&typeof b.timestamp==='string'&&b.timestamp.length>0&&typeof b.version?.git_sha==='string'&&b.version.git_sha.length>0;process.stdout.write(String(valid))}catch{process.stdout.write('false')}" "$BODY_FILE")
            fi
            if [ "$APP_RESPONSE" = "true" ]; then
              mapfile -t APP_IDENTITY < <(node - "$BODY_FILE" <<'NODE'
          const fs = require('fs');
          const b = JSON.parse(fs.readFileSync(process.argv[2], 'utf8'));
          const sha = b.version.git_sha;
          const timestamp = Date.parse(b.timestamp);
          console.log(b.ok === true && b.status === 'healthy' ? 'true' : 'false');
          console.log(/^[0-9a-f]{7,40}$/.test(sha) ? sha : '');
          console.log(Number.isFinite(timestamp) && Math.abs(Date.now() - timestamp) <= 300000 ? 'true' : 'false');
          NODE
              )
              rm -f "$BODY_FILE"
              echo "app_healthy=${APP_IDENTITY[0]:-false}" >> "$GITHUB_OUTPUT"
              echo "app_sha=${APP_IDENTITY[1]:-}" >> "$GITHUB_OUTPUT"
              echo "app_timestamp_fresh=${APP_IDENTITY[2]:-false}" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            rm -f "$BODY_FILE"
            if [ "$attempt" -lt 3 ]; then sleep 10; fi
          done
          echo "::error::Refusing production mutations: bypass did not reach semantic app health JSON."
          exit 1

      - name: Bind a known-good rollback baseline
        id: baseline
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          BEFORE_VALID: ${{ steps.baseline-before.outputs.identity_valid }}
          BEFORE_DEPLOYMENT_ID: ${{ steps.baseline-before.outputs.deployment_id }}
          BEFORE_GIT_SHA: ${{ steps.baseline-before.outputs.git_sha }}
          BEFORE_PROJECT_ID: ${{ steps.baseline-before.outputs.project_id }}
          BEFORE_OWNER_ID: ${{ steps.baseline-before.outputs.owner_id }}
          APP_HEALTHY: ${{ steps.preflight.outputs.app_healthy }}
          APP_SHA: ${{ steps.preflight.outputs.app_sha }}
          APP_TIMESTAMP_FRESH: ${{ steps.preflight.outputs.app_timestamp_fresh }}
        run: |
          echo "rollback_baseline_valid=false" >> "$GITHUB_OUTPUT"
          echo "rollback_baseline_deployment_id=" >> "$GITHUB_OUTPUT"
          echo "rollback_baseline_git_sha=" >> "$GITHUB_OUTPUT"
          echo "rollback_baseline_project_id=" >> "$GITHUB_OUTPUT"
          echo "rollback_baseline_owner_id=" >> "$GITHUB_OUTPUT"
          if [ "$BEFORE_VALID" != "true" ] || [ "$APP_HEALTHY" != "true" ] || [ "$APP_TIMESTAMP_FRESH" != "true" ] \
            || ! [[ "$APP_SHA" =~ ^[0-9a-f]{7,40}$ ]]; then
            echo "::warning::No fresh, semantically healthy pre-deploy identity was captured; automatic rollback is disabled."
            exit 0
          fi
          if [ "$BEFORE_GIT_SHA" = "$GITHUB_SHA" ] || [ "${BEFORE_GIT_SHA:0:${#APP_SHA}}" != "$APP_SHA" ]; then
            echo "::warning::Preflight app SHA is raced or is already the incoming release; automatic rollback is disabled."
            exit 0
          fi
          CANONICAL_HOST="${PRODUCTION_DOMAIN#https://}"
          DEPLOYMENT_FILE=$(mktemp)
          trap 'rm -f "$DEPLOYMENT_FILE"' EXIT
          if ! curl --fail --silent --show-error --max-time 15 \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Accept: application/json" \
            "https://api.vercel.com/v13/deployments/${CANONICAL_HOST}" \
            -o "$DEPLOYMENT_FILE"; then
            echo "::warning::Canonical deployment changed or became unreadable; automatic rollback is disabled."
            exit 0
          fi
          BOUND=$(node - "$DEPLOYMENT_FILE" "$GITHUB_REPOSITORY" "$BEFORE_DEPLOYMENT_ID" "$BEFORE_GIT_SHA" "$BEFORE_PROJECT_ID" "$BEFORE_OWNER_ID" <<'NODE'
          const fs = require('fs');
          try {
            const d = JSON.parse(fs.readFileSync(process.argv[2], 'utf8'));
            const [org, repo] = process.argv[3].split('/');
            const valid = d.id === process.argv[4]
              && (d.gitSource?.sha || d.meta?.githubCommitSha) === process.argv[5]
              && d.projectId === process.argv[6]
              && d.ownerId === process.argv[7]
              && d.target === 'production'
              && d.readyState === 'READY'
              && d.gitSource?.type === 'github'
              && d.gitSource?.ref === 'main'
              && d.meta?.githubCommitOrg === org
              && d.meta?.githubCommitRepo === repo;
            process.stdout.write(String(valid));
          } catch { process.stdout.write('false'); }
          NODE
          )
          if [ "$BOUND" != "true" ]; then
            echo "::warning::Canonical deployment identity changed during preflight; automatic rollback is disabled."
            exit 0
          fi
          echo "rollback_baseline_valid=true" >> "$GITHUB_OUTPUT"
          echo "rollback_baseline_deployment_id=$BEFORE_DEPLOYMENT_ID" >> "$GITHUB_OUTPUT"
          echo "rollback_baseline_git_sha=$BEFORE_GIT_SHA" >> "$GITHUB_OUTPUT"
          echo "rollback_baseline_project_id=$BEFORE_PROJECT_ID" >> "$GITHUB_OUTPUT"
          echo "rollback_baseline_owner_id=$BEFORE_OWNER_ID" >> "$GITHUB_OUTPUT"

  # ── Step 1: Full Quality Pipeline ──
  quality:
    name: Lint, Type-check & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check
        env:
          NODE_OPTIONS: --max-old-space-size=6144

      - name: Run tests
        run: npm test -- --reporter=verbose

      # Bump Node heap to 6 GB. The project's bundle outgrew Node 22's default
      # ~2 GB and crashes with SIGABRT during `next build` (`Next.js build
      # worker exited with code: null and signal: SIGABRT`). #818 fixed this
      # in ci.yml but missed this and deploy-staging.yml. ubuntu-latest
      # runners have 7 GB RAM so 6144 MB leaves headroom.
      - name: Build
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=6144

  # ── Step 1b: Pre-Deployment Checklist ──
  pre-deploy-checklist:
    name: Pre-Deployment Checklist
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 10

      - name: Check for pending migrations
        run: |
          echo "## Pre-Deployment Checklist" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Check if any migrations were added in the last 10 commits
          MIGRATION_FILES=$(git diff --name-only HEAD~10..HEAD -- 'supabase/migrations/' 2>/dev/null || true)
          if [ -n "$MIGRATION_FILES" ]; then
            echo "### Migrations Detected" >> $GITHUB_STEP_SUMMARY
            echo "The following migrations are included in this deploy:" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$MIGRATION_FILES" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "**Ensure migrations have been applied to the production database before this deploy completes.**" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Migrations | None detected in recent commits |" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Check for destructive changes
        run: |
          # Scan recent commits for DROP TABLE/COLUMN in migrations
          DESTRUCTIVE=$(git diff HEAD~10..HEAD -- 'supabase/migrations/' 2>/dev/null | grep -iE '^\+.*(DROP TABLE|DROP COLUMN|TRUNCATE)' || true)
          if [ -n "$DESTRUCTIVE" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### DESTRUCTIVE CHANGES DETECTED" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$DESTRUCTIVE" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "**Verify these were approved and compensating migration exists.**" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Scan for secrets in diff
        run: |
          # Final secret scan on what is being deployed.
          # Strategy: only flag added lines that look like an actual secret
          # ASSIGNMENT or live token. Skip comments (//, #, *, JSDoc) so
          # docstrings that *mention* env-var names don't false-positive.
          ADDED=$(git diff HEAD~1..HEAD 2>/dev/null | grep -E '^\+[^+]' || true)
          # Drop comment-only additions before scanning.
          NON_COMMENT=$(echo "$ADDED" | grep -vE '^\+[[:space:]]*(//|#|\*|<!--)' || true)
          # Patterns:
          #   - Stripe live secret: sk_live_<24+ chars>
          #   - Razorpay live key:  rzp_live_<14+ chars>
          #   - Supabase service role JWT (real key starts eyJ + long base64)
          #   - Any *SERVICE_ROLE_KEY* assignment with a non-placeholder value
          SECRETS_FOUND=$(echo "$NON_COMMENT" | grep -iE 'sk_live_[A-Za-z0-9]{24,}|rzp_live_[A-Za-z0-9]{14,}|eyJ[A-Za-z0-9_\-]{40,}\.[A-Za-z0-9_\-]{40,}|SERVICE_ROLE_KEY[[:space:]]*[=:][[:space:]]*[A-Za-z0-9._\-]{20,}' || true)
          if [ -n "$SECRETS_FOUND" ]; then
            echo ""
            echo "BLOCKED: Potential secrets in deployment diff."
            echo "$SECRETS_FOUND"
            exit 1
          fi
          echo "| Secret scan | Passed |" >> $GITHUB_STEP_SUMMARY

      - name: Verify environment requirements
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Environment" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Node version | ${{ env.NODE_VERSION }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | main |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${GITHUB_SHA:0:7}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Region | bom1 (Mumbai) |" >> $GITHUB_STEP_SUMMARY

  # ── Step 1c: Apply Database Migrations ──
  # Pushes changed SQL migrations in `supabase/migrations/` to the production
  # database BEFORE the Vercel deploy goes live, so the new web build never hits
  # a DB without the schema/seed it expects. Non-migration deploys intentionally
  # skip `supabase db push`: production can contain operator-applied emergency
  # migration versions that are not in this repo yet, and `db push --include-all`
  # fails on that remote-ledger drift even when the current release has no schema
  # changes.
  migrations:
    name: Apply Database Migrations
    runs-on: ubuntu-latest
    needs: [production-verification-gate, quality, pre-deploy-checklist]
    environment: production
    outputs:
      production_migrations_changed: ${{ steps.migration-diff.outputs.changed }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Detect migration changes
        id: migration-diff
        run: |
          MIGRATION_FILES=$(git diff --name-only HEAD~1 HEAD -- 'supabase/migrations/' || true)
          if [ -n "$MIGRATION_FILES" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "### Production migrations detected" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "$MIGRATION_FILES" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "| Production migrations | None in this push; skipped db push |" >> "$GITHUB_STEP_SUMMARY"
          fi

      - uses: supabase/setup-cli@v2
        if: steps.migration-diff.outputs.changed == 'true'
        with:
          version: ${{ env.SUPABASE_CLI_VERSION }}

      - name: Push migrations to production
        if: steps.migration-diff.outputs.changed == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} --password "$SUPABASE_DB_PASSWORD"
          supabase db push --linked --include-all

  # ── Step 2: Deploy to Vercel Production (requires approval) ──
  # NOTE: Vercel's native GitHub App handles auto-deploys on push to main.
  # This CLI-based job is OPTIONAL and only runs when VERCEL_TOKEN secret
  # is configured. If the token is missing, the job is skipped (not failed)
  # to avoid blocking CI, since Vercel App deploy is the canonical path.
  deploy:
    name: Deploy to Vercel Production
    runs-on: ubuntu-latest
    needs: [quality, pre-deploy-checklist, migrations]
    environment: production
    # Only run the CLI deploy if a deploy token is configured.
    # When missing, Vercel's GitHub App integration handles the deploy.
    if: ${{ vars.USE_CLI_DEPLOY == 'true' }}
    outputs:
      deploy-url: ${{ steps.deploy.outputs.deploy_url }}
      app-version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Read package version
        id: version
        run: |
          VERSION=$(node -p "require('./apps/host/package.json').version")
          if [ -z "$VERSION" ] || [ "$VERSION" = "undefined" ]; then
            echo "::error::Could not resolve apps/host package version for production release"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Package version: $VERSION"

      - name: Install Vercel CLI
        run: npm install --global --no-audit --no-fund "vercel@${VERCEL_CLI_VERSION}"

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Reject placeholder env values from Vercel
        # Defensive guard added 2026-04-27 after a build shipped with
        # NEXT_PUBLIC_SUPABASE_URL=https://placeholder.supabase.co baked into
        # the client bundle, breaking all browser-side Supabase calls.
        # If Vercel project env is misconfigured, fail the build immediately
        # rather than silently shipping a broken client to users.
        run: |
          if [ -f .vercel/.env.production.local ]; then
            ENVFILE=.vercel/.env.production.local
          elif [ -f .vercel/.env.preview.local ]; then
            ENVFILE=.vercel/.env.preview.local
          else
            echo "::error::No Vercel env file found after 'vercel pull'"
            exit 1
          fi
          BAD=0
          if grep -q "placeholder.supabase.co" "$ENVFILE" 2>/dev/null; then
            echo "::error::Vercel project has placeholder NEXT_PUBLIC_SUPABASE_URL — set the real Supabase project URL in Vercel Dashboard → Settings → Environment Variables → Production"
            BAD=1
          fi
          if grep -q "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.placeholder" "$ENVFILE" 2>/dev/null; then
            echo "::error::Vercel project has placeholder NEXT_PUBLIC_SUPABASE_ANON_KEY — set the real anon JWT in Vercel Dashboard → Settings → Environment Variables → Production"
            BAD=1
          fi
          if [ "$BAD" = "1" ]; then
            echo "Refusing to build with placeholder Supabase credentials. Fix Vercel env vars and redeploy."
            exit 1
          fi
          echo "Vercel env values look real (no placeholder markers detected)."

      # vercel build internally calls `npm run build`. Default Node 22 heap
      # is ~2 GB and the bundle has outgrown it — observed OOM on Deploy
      # Production run 25990539824 (commit 42eb0076 after #824). #819 fixed
      # the quality.Build step; this fixes the third site we'd missed.
      - name: Build with Vercel
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          NODE_OPTIONS: --max-old-space-size=6144

      - name: Deploy to Vercel Production
        id: deploy
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "deploy_url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
          echo "Deployed to: $DEPLOY_URL"

  # ── Step 3: Health Check ──
  # Probes the canonical production domain (PRODUCTION_DOMAIN), NOT the
  # deployment-specific *.vercel.app URL, because:
  #   1. After `vercel deploy --prod`, the production alias already points
  #      at the new deployment, so the domain check covers the just-deployed
  #      build.
  #   2. Deployment-specific URLs are guarded by Vercel deployment-protection
  #      auth and return non-200 to unauthenticated curls — that was
  #      auto-rolling-back every deploy.
  health-check:
    name: Post-Deploy Health Check
    runs-on: ubuntu-latest
    timeout-minutes: 22
    needs: [production-verification-gate, migrations, deploy-functions, deploy]
    if: >-
      ${{ always()
      && needs.production-verification-gate.result == 'success'
      && needs.migrations.result == 'success'
      && needs.deploy-functions.result == 'success'
      && ((vars.USE_CLI_DEPLOY == 'true' && needs.deploy.result == 'success')
      || (vars.USE_CLI_DEPLOY != 'true' && needs.deploy.result == 'skipped')) }}
    outputs:
      exact_sha_verified: ${{ steps.health.outputs.exact_sha_verified }}
      verified_github_sha: ${{ steps.health.outputs.verified_github_sha }}
    steps:
      - name: Poll canonical production for healthy exact SHA
        id: health
        # Fail closed unless canonical production reports healthy exact SHA.
        # Protection/network/stale-SHA evidence never authorizes rollback.
        env:
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          TARGET_URL="${PRODUCTION_DOMAIN}/api/v1/health"
          EXPECTED_SHA="${GITHUB_SHA:0:7}"
          POLL_WINDOW_SECONDS=600
          DEADLINE=$((SECONDS + POLL_WINDOW_SECONDS))
          ATTEMPT=0
          LAST_STATUS=""
          ALL_PROTECTION=1
          CURRENT_SHA_SEEN=0
          CURRENT_SHA_UNHEALTHY=0
          echo "exact_sha_verified=false" >> "$GITHUB_OUTPUT"
          echo "verified_github_sha=" >> "$GITHUB_OUTPUT"
          echo "rollback_authorized=false" >> "$GITHUB_OUTPUT"
          if [ -z "$VERCEL_AUTOMATION_BYPASS_SECRET" ]; then
            echo "::error::Bypass secret is unavailable; release is unverified."
            exit 1
          fi
          BYPASS_HEADER=(-H "x-vercel-protection-bypass: $VERCEL_AUTOMATION_BYPASS_SECRET")
          set +e
          while [ "$SECONDS" -lt "$DEADLINE" ]; do
            ATTEMPT=$((ATTEMPT + 1))
            BODY_FILE=$(mktemp)
            STATUS=$(curl -sS --max-time 10 -o "$BODY_FILE" -w "%{http_code}" \
              -H "Accept: application/json" \
              -H "x-health-probe: github-actions" \
              "${BYPASS_HEADER[@]}" "$TARGET_URL" 2>/dev/null)
            CURL_EXIT=$?
            if [ "$CURL_EXIT" = "0" ]; then
              LAST_STATUS="$STATUS"
              case "$STATUS" in 401|403|429) ;; *) ALL_PROTECTION=0 ;; esac
              if [ "$STATUS" = "200" ]; then
                HEALTHY=$(node -e "const fs=require('fs');try{const b=JSON.parse(fs.readFileSync(process.argv[1],'utf8'));process.stdout.write(String(b.ok===true&&b.status==='healthy'))}catch{process.stdout.write('false')}" "$BODY_FILE")
                SEMANTIC_UNHEALTHY=$(node -e "const fs=require('fs');try{const b=JSON.parse(fs.readFileSync(process.argv[1],'utf8'));process.stdout.write(String(b.ok===false&&['degraded','unhealthy'].includes(b.status)))}catch{process.stdout.write('false')}" "$BODY_FILE")
                DEPLOYED_SHA=$(node -e "const fs=require('fs');try{const b=JSON.parse(fs.readFileSync(process.argv[1],'utf8'));process.stdout.write(String(b.version?.git_sha||''))}catch{process.stdout.write('')}" "$BODY_FILE")
                if [ "$DEPLOYED_SHA" = "$EXPECTED_SHA" ]; then
                  CURRENT_SHA_SEEN=1
                  if [ "$SEMANTIC_UNHEALTHY" = "true" ]; then CURRENT_SHA_UNHEALTHY=1; fi
                fi
                if [ "$HEALTHY" = "true" ] && [ "$DEPLOYED_SHA" = "$EXPECTED_SHA" ]; then
                  rm -f "$BODY_FILE"
                  echo "exact_sha_verified=true" >> "$GITHUB_OUTPUT"
                  echo "verified_github_sha=$GITHUB_SHA" >> "$GITHUB_OUTPUT"
                  exit 0
                fi
              fi
            else
              LAST_STATUS="curl-exit-$CURL_EXIT"
              ALL_PROTECTION=0
            fi
            rm -f "$BODY_FILE"
            REMAINING=$((DEADLINE - SECONDS))
            if [ "$REMAINING" -le 0 ]; then break; fi
            SLEEP_SECONDS=20
            if [ "$REMAINING" -lt "$SLEEP_SECONDS" ]; then SLEEP_SECONDS="$REMAINING"; fi
            sleep "$SLEEP_SECONDS"
          done
          if [ "$ALL_PROTECTION" = "1" ] && [ "$ATTEMPT" -gt 0 ]; then
            echo "::error::All probes were blocked by Vercel protection; rollback suppressed."
            exit 1
          fi
          if [ "$CURRENT_SHA_SEEN" = "1" ] && [ "$CURRENT_SHA_UNHEALTHY" = "1" ]; then
            echo "rollback_authorized=true" >> "$GITHUB_OUTPUT"
            echo "::error::Expected SHA reached production but reported unhealthy."
            exit 1
          fi
          echo "::error::Exact healthy SHA was not observed (current_sha_seen=$CURRENT_SHA_SEEN, last=$LAST_STATUS); rollback suppressed."
          exit 1

      - name: Auto-rollback on health check failure
        if: failure() && steps.health.outputs.rollback_authorized == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
          ROLLBACK_BASELINE_VALID: ${{ needs.production-verification-gate.outputs.rollback_baseline_valid }}
          ROLLBACK_BASELINE_DEPLOYMENT_ID: ${{ needs.production-verification-gate.outputs.rollback_baseline_deployment_id }}
          ROLLBACK_BASELINE_GIT_SHA: ${{ needs.production-verification-gate.outputs.rollback_baseline_git_sha }}
          ROLLBACK_BASELINE_PROJECT_ID: ${{ needs.production-verification-gate.outputs.rollback_baseline_project_id }}
          ROLLBACK_BASELINE_OWNER_ID: ${{ needs.production-verification-gate.outputs.rollback_baseline_owner_id }}
          PRODUCTION_MIGRATIONS_CHANGED: ${{ needs.migrations.outputs.production_migrations_changed }}
          EDGE_FUNCTIONS_CHANGED: ${{ needs.deploy-functions.outputs.edge_functions_changed }}
        run: |
          EXPECTED_SHA="${GITHUB_SHA:0:7}"
          ROLLBACK_EXPECTED_SHA="${ROLLBACK_BASELINE_GIT_SHA:0:7}"
          if [ "$ROLLBACK_BASELINE_VALID" != "true" ]; then
            echo "::warning::No verified pre-deploy baseline is available; automatic rollback suppressed."
            exit 0
          fi
          if [ "$PRODUCTION_MIGRATIONS_CHANGED" = "true" ] || [ "$EDGE_FUNCTIONS_CHANGED" = "true" ]; then
            echo "::warning::This release changed another deployment plane; automatic web-only rollback suppressed."
            exit 0
          fi
          if ! [[ "$ROLLBACK_BASELINE_DEPLOYMENT_ID" =~ ^dpl_[A-Za-z0-9]+$ ]] \
            || ! [[ "$ROLLBACK_BASELINE_GIT_SHA" =~ ^[0-9a-f]{40}$ ]] \
            || ! [[ "$ROLLBACK_BASELINE_PROJECT_ID" =~ ^prj_[A-Za-z0-9]+$ ]] \
            || ! [[ "$ROLLBACK_BASELINE_OWNER_ID" =~ ^(team|user)_[A-Za-z0-9]+$ ]] \
            || [ -z "$VERCEL_TOKEN" ]; then
            echo "::warning::Rollback identity or Vercel credential is invalid; automatic rollback suppressed."
            exit 0
          fi
          CANONICAL_HOST="${PRODUCTION_DOMAIN#https://}"
          if [ "$CANONICAL_HOST" != "alfanumrik.com" ]; then
            echo "::warning::Canonical host is not pinned; automatic rollback suppressed."
            exit 0
          fi

          CANDIDATE_FILE=$(mktemp)
          CURRENT_BEFORE_FILE=$(mktemp)
          CURRENT_AFTER_FILE=$(mktemp)
          BODY_FILE=$(mktemp)
          trap 'rm -f "$CANDIDATE_FILE" "$CURRENT_BEFORE_FILE" "$CURRENT_AFTER_FILE" "$BODY_FILE"' EXIT
          fetch_deployment() {
            local identity="$1"
            local output="$2"
            curl --fail --silent --show-error --max-time 15 \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              -H "Accept: application/json" \
              "https://api.vercel.com/v13/deployments/${identity}" \
              -o "$output"
          }

          if ! fetch_deployment "$ROLLBACK_BASELINE_DEPLOYMENT_ID" "$CANDIDATE_FILE"; then
            echo "::warning::Known-good rollback deployment is no longer readable; automatic rollback suppressed."
            exit 0
          fi
          CANDIDATE_VALID=$(node -e "const fs=require('fs');try{const d=JSON.parse(fs.readFileSync(process.argv[1],'utf8'));const [org,repo]=process.argv[6].split('/');const valid=d.id===process.argv[2]&&(d.gitSource?.sha||d.meta?.githubCommitSha)===process.argv[3]&&d.projectId===process.argv[4]&&d.ownerId===process.argv[5]&&d.target==='production'&&d.readyState==='READY'&&d.gitSource?.type==='github'&&d.gitSource?.ref==='main'&&d.meta?.githubCommitOrg===org&&d.meta?.githubCommitRepo===repo;process.stdout.write(String(valid))}catch{process.stdout.write('false')}" "$CANDIDATE_FILE" "$ROLLBACK_BASELINE_DEPLOYMENT_ID" "$ROLLBACK_BASELINE_GIT_SHA" "$ROLLBACK_BASELINE_PROJECT_ID" "$ROLLBACK_BASELINE_OWNER_ID" "$GITHUB_REPOSITORY")
          if [ "$CANDIDATE_VALID" != "true" ]; then
            echo "::warning::Known-good rollback metadata no longer matches the captured identity; automatic rollback suppressed."
            exit 0
          fi

          # Immediate rollback revalidation binds the canonical alias and its
          # semantic response to the exact failing GitHub SHA on both sides.
          if ! fetch_deployment "$CANONICAL_HOST" "$CURRENT_BEFORE_FILE"; then
            echo "::warning::Immediate rollback revalidation was inconclusive; automatic rollback suppressed."
            exit 0
          fi
          mapfile -t CURRENT_BEFORE < <(node -e "const fs=require('fs');try{const d=JSON.parse(fs.readFileSync(process.argv[1],'utf8'));const [org,repo]=process.argv[5].split('/');const sha=d.gitSource?.sha||d.meta?.githubCommitSha||'';const valid=/^dpl_[A-Za-z0-9]+$/.test(d.id||'')&&sha===process.argv[2]&&d.projectId===process.argv[3]&&d.ownerId===process.argv[4]&&d.target==='production'&&d.readyState==='READY'&&d.gitSource?.ref==='main'&&d.meta?.githubCommitOrg===org&&d.meta?.githubCommitRepo===repo;console.log(valid?'true':'false');console.log(valid?d.id:'');console.log(valid?sha:'')}catch{console.log('false\n\n')}" "$CURRENT_BEFORE_FILE" "$GITHUB_SHA" "$ROLLBACK_BASELINE_PROJECT_ID" "$ROLLBACK_BASELINE_OWNER_ID" "$GITHUB_REPOSITORY")
          if [ "${CURRENT_BEFORE[0]:-false}" != "true" ] || [ "${CURRENT_BEFORE[1]:-}" = "$ROLLBACK_BASELINE_DEPLOYMENT_ID" ]; then
            echo "::warning::Canonical deployment identity is raced or already equals the baseline; automatic rollback suppressed."
            exit 0
          fi

          set +e
          STATUS=$(curl -sS --max-time 15 -o "$BODY_FILE" -w "%{http_code}" \
            -H "Accept: application/json" \
            -H "x-vercel-protection-bypass: $VERCEL_AUTOMATION_BYPASS_SECRET" \
            "${PRODUCTION_DOMAIN}/api/v1/health" 2>/dev/null)
          CURL_EXIT=$?
          set -e
          if [ "$CURL_EXIT" != "0" ] || [ "$STATUS" != "200" ]; then
            rm -f "$BODY_FILE"
            echo "::warning::Immediate rollback revalidation was inconclusive; automatic rollback suppressed."
            exit 0
          fi
          SEMANTIC_UNHEALTHY=$(node -e "const fs=require('fs');try{const b=JSON.parse(fs.readFileSync(process.argv[1],'utf8'));process.stdout.write(String(b.ok===false&&['degraded','unhealthy'].includes(b.status)))}catch{process.stdout.write('false')}" "$BODY_FILE")
          DEPLOYED_SHA=$(node -e "const fs=require('fs');try{const b=JSON.parse(fs.readFileSync(process.argv[1],'utf8'));process.stdout.write(String(b.version?.git_sha||''))}catch{process.stdout.write('')}" "$BODY_FILE")
          rm -f "$BODY_FILE"
          if [ "$DEPLOYED_SHA" != "$EXPECTED_SHA" ] || [ "$SEMANTIC_UNHEALTHY" != "true" ]; then
            echo "::warning::Canonical state changed or lacks semantic unhealthy evidence (sha=$DEPLOYED_SHA semantic_unhealthy=$SEMANTIC_UNHEALTHY); automatic rollback suppressed."
            exit 0
          fi
          if ! fetch_deployment "$CANONICAL_HOST" "$CURRENT_AFTER_FILE"; then
            echo "::warning::Canonical identity could not be re-read; automatic rollback suppressed."
            exit 0
          fi
          mapfile -t CURRENT_AFTER < <(node -e "const fs=require('fs');try{const d=JSON.parse(fs.readFileSync(process.argv[1],'utf8'));const sha=d.gitSource?.sha||d.meta?.githubCommitSha||'';console.log(d.id===process.argv[2]&&sha===process.argv[3]?'true':'false');console.log(d.id||'');console.log(sha)}catch{console.log('false\n\n')}" "$CURRENT_AFTER_FILE" "${CURRENT_BEFORE[1]}" "$GITHUB_SHA")
          if [ "${CURRENT_AFTER[0]:-false}" != "true" ]; then
            echo "::warning::Canonical identity changed during immediate revalidation; automatic rollback suppressed."
            exit 0
          fi
          echo "Health check failed; rolling back to captured known-good deployment."
          npm install --global --no-audit --no-fund "vercel@${VERCEL_CLI_VERSION}"
          vercel rollback "$ROLLBACK_BASELINE_DEPLOYMENT_ID" \
            --token="$VERCEL_TOKEN" --yes --timeout=3m

          ROLLBACK_VERIFY_WINDOW_SECONDS=300
          ROLLBACK_DEADLINE=$((SECONDS + ROLLBACK_VERIFY_WINDOW_SECONDS))
          while [ "$SECONDS" -lt "$ROLLBACK_DEADLINE" ]; do
            if fetch_deployment "$CANONICAL_HOST" "$CURRENT_BEFORE_FILE"; then
              mapfile -t ROLLBACK_ALIAS_BEFORE < <(node -e "const fs=require('fs');try{const d=JSON.parse(fs.readFileSync(process.argv[1],'utf8'));const sha=d.gitSource?.sha||d.meta?.githubCommitSha||'';console.log(d.id===process.argv[2]&&sha===process.argv[3]&&d.projectId===process.argv[4]&&d.ownerId===process.argv[5]&&d.target==='production'&&d.readyState==='READY'?'true':'false');console.log(d.id||'');console.log(sha)}catch{console.log('false\n\n')}" "$CURRENT_BEFORE_FILE" "$ROLLBACK_BASELINE_DEPLOYMENT_ID" "$ROLLBACK_BASELINE_GIT_SHA" "$ROLLBACK_BASELINE_PROJECT_ID" "$ROLLBACK_BASELINE_OWNER_ID")
              ROLLBACK_ALIAS_BEFORE_ID="${ROLLBACK_ALIAS_BEFORE[1]:-}"
              if [ "${ROLLBACK_ALIAS_BEFORE[0]:-false}" = "true" ]; then
                set +e
                STATUS=$(curl -sS --max-time 15 -o "$BODY_FILE" -w "%{http_code}" \
                  -H "Accept: application/json" \
                  -H "x-vercel-protection-bypass: $VERCEL_AUTOMATION_BYPASS_SECRET" \
                  "${PRODUCTION_DOMAIN}/api/v1/health" 2>/dev/null)
                CURL_EXIT=$?
                set -e
                if [ "$CURL_EXIT" = "0" ] && [ "$STATUS" = "200" ] \
                  && fetch_deployment "$CANONICAL_HOST" "$CURRENT_AFTER_FILE"; then
                  HEALTHY=$(node -e "const fs=require('fs');try{const b=JSON.parse(fs.readFileSync(process.argv[1],'utf8'));process.stdout.write(String(b.ok===true&&b.status==='healthy'))}catch{process.stdout.write('false')}" "$BODY_FILE")
                  DEPLOYED_SHA=$(node -e "const fs=require('fs');try{const b=JSON.parse(fs.readFileSync(process.argv[1],'utf8'));process.stdout.write(String(b.version?.git_sha||''))}catch{process.stdout.write('')}" "$BODY_FILE")
                  mapfile -t ROLLBACK_ALIAS_AFTER < <(node -e "const fs=require('fs');try{const d=JSON.parse(fs.readFileSync(process.argv[1],'utf8'));const sha=d.gitSource?.sha||d.meta?.githubCommitSha||'';console.log(d.id===process.argv[2]&&sha===process.argv[3]?'true':'false');console.log(d.id||'')}catch{console.log('false\n')}" "$CURRENT_AFTER_FILE" "$ROLLBACK_BASELINE_DEPLOYMENT_ID" "$ROLLBACK_BASELINE_GIT_SHA")
                  if [ "$HEALTHY" = "true" ] && [ "$DEPLOYED_SHA" = "$ROLLBACK_EXPECTED_SHA" ] \
                    && [ "${ROLLBACK_ALIAS_AFTER[0]:-false}" = "true" ] \
                    && [ "${ROLLBACK_ALIAS_AFTER[1]:-}" = "$ROLLBACK_ALIAS_BEFORE_ID" ]; then
                    echo "::notice::Rollback verified: canonical production is healthy at exact SHA $ROLLBACK_EXPECTED_SHA."
                    exit 0
                  fi
                fi
              fi
            fi
            REMAINING=$((ROLLBACK_DEADLINE - SECONDS))
            if [ "$REMAINING" -le 0 ]; then break; fi
            SLEEP_SECONDS=15
            if [ "$REMAINING" -lt "$SLEEP_SECONDS" ]; then SLEEP_SECONDS="$REMAINING"; fi
            sleep "$SLEEP_SECONDS"
          done
          echo "::error::Rollback command completed, but canonical identity and healthy exact-SHA proof were not observed within ${ROLLBACK_VERIFY_WINDOW_SECONDS}s."
          exit 1

  # ── Step 3a: Deploy Changed Edge Functions ──
  # Detects which Supabase Edge Functions changed in the merged commit and
  # redeploys only those (or all active functions if `_shared/` changed).
  # Runs after migrations so any new schema/RPC the function depends on is
  # already in the DB.
  #
  # NOTE: this job intentionally does NOT depend on `deploy` because the
  # canonical web deploy path is Vercel's GitHub App (the `deploy` job above
  # is gated on `vars.USE_CLI_DEPLOY == 'true'` and is skipped in default
  # operation). Edge Functions must redeploy on every push to main
  # regardless of which web-deploy path is active.
  deploy-functions:
    name: Deploy Changed Edge Functions
    runs-on: ubuntu-latest
    needs: [quality, pre-deploy-checklist, migrations]
    environment: production
    outputs:
      edge_functions_changed: ${{ steps.changed.outputs.changed }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Detect changed Edge Functions
        id: changed
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'supabase/functions/' \
            | grep -vE '(_archive|_shared|__tests__)' \
            | awk -F/ 'NF>=3 {print $3}' | sort -u | grep -v '^$' || true)
          # If _shared/ changed, redeploy ALL active functions (consumers depend on it)
          if git diff --name-only HEAD~1 HEAD -- 'supabase/functions/_shared/' | grep -q .; then
            CHANGED=$(ls -d supabase/functions/*/ | grep -vE '(_archive|_shared)' | xargs -n1 basename | sort -u)
            echo "_shared changed → deploying ALL active functions"
          fi
          echo "Changed functions:"
          echo "$CHANGED"
          {
            echo 'functions<<EOF'
            echo "$CHANGED"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
          if [ -n "$CHANGED" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: supabase/setup-cli@v2
        if: steps.changed.outputs.functions != ''
        with:
          version: ${{ env.SUPABASE_CLI_VERSION }}

      - name: Deploy each changed function
        if: steps.changed.outputs.functions != ''
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          while IFS= read -r fn; do
            [ -z "$fn" ] && continue
            echo "Deploying $fn"
            supabase functions deploy "$fn" --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} --no-verify-jwt
          done <<< "${{ steps.changed.outputs.functions }}"

  # ── Step 3b: Post-Deploy Verification ──
  # Probes the canonical production domain (PRODUCTION_DOMAIN) for the same
  # reasons as the Health Check job above (deployment-protection auth wall).
  # The deploy URL is still captured in the summary for traceability.
  #
  # Independently re-proves semantic health and exact release identity.
  post-deploy-verify:
    name: Post-Deploy Verification
    runs-on: ubuntu-latest
    needs: [health-check]
    if: >-
      ${{ !cancelled()
      && needs.health-check.result == 'success'
      && needs.health-check.outputs.exact_sha_verified == 'true'
      && needs.health-check.outputs.verified_github_sha == github.sha }}
    outputs:
      exact_sha_verified: ${{ steps.verify.outputs.exact_sha_verified }}
      verified_github_sha: ${{ steps.verify.outputs.verified_github_sha }}
    steps:
      - name: Verify critical endpoints
        id: verify
        env:
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          TARGET_URL="${PRODUCTION_DOMAIN}"
          EXPECTED_SHA="${GITHUB_SHA:0:7}"
          echo "exact_sha_verified=false" >> "$GITHUB_OUTPUT"
          echo "verified_github_sha=" >> "$GITHUB_OUTPUT"
          echo "## Post-Deploy Verification" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Probed domain: \`$TARGET_URL\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Endpoint | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY

          BYPASS_HEADER=()
          if [ -z "$VERCEL_AUTOMATION_BYPASS_SECRET" ]; then
            echo "::error::Bypass secret is required for post-deploy verification."
            exit 1
          fi
          BYPASS_HEADER=(-H "x-vercel-protection-bypass: $VERCEL_AUTOMATION_BYPASS_SECRET")

          HEALTH_BODY=$(mktemp)
          HEALTH_STATUS=$(curl -sS --max-time 15 -o "$HEALTH_BODY" -w "%{http_code}" \
            "${BYPASS_HEADER[@]}" "${TARGET_URL}/api/v1/health" 2>/dev/null || true)
          HEALTHY=$(node -e "const fs=require('fs');try{const b=JSON.parse(fs.readFileSync(process.argv[1],'utf8'));process.stdout.write(String(b.ok===true&&b.status==='healthy'))}catch{process.stdout.write('false')}" "$HEALTH_BODY")
          DEPLOYED_SHA=$(node -e "const fs=require('fs');try{const b=JSON.parse(fs.readFileSync(process.argv[1],'utf8'));process.stdout.write(String(b.version?.git_sha||''))}catch{process.stdout.write('')}" "$HEALTH_BODY")
          rm -f "$HEALTH_BODY"
          if [ "$HEALTH_STATUS" != "200" ] || [ "$HEALTHY" != "true" ] || [ "$DEPLOYED_SHA" != "$EXPECTED_SHA" ]; then
            echo "::error::Post-deploy health did not prove healthy exact SHA (http=$HEALTH_STATUS healthy=$HEALTHY sha=$DEPLOYED_SHA expected=$EXPECTED_SHA)."
            exit 1
          fi

          # Track application failures separately from checkpoint responses.
          # Every required endpoint must be verified through the bypass; even
          # one checkpoint response leaves the release unverified.
          REAL_FAIL=0
          BYPASS_BLOCKED=0
          PROBES=0

          check() {
            local label="$1"
            local path="$2"
            shift 2
            # Remaining args are the list of accepted status codes.
            local accepted=("$@")
            PROBES=$((PROBES + 1))
            local status
            local curl_exit
            local headers_file
            local body_file
            headers_file=$(mktemp)
            body_file=$(mktemp)
            status=$(curl -sS -D "$headers_file" -o "$body_file" -w "%{http_code}" \
              -A "Alfanumrik-CI-PostDeploy/1.0 (+https://alfanumrik.com)" \
              "${BYPASS_HEADER[@]}" \
              "${TARGET_URL}${path}" 2>/dev/null)
            curl_exit=$?
            if [ "$curl_exit" -ne 0 ] && [ "$status" = "000" ]; then
              if grep -qiE 'Vercel Security Checkpoint|x-vercel-mitigated: challenge|x-vercel-challenge-token' "$headers_file" "$body_file" 2>/dev/null; then
                status="429"
              else
                echo "| $label | FAIL (curl-exit-$curl_exit) |" >> "$GITHUB_STEP_SUMMARY"
                REAL_FAIL=$((REAL_FAIL + 1))
                rm -f "$headers_file" "$body_file"
                return 1
              fi
            fi
            for code in "${accepted[@]}"; do
              if [ "$status" = "$code" ]; then
                echo "| $label | $status |" >> $GITHUB_STEP_SUMMARY
                rm -f "$headers_file" "$body_file"
                return 0
              fi
            done
            if [ "$status" = "429" ]; then
              echo "| $label | 429 (Vercel checkpoint) |" >> $GITHUB_STEP_SUMMARY
              BYPASS_BLOCKED=$((BYPASS_BLOCKED + 1))
              rm -f "$headers_file" "$body_file"
              return 0
            fi
            echo "| $label | FAIL ($status) |" >> $GITHUB_STEP_SUMMARY
            REAL_FAIL=$((REAL_FAIL + 1))
            rm -f "$headers_file" "$body_file"
            return 1
          }

          # Aggregate all endpoint failures instead of letting the runner's
          # default `bash -e` stop after the first failed check.
          set +e
          check "/api/v1/health" "/api/v1/health" "200"
          # Homepage: 200 (Next.js render) or 307/308 (redirect to /welcome marketing route).
          check "/ (homepage)"   "/"              "200" "307" "308"
          check "/login"         "/login"         "200" "307"

          # Security headers check — meaningful only if the response is the
          # real app, not the Vercel challenge page. When the challenge is
          # engaged (all probes 429), skip this check; otherwise enforce.
          if [ "$BYPASS_BLOCKED" -lt "$PROBES" ]; then
            HEADERS=$(curl -sI "${BYPASS_HEADER[@]}" "${TARGET_URL}/" 2>/dev/null)
            if echo "$HEADERS" | grep -qi "x-frame-options"; then
              echo "| Security headers | Present |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| Security headers | MISSING |" >> $GITHUB_STEP_SUMMARY
              REAL_FAIL=$((REAL_FAIL + 1))
            fi
          else
            echo "| Security headers | skipped (checkpoint engaged) |" >> $GITHUB_STEP_SUMMARY
          fi

          echo ""
          echo "Probes: $PROBES   Real failures: $REAL_FAIL   Checkpoint-blocked: $BYPASS_BLOCKED"

          if [ "$REAL_FAIL" -gt 0 ]; then
            echo "Post-deploy verification found real failures (non-429 / wrong status)."
            echo "Rollback: Vercel Dashboard > Deployments > Promote previous deployment"
            exit 1
          fi

          if [ "$BYPASS_BLOCKED" -gt 0 ]; then
            echo "::error::At least one required probe was blocked by Vercel protection; production is unverified."
            exit 1
          fi

          echo "exact_sha_verified=true" >> "$GITHUB_OUTPUT"
          echo "verified_github_sha=$GITHUB_SHA" >> "$GITHUB_OUTPUT"
          echo "All post-deploy verifications passed."

  # ── Step 4: Release Tag & Summary ──
  release:
    name: Create Release & Summary
    runs-on: ubuntu-latest
    needs: [health-check, post-deploy-verify]
    # The optional CLI `deploy` job (gated on vars.USE_CLI_DEPLOY) is intentionally
    # NOT in `needs`: in default operation Vercel's GitHub App handles the web
    # deploy and `deploy` is skipped. A skipped `needs` dependency would cascade
    # and skip this `release` job too — which is why no release tag was being
    # created on normal production deploys. Gate on the two jobs that always run
    # (health-check + post-deploy-verify) instead, and only tag on a real push to
    # main where both passed.
    if: >-
      ${{ !cancelled()
      && github.ref == 'refs/heads/main'
      && github.event_name == 'push'
      && needs.health-check.result == 'success'
      && needs.health-check.outputs.exact_sha_verified == 'true'
      && needs.health-check.outputs.verified_github_sha == github.sha
      && needs.post-deploy-verify.result == 'success'
      && needs.post-deploy-verify.outputs.exact_sha_verified == 'true'
      && needs.post-deploy-verify.outputs.verified_github_sha == github.sha }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      # Version no longer comes from the (optionally-skipped) `deploy` job — read
      # it from the host app package so release tagging works on the default
      # Vercel-GitHub-App deploy path.
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Read package version
        id: version
        run: |
          VERSION=$(node -p "require('./apps/host/package.json').version")
          if [ -z "$VERSION" ] || [ "$VERSION" = "undefined" ]; then
            echo "::error::Could not resolve apps/host package version for production release"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Package version: $VERSION"

      - name: Create GitHub release tag
        uses: actions/github-script@v9
        with:
          script: |
            const version = '${{ steps.version.outputs.version }}';
            const sha = context.sha;
            const tagName = `v${version}`;
            const releaseName = `v${version}`;

            // Check if tag already exists
            try {
              await github.rest.git.getRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `tags/${tagName}`,
              });

              // Tag exists — append short SHA to make it unique
              const uniqueTag = `${tagName}+${sha.substring(0, 7)}`;
              console.log(`Tag ${tagName} already exists. Using ${uniqueTag} instead.`);

              await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: uniqueTag,
                target_commitish: sha,
                name: `${releaseName} (${sha.substring(0, 7)})`,
                body: [
                  `## Alfanumrik ${uniqueTag}`,
                  '',
                  `**Commit:** \`${sha}\``,
                  `**Deployed to:** ${process.env.PRODUCTION_DOMAIN}`,
                  '',
                  '_Automatically released by the production deploy workflow._',
                ].join('\n'),
                draft: false,
                prerelease: false,
              });
            } catch (e) {
              if (e.status === 404) {
                // Tag does not exist — create release normally
                await github.rest.repos.createRelease({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  tag_name: tagName,
                  target_commitish: sha,
                  name: releaseName,
                  body: [
                    `## Alfanumrik ${tagName}`,
                    '',
                    `**Commit:** \`${sha}\``,
                    `**Deployed to:** ${process.env.PRODUCTION_DOMAIN}`,
                    '',
                    '_Automatically released by the production deploy workflow._',
                  ].join('\n'),
                  draft: false,
                  prerelease: false,
                });
              } else {
                throw e;
              }
            }

      - name: Post deployment summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Production Deployment Summary

          | Detail | Value |
          |--------|-------|
          | **Version** | \`v${{ steps.version.outputs.version }}\` |
          | **Commit** | \`${GITHUB_SHA:0:7}\` |
          | **Branch** | \`main\` |
          | **Deploy URL** | ${{ env.PRODUCTION_DOMAIN }} |
          | **Health Check** | Passed |
          | **Post-Deploy Verify** | Passed |
          | **Deployed at** | $(date -u '+%Y-%m-%d %H:%M:%S UTC') |

          Deployment triggered by push to \`main\`.
          EOF

  # A skipped job reports success to GitHub. Keep a terminal sentinel so an
  # unexpected condition/needs propagation skip cannot leave production green
  # without endpoint verification and release evidence.
  production-release-completion-gate:
    name: Production Release Completion Gate
    runs-on: ubuntu-latest
    needs: [health-check, post-deploy-verify, release]
    if: ${{ always() }}
    steps:
      - name: Enforce terminal production release outcomes
        env:
          EXPECTED_SHA: ${{ github.sha }}
          HEALTH_CHECK_RESULT: ${{ needs.health-check.result }}
          HEALTH_EXACT_SHA_VERIFIED: ${{ needs.health-check.outputs.exact_sha_verified }}
          HEALTH_VERIFIED_GITHUB_SHA: ${{ needs.health-check.outputs.verified_github_sha }}
          POST_DEPLOY_VERIFY_RESULT: ${{ needs.post-deploy-verify.result }}
          POST_EXACT_SHA_VERIFIED: ${{ needs.post-deploy-verify.outputs.exact_sha_verified }}
          POST_VERIFIED_GITHUB_SHA: ${{ needs.post-deploy-verify.outputs.verified_github_sha }}
          RELEASE_RESULT: ${{ needs.release.result }}
        run: |
          FAILED=0

          require_equal() {
            local label="$1"
            local actual="$2"
            local expected="$3"
            if [ "$actual" != "$expected" ]; then
              echo "::error::$label expected '$expected' but was '${actual:-<empty>}'"
              FAILED=1
            fi
          }

          require_equal "Health check result" "$HEALTH_CHECK_RESULT" "success"
          require_equal "Health exact-SHA proof" "$HEALTH_EXACT_SHA_VERIFIED" "true"
          require_equal "Health verified SHA" "$HEALTH_VERIFIED_GITHUB_SHA" "$EXPECTED_SHA"
          require_equal "Post-deploy verification result" "$POST_DEPLOY_VERIFY_RESULT" "success"
          require_equal "Post-deploy exact-SHA proof" "$POST_EXACT_SHA_VERIFIED" "true"
          require_equal "Post-deploy verified SHA" "$POST_VERIFIED_GITHUB_SHA" "$EXPECTED_SHA"
          require_equal "Release result" "$RELEASE_RESULT" "success"

          if [ "$FAILED" -ne 0 ]; then
            echo "Production release completion evidence is incomplete."
            exit 1
          fi

          echo "Production release completion evidence is complete for $EXPECTED_SHA."
