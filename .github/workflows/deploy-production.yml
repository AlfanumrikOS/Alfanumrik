name: Deploy Production — Alfanumrik

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  NEXT_PUBLIC_SUPABASE_URL: 'https://placeholder.supabase.co'
  NEXT_PUBLIC_SUPABASE_ANON_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.placeholder'
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  # ── Step 1: Full Quality Pipeline ──
  quality:
    name: Lint, Type-check & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Run tests
        run: npm test -- --reporter=verbose

      - name: Build
        run: npm run build

  # ── Step 2: Deploy to Vercel Production (requires approval) ──
  deploy:
    name: Deploy to Vercel Production
    runs-on: ubuntu-latest
    needs: quality
    environment: production
    outputs:
      deploy-url: ${{ steps.deploy.outputs.deploy_url }}
      app-version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Read package version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Package version: $VERSION"

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build with Vercel
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel Production
        id: deploy
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "deploy_url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
          echo "Deployed to: $DEPLOY_URL"

  # ── Step 3: Health Check ──
  health-check:
    name: Post-Deploy Health Check
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Wait for deployment to stabilize
        run: sleep 60

      - name: Health check
        run: |
          DEPLOY_URL="${{ needs.deploy.outputs.deploy-url }}"
          echo "Checking: $DEPLOY_URL"

          for i in 1 2 3; do
            RESPONSE=$(curl -s -w "\n%{http_code}" \
              "${DEPLOY_URL}/api/v1/health" 2>/dev/null)
            STATUS=$(echo "$RESPONSE" | tail -1)
            BODY=$(echo "$RESPONSE" | head -1)
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (attempt $i)"
              echo "$BODY" | head -c 500
              exit 0
            fi
            echo "Attempt $i/3 returned HTTP $STATUS"
            sleep 15
          done
          echo "Health check failed after 3 attempts"
          exit 1

  # ── Step 4: Release Tag & Summary ──
  release:
    name: Create Release & Summary
    runs-on: ubuntu-latest
    needs: [deploy, health-check]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub release tag
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ needs.deploy.outputs.app-version }}';
            const sha = context.sha;
            const tagName = `v${version}`;
            const releaseName = `v${version}`;

            // Check if tag already exists
            try {
              await github.rest.git.getRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `tags/${tagName}`,
              });

              // Tag exists — append short SHA to make it unique
              const uniqueTag = `${tagName}+${sha.substring(0, 7)}`;
              console.log(`Tag ${tagName} already exists. Using ${uniqueTag} instead.`);

              await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: uniqueTag,
                target_commitish: sha,
                name: `${releaseName} (${sha.substring(0, 7)})`,
                body: [
                  `## Alfanumrik ${uniqueTag}`,
                  '',
                  `**Commit:** \`${sha}\``,
                  `**Deployed to:** ${{ needs.deploy.outputs.deploy-url }}`,
                  '',
                  '_Automatically released by the production deploy workflow._',
                ].join('\n'),
                draft: false,
                prerelease: false,
              });
            } catch (e) {
              if (e.status === 404) {
                // Tag does not exist — create release normally
                await github.rest.repos.createRelease({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  tag_name: tagName,
                  target_commitish: sha,
                  name: releaseName,
                  body: [
                    `## Alfanumrik ${tagName}`,
                    '',
                    `**Commit:** \`${sha}\``,
                    `**Deployed to:** ${{ needs.deploy.outputs.deploy-url }}`,
                    '',
                    '_Automatically released by the production deploy workflow._',
                  ].join('\n'),
                  draft: false,
                  prerelease: false,
                });
              } else {
                throw e;
              }
            }

      - name: Post deployment summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Production Deployment Summary

          | Detail | Value |
          |--------|-------|
          | **Version** | \`v${{ needs.deploy.outputs.app-version }}\` |
          | **Commit** | \`${GITHUB_SHA:0:7}\` |
          | **Branch** | \`main\` |
          | **Deploy URL** | ${{ needs.deploy.outputs.deploy-url }} |
          | **Health Check** | Passed |
          | **Deployed at** | $(date -u '+%Y-%m-%d %H:%M:%S UTC') |

          Deployment triggered by push to \`main\`.
          EOF
