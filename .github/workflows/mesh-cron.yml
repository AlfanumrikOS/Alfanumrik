name: Mesh Autonomous Cron

# HARD-SUSPENDED IN PHASE 0. The prior manual path combined write permission,
# staging service-role/Anthropic secrets, and shell-evaluated operator input.
# Restoring it requires a protected environment, main-only source enforcement,
# least-privilege token scope, and a reviewed non-eval argument contract.
#
# Required GitHub secrets (Settings → Secrets and variables → Actions):
#   ANTHROPIC_API_KEY                 — your Anthropic API key
#   STAGING_SUPABASE_URL              — https://gzpxqklxwzishrkiaatd.supabase.co
#   STAGING_SUPABASE_SERVICE_ROLE_KEY — service_role secret from staging Supabase
#
# Cost ceiling: ~one cycle/day. At Sonnet+Opus rates a no-op cycle costs
# roughly $0.20–$0.50. Real cycles that touch code cost more. The job
# refuses to run if mesh-automation.enabled is missing — delete that
# file to disable.

on:
  # Phase 0: scheduled execution is suspended because the root workspace no
  # longer exposes the mesh:tick command used below.
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mesh-cron
  cancel-in-progress: false

jobs:
  gate:
    name: Phase 0 Mesh Suspension Gate
    runs-on: ubuntu-latest
    permissions: {}
    outputs:
      enabled: ${{ steps.suspend.outputs.enabled }}
    steps:
      - name: Refuse autonomous mesh execution
        id: suspend
        run: |
          echo "enabled=false" >> "$GITHUB_OUTPUT"
          echo "::error::Agent mesh execution is suspended in Phase 0; a reviewed workflow change is required to restore it."
          exit 1

  tick:
    runs-on: ubuntu-latest
    needs: gate
    if: needs.gate.outputs.enabled == 'true'
    permissions:
      contents: write
      pull-requests: write
    # ANTHROPIC_API_KEY is stored as an environment-scoped secret in a
    # GitHub Environment named "ANTHROPIC_API_KEY" (narrower scope than a
    # plain repo secret). Declaring the environment here is what makes
    # `${{ secrets.ANTHROPIC_API_KEY }}` resolve in the env block below.
    # The Supabase repo-secrets are picked up automatically regardless.
    environment: agent-mesh-break-glass
    timeout-minutes: 30
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.STAGING_SUPABASE_SERVICE_ROLE_KEY }}
      MESH_GIT_AUTHOR: 'Alfanumrik Agent Mesh <mesh@alfanumrik.com>'
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # mesh needs full history for worktree baselines

      - name: Kill-switch check
        run: |
          if [ ! -f mesh-automation.enabled ]; then
            echo "::warning::mesh-automation.enabled is missing — automation is disabled. Exiting."
            exit 0
          fi
          echo "mesh-automation.enabled present — proceeding"

      - name: Required-env check
        run: |
          test -n "$ANTHROPIC_API_KEY"           || { echo "::error::ANTHROPIC_API_KEY secret missing"; exit 1; }
          test -n "$SUPABASE_URL"                || { echo "::error::STAGING_SUPABASE_URL secret missing"; exit 1; }
          test -n "$SUPABASE_SERVICE_ROLE_KEY"   || { echo "::error::STAGING_SUPABASE_SERVICE_ROLE_KEY secret missing"; exit 1; }
          echo "All required env present"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install deps
        run: npm ci --no-audit --no-fund

      - name: Set up git author (mesh runtime needs to commit)
        run: |
          git config user.email "mesh@alfanumrik.com"
          git config user.name "Alfanumrik Agent Mesh"

      - name: Mesh tick (real L1+L2+L4+L6+L7 against staging)
        env:
          # gh CLI auto-picks GH_TOKEN for `gh pr create` etc.; the
          # actions/checkout step already configured the local git remote
          # with this token, so `git push` from the worktree also works.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run mesh:tick -- --commit --real-l1 --real-l2 --real-l4 --real-l6 --real-l7

      - name: Upload run logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mesh-cron-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            .mesh-worktrees/
            *.log
          if-no-files-found: ignore
          retention-days: 14
