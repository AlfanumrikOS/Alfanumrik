name: Python AI Services — CI/CD

# ─────────────────────────────────────────────────────────────────────────────
# Owner: architect agent. Builds, tests, and deploys the FastAPI service in
# python/services/ai/ to Google Cloud Run (asia-south1).
#
# Triggers:
#   - pull_request  → test job only (no build, no deploy)
#   - push to main  → test + build + push image + deploy production + smoke
#   - manual deploys are intentionally disabled until staging has independent,
#     ref-scoped identity and environment protection
#
# Authentication: Workload Identity Federation (NO JSON keys). See
# docs/PYTHON_AI_DEPLOY.md for the one-time GCP project setup ops must run.
# Production jobs use the GitHub Production environment. They stay disabled
# until its protections/WIF are configured and the explicit enable variable is
# true. The WIF provider independently restricts repo, main ref, and environment.
#
# Secrets expected in the Production environment:
#   GCP_PROJECT_ID                 — e.g. alfanumrik-ai-services-prod
#   GCP_WORKLOAD_IDENTITY_PROVIDER — projects/<num>/locations/global/workloadIdentityPools/github/providers/github-actions
#   GCP_SERVICE_ACCOUNT            — ai-services-deployer@<project>.iam.gserviceaccount.com
#   GCP_RUNTIME_SERVICE_ACCOUNT    — ai-services-runtime@<project>.iam.gserviceaccount.com
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
    paths:
      - 'python/**'
      - '.github/workflows/python-ai-deploy.yml'
  pull_request:
    branches: [main]
    paths:
      - 'python/**'
      - '.github/workflows/python-ai-deploy.yml'

concurrency:
  group: python-ai-deploy-${{ github.ref }}
  cancel-in-progress: false  # never cancel an in-flight deploy; merges queue

env:
  PYTHON_VERSION: '3.12'
  GCP_REGION: asia-south1
  ARTIFACT_REPO: ai-services
  CLOUD_RUN_SERVICE_PROD: ai-services

jobs:
  # ── Job 1: lint + typecheck + tests (runs on PR + main push) ──────────
  test:
    name: Lint / Typecheck / Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: |
            python/requirements.txt
            python/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: mypy
        run: mypy services

      - name: pytest with coverage
        # TODO(testing): ratchet coverage floor upward as handler tests land (target 70)
        # — quiz_generator/cme_engine/ncert_solver handlers + grader_cron are the gap drivers
        run: |
          pytest \
            --cov=services \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=58

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage-${{ github.run_id }}
          path: python/coverage.xml
          if-no-files-found: ignore
          retention-days: 7

  # ── Job 2: build + push image (only on a main-branch push) ──────────
  build-and-push:
    name: Build + Push to Artifact Registry
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.ENABLE_PYTHON_AI_PRODUCTION_DEPLOY == 'true'
    runs-on: ubuntu-latest
    environment: Production
    permissions:
      contents: read
      # OIDC token required for Workload Identity Federation. This is the
      # entire reason we never need a JSON key for GCP.
      id-token: write
    outputs:
      # IMPORTANT: only the non-secret short SHA crosses the job boundary.
      # The full image URL embeds ${{ secrets.GCP_PROJECT_ID }}, and GitHub
      # Actions BLANKS any cross-job `output` whose value contains a secret —
      # which previously handed the deploy job an empty IMAGE_TAG and made
      # `gcloud run services replace` reject the empty `image:`. The deploy
      # job reconstructs the full URL locally where the secret is re-read.
      image_sha: ${{ steps.image.outputs.short_sha }}
    steps:
      - uses: actions/checkout@v6

      - name: Compute image tag
        id: image
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-12)
          REGISTRY="${{ env.GCP_REGION }}-docker.pkg.dev"
          TAG="${REGISTRY}/${{ secrets.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/api:${SHORT_SHA}"
          # short_sha is the ONLY value we expose as a cross-job output — it
          # contains no secret, so GitHub will not mask it to empty.
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          # TAG is still emitted as a step output for this job's own build/push
          # step below; it never crosses a job boundary, so the secret it
          # embeds is safe here.
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Image: ${TAG}"

      - name: Authenticate to GCP (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: python
          file: python/Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.tag }}
            ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false  # GAR rejects provenance attestations by default

  # ── Job 3: deploy to Cloud Run ────────────────────────────────────────────
  deploy:
    name: Deploy to Cloud Run
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.ENABLE_PYTHON_AI_PRODUCTION_DEPLOY == 'true'
    runs-on: ubuntu-latest
    environment: Production
    permissions:
      contents: read
      id-token: write
    outputs:
      service_url: ${{ steps.deploy.outputs.url }}
      service_name: ${{ steps.deploy.outputs.service }}
      # Forward the non-secret short SHA so the smoke job's summary can show
      # which image shipped. We deliberately do NOT forward the full image URL
      # (it embeds secrets.GCP_PROJECT_ID and would be blanked as a cross-job
      # output) — the SHA alone identifies the build unambiguously.
      image_sha: ${{ needs.build-and-push.outputs.image_sha }}
    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to GCP (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      # ── Render service.yaml with this deploy's image + env ─────────────────
      # We use a declarative Cloud Run manifest (python/deploy/service.yaml)
      # instead of `gcloud run deploy` flags because (a) the manifest is the
      # only way to wire startup/liveness probes (REG-72) and (b) it gives
      # us a version-controlled audit trail of runtime posture.
      #
      # envsubst replaces $IMAGE_TAG, $RUNTIME_SERVICE_ACCOUNT, $ENVIRONMENT,
      # and $ALLOWED_ORIGINS in the production manifest.
      - name: Render Cloud Run manifest
        id: render
        run: |
          set -euo pipefail
          # Reconstruct the full image URL LOCALLY. The build job only handed
          # us the non-secret short SHA (image_sha); passing the full URL
          # across the job boundary is impossible because it embeds
          # secrets.GCP_PROJECT_ID, which GitHub blanks in cross-job outputs.
          # Re-reading the secret here (inside the job that needs it) keeps
          # IMAGE_TAG non-empty. Registry/repo/region match the build job's
          # `Compute image tag` step exactly — same image that was pushed.
          REGISTRY="${{ env.GCP_REGION }}-docker.pkg.dev"
          IMAGE_SHA="${{ needs.build-and-push.outputs.image_sha }}"
          export IMAGE_TAG="${REGISTRY}/${{ secrets.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/api:${IMAGE_SHA}"
          export RUNTIME_SERVICE_ACCOUNT="${{ secrets.GCP_RUNTIME_SERVICE_ACCOUNT }}"
          export ENVIRONMENT="production"
          export ALLOWED_ORIGINS="https://alfanumrik.com"

          # envsubst is available on ubuntu-latest by default (gettext-base).
          # The whitelist form keeps any unexpected ${...} tokens in the YAML
          # literal (defense in depth — no Cloud Run field uses bash-style
          # interpolation today, but a future Knative field migration could).
          envsubst '${IMAGE_TAG} ${RUNTIME_SERVICE_ACCOUNT} ${ENVIRONMENT} ${ALLOWED_ORIGINS}' \
            < python/deploy/service.yaml \
            > /tmp/rendered-service.yaml

          echo "── Rendered manifest preview ──"
          head -30 /tmp/rendered-service.yaml
          echo "── End preview ──"

          # Validate the rendered YAML parses before we hand it to gcloud.
          python -c "import yaml; yaml.safe_load(open('/tmp/rendered-service.yaml'))"
          echo "rendered=/tmp/rendered-service.yaml" >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloud Run (declarative manifest)
        id: deploy
        run: |
          set -euo pipefail
          SERVICE="${{ env.CLOUD_RUN_SERVICE_PROD }}"
          REGION="${{ env.GCP_REGION }}"
          PROJECT="${{ secrets.GCP_PROJECT_ID }}"

          harden_invocation() {
            gcloud run services update "${SERVICE}" \
              --region "${REGION}" \
              --project "${PROJECT}" \
              --invoker-iam-check \
              --quiet

            for MEMBER in allUsers allAuthenticatedUsers; do
              gcloud run services remove-iam-policy-binding "${SERVICE}" \
                --region "${REGION}" \
                --project "${PROJECT}" \
                --member="${MEMBER}" \
                --role="roles/run.invoker" \
                --all \
                --quiet 2>/dev/null || true
            done

            gcloud run services add-iam-policy-binding "${SERVICE}" \
              --region "${REGION}" \
              --project "${PROJECT}" \
              --member="serviceAccount:${{ secrets.GCP_SERVICE_ACCOUNT }}" \
              --role="roles/run.invoker" \
              --quiet

            POLICY=$(gcloud run services get-iam-policy "${SERVICE}" \
              --region "${REGION}" \
              --project "${PROJECT}" \
              --format=json)
            python -c 'import json,sys; p=json.load(sys.stdin); broad={"allUsers","allAuthenticatedUsers"}; found={m for b in p.get("bindings",[]) if b.get("role")=="roles/run.invoker" for m in b.get("members",[])} & broad; sys.exit(f"broad Cloud Run invokers remain: {sorted(found)}" if found else 0)' <<< "${POLICY}"

            INVOKER_DISABLED=$(gcloud run services describe "${SERVICE}" \
              --region "${REGION}" \
              --project "${PROJECT}" \
              --format='value(metadata.annotations.run.googleapis.com/invoker-iam-disabled)')
            if [[ "${INVOKER_DISABLED}" == "true" ]]; then
              echo "::error::Cloud Run invoker IAM check is disabled"
              exit 1
            fi
          }

          assert_project_iam_private() {
            PROJECT_POLICY=$(gcloud projects get-iam-policy "${PROJECT}" --format=json)
            python -c 'import json,sys; p=json.load(sys.stdin); broad={"allUsers","allAuthenticatedUsers"}; found={m for b in p.get("bindings",[]) if b.get("role")=="roles/run.invoker" for m in b.get("members",[])} & broad; sys.exit(f"broad project Cloud Run invokers remain: {sorted(found)}" if found else 0)' <<< "${PROJECT_POLICY}"
          }

          # A project-level broad grant would be inherited by a new service.
          # Fail before creating or updating any Cloud Run revision.
          assert_project_iam_private

          # Contain an existing service before a manifest error can abort the
          # run. Only an explicit not-found result may skip pre-hardening;
          # permission, identity, API, and network failures stop the deploy.
          set +e
          DESCRIBE_OUTPUT=$(gcloud run services describe "${SERVICE}" \
            --region "${REGION}" \
            --project "${PROJECT}" \
            --format='value(metadata.name)' 2>&1)
          DESCRIBE_STATUS=$?
          set -e
          if [[ ${DESCRIBE_STATUS} -eq 0 ]]; then
            harden_invocation
          elif grep -Eiq '(NOT_FOUND|not found|could not be found|404)' \
            <<< "${DESCRIBE_OUTPUT}"; then
            echo "Cloud Run service does not exist yet; pre-hardening is not applicable."
          else
            echo "::error::Unable to establish existing Cloud Run IAM posture"
            exit "${DESCRIBE_STATUS}"
          fi

          # `gcloud run services replace` is the declarative apply — it
          # creates the service if absent OR updates it in place. Probe
          # config, scaling, env vars, secrets all come from the manifest.
          gcloud run services replace "${{ steps.render.outputs.rendered }}" \
            --region "${REGION}" \
            --project "${PROJECT}" \
            --quiet

          # Reassert after replace in case service metadata or IAM behavior
          # changes, and harden a service created by this run before smoke.
          harden_invocation
          assert_project_iam_private

          # Capture the service URL for the post-deploy smoke job.
          URL=$(gcloud run services describe "${SERVICE}" \
            --region "${REGION}" \
            --project "${PROJECT}" \
            --format='value(status.url)')
          echo "url=${URL}" >> "$GITHUB_OUTPUT"
          echo "service=${SERVICE}" >> "$GITHUB_OUTPUT"
          echo "Service URL: ${URL}"

  # ── Job 4: post-deploy smoke test ─────────────────────────────────────────
  post-deploy-smoke:
    name: Post-deploy smoke test
    needs: deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.ENABLE_PYTHON_AI_PRODUCTION_DEPLOY == 'true'
    runs-on: ubuntu-latest
    environment: Production
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Authenticate to GCP (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Wait for revision rollout
        # Cloud Run sometimes returns the URL before the revision is fully
        # serving traffic. A short fixed wait is cheaper than a busy loop.
        run: sleep 15

      - name: Check /live
        run: |
          URL="${{ needs.deploy.outputs.service_url }}"
          # Path is /live (not /healthz) because Cloud Run's frontend
          # intercepts /healthz before it reaches the container
          # (returns Google's 404 HTML page). Confirmed 2026-05-24.
          echo "Probing ${URL}/live"
          ID_TOKEN=$(gcloud auth print-identity-token --audiences="${URL}")
          STATUS=$(curl --silent --output /dev/stderr --write-out '%{http_code}' \
            --header "X-Serverless-Authorization: Bearer ${ID_TOKEN}" \
            --max-time 10 --retry 3 --retry-delay 5 "${URL}/live")
          if [[ "${STATUS}" != "200" ]]; then
            echo "::error::/live returned ${STATUS} (expected 200)"
            exit 1
          fi
          echo "/live OK (200)"

      - name: Check /readyz
        run: |
          URL="${{ needs.deploy.outputs.service_url }}"
          echo "Probing ${URL}/readyz"
          ID_TOKEN=$(gcloud auth print-identity-token --audiences="${URL}")
          STATUS=$(curl --silent --output /dev/stderr --write-out '%{http_code}' \
            --header "X-Serverless-Authorization: Bearer ${ID_TOKEN}" \
            --max-time 10 --retry 3 --retry-delay 5 "${URL}/readyz")
          if [[ "${STATUS}" != "200" ]]; then
            echo "::error::/readyz returned ${STATUS} (expected 200)"
            exit 1
          fi
          echo "/readyz OK (200)"

      - name: Summary
        run: |
          echo "## Python AI Services Deploy" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Service: \`${{ needs.deploy.outputs.service_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- URL: ${{ needs.deploy.outputs.service_url }}" >> $GITHUB_STEP_SUMMARY
          # Image identified by its short SHA. The full registry URL embeds the
          # project-id secret, which GitHub blanks in cross-job outputs — so we
          # print the unambiguous, non-secret SHA instead of an empty string.
          echo "- Image SHA: \`${{ needs.deploy.outputs.image_sha }}\` (repo \`${{ env.ARTIFACT_REPO }}/api\`, region \`${{ env.GCP_REGION }}\`)" >> $GITHUB_STEP_SUMMARY
          echo "- Region: \`${{ env.GCP_REGION }}\`" >> $GITHUB_STEP_SUMMARY
