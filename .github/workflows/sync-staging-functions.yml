name: Sync Edge Functions to Staging

# Mirrors deploy-production.yml's "Deploy Changed Edge Functions" step but
# targets the staging Supabase project. Runs on every push to main so staging
# stays in sync with the canonical source going forward.
#
# Per launch-readiness sync (2026-05-05): production drifted from local source
# (71 deployed vs 35 in source = 36 legacy orphans). This workflow keeps
# staging in lockstep with main going forward; manual cleanup of prod orphans
# is a separate task.

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - '.github/workflows/sync-staging-functions.yml'
  workflow_dispatch:
    inputs:
      force_deploy_all_functions:
        description: 'Force-redeploy ALL local Edge Functions to staging (use after schema sync, project rebuild, or initial seed)'
        type: boolean
        default: false

concurrency:
  group: sync-staging-functions
  cancel-in-progress: true

env:
  NODE_VERSION: '22'

jobs:
  sync-functions:
    name: Sync Edge Functions to Staging
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Detect changed Edge Functions
        id: changed
        run: |
          if [ "${{ github.event.inputs.force_deploy_all_functions }}" = "true" ]; then
            CHANGED=$(ls -d supabase/functions/*/ | grep -vE '(_archive|_shared)' | xargs -n1 basename | sort -u)
            echo "force_deploy_all_functions=true -> deploying ALL local functions"
          elif git diff --name-only HEAD~1 HEAD -- 'supabase/functions/_shared/' | grep -q .; then
            CHANGED=$(ls -d supabase/functions/*/ | grep -vE '(_archive|_shared)' | xargs -n1 basename | sort -u)
            echo "_shared changed -> deploying ALL local functions (consumers depend on it)"
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'supabase/functions/'               | grep -vE '(_archive|_shared|__tests__)'               | awk -F/ 'NF>=3 {print $3}' | sort -u | grep -v '^$' || true)
          fi
          if [ -z "$CHANGED" ]; then
            echo "No Edge Function changes detected -> nothing to deploy"
          fi
          echo "$CHANGED"
          {
            echo 'functions<<EOF_FUNCTIONS'
            echo "$CHANGED"
            echo 'EOF_FUNCTIONS'
          } >> "$GITHUB_OUTPUT"

      - name: Deploy each changed function to staging
        if: steps.changed.outputs.functions != ''
        env:
          # Staging lives in a different Supabase org than prod, so the CLI's
          # SUPABASE_ACCESS_TOKEN must be the dedicated staging account PAT —
          # the prod token returns Unauthorized against the staging project ref.
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_STAGING_ACCESS_TOKEN }}
        run: |
          while IFS= read -r fn; do
            [ -z "$fn" ] && continue
            echo "Deploying $fn to staging"
            supabase functions deploy "$fn" --project-ref ${{ secrets.SUPABASE_STAGING_PROJECT_REF }} --no-verify-jwt
          done <<< "${{ steps.changed.outputs.functions }}"

      - name: Summary
        if: always()
        run: |
          echo "## Staging Edge Function Sync Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Functions deployed:" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.changed.outputs.functions }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
