name: Deploy Staging — Alfanumrik

on:
  push:
    branches: [develop, staging]

concurrency:
  group: deploy-staging-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  NEXT_PUBLIC_SUPABASE_URL: 'https://placeholder.supabase.co'
  NEXT_PUBLIC_SUPABASE_ANON_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.placeholder'
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  # ── Step 1: Quality Checks ──
  quality:
    name: Lint, Type-check & Build
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Run unit tests
        run: npm run test -- --run

      - name: Build
        run: npm run build

  # ── Step 2: Deploy to Vercel Preview ──
  deploy:
    name: Deploy to Vercel Preview
    runs-on: ubuntu-latest
    needs: quality
    environment: staging
    outputs:
      preview-url: ${{ steps.deploy.outputs.preview_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build with Vercel
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel Preview
        id: deploy
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "preview_url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
          echo "Deployed to: $DEPLOY_URL"

      - name: Comment preview URL on PR
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const previewUrl = '${{ steps.deploy.outputs.preview_url }}';
            const sha = context.sha;

            // Find open PRs associated with this commit
            const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: sha,
            });

            if (prs.length === 0) {
              console.log('No open PRs found for this commit — skipping comment.');
              return;
            }

            const body = [
              '## Staging Deployment',
              '',
              `**Preview URL:** ${previewUrl}`,
              `**Commit:** \`${sha.substring(0, 7)}\``,
              `**Branch:** \`${context.ref.replace('refs/heads/', '')}\``,
              '',
              '_Deployed automatically by the staging workflow._',
            ].join('\n');

            for (const pr of prs) {
              // Delete previous bot comments to avoid clutter
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
              });

              for (const comment of comments) {
                if (comment.user.type === 'Bot' && comment.body.includes('## Staging Deployment')) {
                  await github.rest.issues.deleteComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    comment_id: comment.id,
                  });
                }
              }

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body,
              });

              console.log(`Commented on PR #${pr.number}`);
            }

  # ── Step 3: Health Check ──
  health-check:
    name: Post-Deploy Health Check
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Wait for deployment to stabilize
        run: sleep 30

      - name: Health check
        run: |
          DEPLOY_URL="${{ needs.deploy.outputs.preview-url }}"
          echo "Checking: $DEPLOY_URL"

          for i in 1 2 3; do
            RESPONSE=$(curl -s -w "\n%{http_code}" \
              "${DEPLOY_URL}/api/v1/health" 2>/dev/null)
            STATUS=$(echo "$RESPONSE" | tail -1)
            BODY=$(echo "$RESPONSE" | head -1)
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (attempt $i)"
              echo "$BODY" | head -c 500
              exit 0
            fi
            echo "Attempt $i/3 returned HTTP $STATUS"
            sleep 15
          done
          echo "Health check failed after 3 attempts"
          exit 1
