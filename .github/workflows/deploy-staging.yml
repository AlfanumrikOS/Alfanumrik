name: Deploy Staging — Alfanumrik

on:
  push:
    branches: [develop, staging]
  # Manual trigger so operators can re-run the staging deploy after
  # infrastructure changes (e.g., schema-reproducibility cleanup, env-var
  # rotation) without needing a code push to develop/staging. Mirrors the
  # workflow_dispatch already on deploy-production.yml.
  workflow_dispatch:

concurrency:
  group: deploy-staging-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  NEXT_PUBLIC_SUPABASE_URL: 'https://placeholder.supabase.co'
  NEXT_PUBLIC_SUPABASE_ANON_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.placeholder'
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  # The staging health check uses the Vercel preview URL (no public staging
  # domain alias is configured today). If/when a `staging.alfanumrik.com`
  # alias is added, switch the health-check probes to it for the same
  # auth-wall reasons documented in deploy-production.yml.

jobs:
  # ── Step 1: Quality Checks ──
  # 2026-07-20 de-duplication (user-approved): on push to `develop`, the
  # "CI — Alfanumrik" workflow (`ci.yml` triggers on push to main/master/
  # develop) already runs lint + type-check + all unit tests + build (plus
  # secret scan, Edge Function Deno tests, live-DB integration tests, and
  # P10 bundle budgets) on the SAME commit. Re-running lint/type-check/test/
  # build here duplicated ~12-15 runner-minutes per develop push. On that
  # path this job now waits, FAIL-CLOSED, for that CI run's "CI Gate"
  # fan-in job to conclude success for the exact head SHA.
  #
  # The inline checks are KEPT (fail-closed) for every path where NO ci.yml
  # run exists for the SHA:
  #   - push to the `staging` branch (ci.yml does not trigger on `staging`)
  #   - `workflow_dispatch` (manual re-runs; ci.yml has no dispatch trigger,
  #     and the dispatched SHA may never have had a push-triggered CI run)
  # For those paths the original lint/type-check/test/build steps run
  # unchanged — the quality bar is never skipped, only de-duplicated where
  # CI provably covers the identical SHA.
  #
  # Fail-closed wait semantics (develop-push path): poll every 30s, bounded
  # at 20 min (CI critical path ~5-8 min; bound absorbs the simultaneous-
  # start race). Missing run, cancelled/skipped/failed/timed-out gate, or
  # timeout → this job fails and nothing downstream (migrations, deploy)
  # runs. Keys on the "CI Gate" JOB (aggregates all pre-merge quality jobs,
  # nothing deploy-coupled), not the whole-run conclusion.
  #
  # NOTE: the poll script below is intentionally duplicated in
  # deploy-production.yml (quality job). Keep both copies in sync.
  quality:
    name: Lint, Type-check & Build
    runs-on: ubuntu-latest
    # Symmetry with deploy-production.yml's quality job (keep-in-sync
    # contract): bounds the 20-min fail-closed CI-Gate poll on Path A and
    # the inline lint/type-check/test/build on Path B.
    timeout-minutes: 25
    environment: staging
    permissions:
      contents: read
      actions: read
    steps:
      # ── Path A: push to develop → verify CI green for this exact SHA ──
      - name: Wait for "CI — Alfanumrik" CI Gate success on this SHA
        if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
        env:
          GH_TOKEN: ${{ github.token }}
          EXPECTED_WORKFLOW_NAME: 'CI — Alfanumrik'
          GATE_JOB_NAME: 'CI Gate'
          POLL_INTERVAL_SECONDS: '30'
          POLL_WINDOW_SECONDS: '1200'
        run: |
          set -euo pipefail
          DEADLINE=$((SECONDS + POLL_WINDOW_SECONDS))
          RUNS_FILE=$(mktemp)
          JOBS_FILE=$(mktemp)
          trap 'rm -f "$RUNS_FILE" "$JOBS_FILE"' EXIT
          echo "Gating deploy on '${EXPECTED_WORKFLOW_NAME}' / '${GATE_JOB_NAME}' == success for ${GITHUB_SHA} (bound ${POLL_WINDOW_SECONDS}s, interval ${POLL_INTERVAL_SECONDS}s)."
          while :; do
            RUN_ID=""
            RUN_STATUS=""
            RUN_CONCLUSION=""
            if gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/ci.yml/runs?head_sha=${GITHUB_SHA}&event=push&per_page=10" > "$RUNS_FILE" 2>/dev/null; then
              mapfile -t RUN_FIELDS < <(jq -r --arg wf "$EXPECTED_WORKFLOW_NAME" --arg sha "$GITHUB_SHA" '
                ([.workflow_runs[]? | select(.name == $wf and .head_sha == $sha)] | sort_by(.id) | last) as $r
                | if $r == null then "", "", "" else ($r.id | tostring), $r.status, ($r.conclusion // "") end
              ' "$RUNS_FILE")
              RUN_ID="${RUN_FIELDS[0]:-}"
              RUN_STATUS="${RUN_FIELDS[1]:-}"
              RUN_CONCLUSION="${RUN_FIELDS[2]:-}"
            else
              echo "::warning::Could not list CI runs (transient API error); retrying."
            fi
            if [ -n "$RUN_ID" ]; then
              GATE_FOUND="false"
              GATE_STATUS=""
              GATE_CONCLUSION=""
              if gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${RUN_ID}/jobs?filter=latest&per_page=100" > "$JOBS_FILE" 2>/dev/null; then
                mapfile -t GATE_FIELDS < <(jq -r --arg j "$GATE_JOB_NAME" '
                  ([.jobs[]? | select(.name == $j)] | last) as $g
                  | if $g == null then "false", "", "" else "true", $g.status, ($g.conclusion // "") end
                ' "$JOBS_FILE")
                GATE_FOUND="${GATE_FIELDS[0]:-false}"
                GATE_STATUS="${GATE_FIELDS[1]:-}"
                GATE_CONCLUSION="${GATE_FIELDS[2]:-}"
              else
                echo "::warning::Could not list jobs for CI run ${RUN_ID}; retrying."
              fi
              if [ "$GATE_FOUND" = "true" ] && [ "$GATE_STATUS" = "completed" ]; then
                if [ "$GATE_CONCLUSION" = "success" ]; then
                  echo "'${GATE_JOB_NAME}' succeeded for ${GITHUB_SHA} (CI run ${RUN_ID})."
                  exit 0
                fi
                echo "::error::'${GATE_JOB_NAME}' concluded '${GATE_CONCLUSION}' on CI run ${RUN_ID} for ${GITHUB_SHA}; refusing to deploy (cancelled/skipped/failed all fail this gate)."
                exit 1
              fi
              if [ "$RUN_STATUS" = "completed" ] && [ "$GATE_FOUND" != "true" ]; then
                echo "::error::CI run ${RUN_ID} completed ('${RUN_CONCLUSION}') without a '${GATE_JOB_NAME}' job; refusing to deploy."
                exit 1
              fi
              echo "CI run ${RUN_ID}: run status=${RUN_STATUS:-unknown}, gate status=${GATE_STATUS:-pending}; waiting."
            else
              echo "No '${EXPECTED_WORKFLOW_NAME}' push run found yet for ${GITHUB_SHA}; waiting."
            fi
            REMAINING=$((DEADLINE - SECONDS))
            if [ "$REMAINING" -le 0 ]; then
              echo "::error::Timed out after ${POLL_WINDOW_SECONDS}s without a successful '${GATE_JOB_NAME}' for ${GITHUB_SHA}; refusing to deploy."
              exit 1
            fi
            SLEEP_SECONDS="$POLL_INTERVAL_SECONDS"
            if [ "$REMAINING" -lt "$SLEEP_SECONDS" ]; then SLEEP_SECONDS="$REMAINING"; fi
            sleep "$SLEEP_SECONDS"
          done

      # ── Path B: staging-branch push / manual dispatch → inline checks ──
      # (No ci.yml run exists for these SHAs; the original steps run
      # unchanged, fail-closed.)
      - uses: actions/checkout@v6
        if: github.event_name != 'push' || github.ref != 'refs/heads/develop'

      - uses: actions/setup-node@v6
        if: github.event_name != 'push' || github.ref != 'refs/heads/develop'
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        if: github.event_name != 'push' || github.ref != 'refs/heads/develop'
        run: npm ci

      - name: Lint
        if: github.event_name != 'push' || github.ref != 'refs/heads/develop'
        run: npm run lint

      - name: Type check
        if: github.event_name != 'push' || github.ref != 'refs/heads/develop'
        run: npm run type-check
        env:
          NODE_OPTIONS: --max-old-space-size=6144

      - name: Run unit tests
        if: github.event_name != 'push' || github.ref != 'refs/heads/develop'
        run: npm run test -- --run

      # Heap bump matches ci.yml + deploy-production.yml. See PR #818 / this PR
      # for the SIGABRT-during-next-build root cause.
      - name: Build
        if: github.event_name != 'push' || github.ref != 'refs/heads/develop'
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=6144

  # ── Step 1b: Apply Database Migrations to Staging ──
  # Pushes any pending SQL migrations to the staging Supabase project before
  # the preview deploy goes live, so the preview build never hits a DB
  # without the schema/seed it expects. Migrations are idempotent
  # (per CLAUDE.md), so re-running is safe.
  migrations:
    name: Apply Database Migrations (Staging)
    runs-on: ubuntu-latest
    needs: quality
    environment: staging
    steps:
      - uses: actions/checkout@v6

      - uses: supabase/setup-cli@v3
        with:
          version: latest

      - name: Push migrations to staging
        env:
          # Staging lives in a different Supabase org than prod, so the CLI's
          # SUPABASE_ACCESS_TOKEN env var must be sourced from the dedicated
          # staging token — the prod token returns Unauthorized here.
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_STAGING_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_STAGING_DB_PASSWORD }}
        run: |
          supabase link --project-ref ${{ secrets.SUPABASE_STAGING_PROJECT_REF }} --password "$SUPABASE_DB_PASSWORD"
          supabase db push --linked --include-all

  # ── Step 2: Deploy to Vercel Preview ──
  deploy:
    name: Deploy to Vercel Preview
    runs-on: ubuntu-latest
    needs: [quality, migrations]
    environment: staging
    # The "Comment preview URL on PR" step posts to issues/PRs and lists
    # PRs associated with the commit. Default GITHUB_TOKEN has only
    # `contents: read`, so explicit elevation is required. Least privilege:
    # only grant what the github-script step needs.
    permissions:
      contents: read
      pull-requests: write
      issues: write
    outputs:
      preview-url: ${{ steps.deploy.outputs.preview_url }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      # Same heap bump as the production workflow (`vercel build` shells out
      # to `npm run build` which OOMs without this on the default Node heap).
      - name: Build with Vercel
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
        env:
          NODE_OPTIONS: --max-old-space-size=6144

      - name: Deploy to Vercel Preview
        id: deploy
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "preview_url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
          echo "Deployed to: $DEPLOY_URL"

      - name: Comment preview URL on PR
        if: success()
        uses: actions/github-script@v9
        with:
          script: |
            const previewUrl = '${{ steps.deploy.outputs.preview_url }}';
            const sha = context.sha;

            // Find open PRs associated with this commit
            const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: sha,
            });

            if (prs.length === 0) {
              console.log('No open PRs found for this commit — skipping comment.');
              return;
            }

            const body = [
              '## Staging Deployment',
              '',
              `**Preview URL:** ${previewUrl}`,
              `**Commit:** \`${sha.substring(0, 7)}\``,
              `**Branch:** \`${context.ref.replace('refs/heads/', '')}\``,
              '',
              '_Deployed automatically by the staging workflow._',
            ].join('\n');

            for (const pr of prs) {
              // Delete previous bot comments to avoid clutter
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
              });

              for (const comment of comments) {
                if (comment.user.type === 'Bot' && comment.body.includes('## Staging Deployment')) {
                  await github.rest.issues.deleteComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    comment_id: comment.id,
                  });
                }
              }

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body,
              });

              console.log(`Commented on PR #${pr.number}`);
            }

  # ── Step 2b: Deploy Changed Edge Functions to Staging ──
  # Detects which Supabase Edge Functions changed in the merged commit and
  # redeploys only those (or all active functions if `_shared/` changed).
  # `--no-verify-jwt` is passed because most Alfanumrik functions perform
  # their own auth — match deploy-production.yml behavior. See that file
  # for the full rationale.
  deploy-functions:
    name: Deploy Changed Edge Functions (Staging)
    runs-on: ubuntu-latest
    needs: [deploy, migrations]
    environment: staging
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Detect changed Edge Functions
        id: changed
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'supabase/functions/' \
            | grep -vE '(_archive|_shared|__tests__)' \
            | awk -F/ 'NF>=3 {print $3}' | sort -u | grep -v '^$' || true)
          if git diff --name-only HEAD~1 HEAD -- 'supabase/functions/_shared/' | grep -q .; then
            CHANGED=$(ls -d supabase/functions/*/ | grep -vE '(_archive|_shared)' | xargs -n1 basename | sort -u)
            echo "_shared changed → deploying ALL active functions"
          fi
          echo "Changed functions:"
          echo "$CHANGED"
          {
            echo 'functions<<EOF'
            echo "$CHANGED"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - uses: supabase/setup-cli@v3
        if: steps.changed.outputs.functions != ''
        with:
          version: latest

      - name: Deploy each changed function
        if: steps.changed.outputs.functions != ''
        env:
          # Staging lives in a different Supabase org than prod, so the CLI's
          # SUPABASE_ACCESS_TOKEN must be the dedicated staging account PAT —
          # the prod token returns Unauthorized against the staging project ref.
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_STAGING_ACCESS_TOKEN }}
        run: |
          while IFS= read -r fn; do
            [ -z "$fn" ] && continue
            echo "Deploying $fn"
            supabase functions deploy "$fn" --project-ref ${{ secrets.SUPABASE_STAGING_PROJECT_REF }} --no-verify-jwt
          done <<< "${{ steps.changed.outputs.functions }}"

  # ── Step 3: Health Check ──
  health-check:
    name: Post-Deploy Health Check
    runs-on: ubuntu-latest
    needs: [deploy, deploy-functions]
    steps:
      - name: Wait for deployment to stabilize
        run: sleep 30

      - name: Health check
        run: |
          DEPLOY_URL="${{ needs.deploy.outputs.preview-url }}"
          echo "Checking: $DEPLOY_URL"

          for i in 1 2 3; do
            RESPONSE=$(curl -s -w "\n%{http_code}" \
              "${DEPLOY_URL}/api/v1/health" 2>/dev/null)
            STATUS=$(echo "$RESPONSE" | tail -1)
            BODY=$(echo "$RESPONSE" | head -1)
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (attempt $i)"
              echo "$BODY" | head -c 500
              exit 0
            fi
            echo "Attempt $i/3 returned HTTP $STATUS"
            sleep 15
          done
          echo "Health check failed after 3 attempts"
          exit 1
