name: Deploy AWS ECS — Alfanumrik

# HARD-SUSPENDED IN PHASE 0. Vercel is the production web authority; this
# workflow cannot deploy even when manually dispatched. Restoring AWS delivery
# requires a reviewed workflow change after production-break-glass has required
# reviewers/branch restrictions and the AWS OIDC trust is proven main-ref scoped.
#
# Required GitHub Actions SECRETS (Settings → Secrets and variables → Actions):
#   AWS_DEPLOY_ROLE_ARN            - arn:aws:iam::032064442164:role/alfa-github-deploy
#                                    (created by provision-foundations.sh)
#   NEXT_PUBLIC_SUPABASE_URL       - https://<project>.supabase.co  (baked at Docker build time)
#   NEXT_PUBLIC_SUPABASE_ANON_KEY  - Supabase anon JWT (baked at Docker build time)
#   NEXT_PUBLIC_SENTRY_DSN         - https://...@sentry.io/... (optional, baked at build time)
#   NEXT_PUBLIC_POSTHOG_KEY        - phc_... (optional, baked at build time)
#   NEXT_PUBLIC_POSTHOG_HOST       - https://eu.posthog.com (optional, baked at build time)
#   NEXT_PUBLIC_POSTHOG_ENABLED    - true / false (optional, baked at build time)
#   DEPLOY_GIT_SHA                 - derived automatically from GITHUB_SHA
#
# Required GitHub Actions VARIABLES (Settings → Secrets and variables → Actions → Variables):
#   ENABLE_AWS_DEPLOY   - Must remain 'false' while Phase 0 suspension is active
#   AWS_REGION          - ap-south-1
#   ECR_REPOSITORY      - alfa-web
#   ECS_CLUSTER         - alfa-prod
#   ECS_SERVICE         - web
#   PRODUCTION_DOMAIN   - CloudFront pseudolink: https://da8yhieheuw7p.cloudfront.net
#                         (set to https://alfanumrik.com only after full DNS cutover)
#
# Server-side secrets (Supabase service role, Razorpay, Anthropic, etc.) are NOT
# build-time variables — they are injected at container runtime by ECS from Secrets
# Manager key: alfa/prod/app. See aws/task-definition.json for the full list.

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual deploy (e.g. hotfix, cutover test)'
        type: string
        required: true
      confirmation:
        description: 'Type DEPLOY_AWS_PRODUCTION exactly (workflow remains suspended)'
        type: string
        required: true

permissions:
  contents: read

concurrency:
  group: deploy-aws-${{ github.ref }}
  # Do NOT cancel an in-progress ECS deploy. A half-completed rolling deploy
  # is harder to reason about than waiting for stability then re-deploying.
  cancel-in-progress: false

env:
  NODE_VERSION: '22'
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
  ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
  ECS_SERVICE: ${{ vars.ECS_SERVICE }}
  PRODUCTION_DOMAIN: ${{ vars.PRODUCTION_DOMAIN }}
  TASK_DEFINITION_FILE: aws/task-definition.json
  CONTAINER_NAME: web

jobs:
  # ── Guard: hard suspension; no repository variable can authorize deploy ──
  gate:
    name: Phase 0 AWS Suspension Gate
    runs-on: ubuntu-latest
    permissions: {}
    outputs:
      enabled: ${{ steps.check.outputs.enabled }}
    steps:
      - name: Refuse AWS production delivery during Phase 0
        id: check
        env:
          ENABLED: ${{ vars.ENABLE_AWS_DEPLOY }}
          REASON: ${{ inputs.reason }}
          CONFIRMATION: ${{ inputs.confirmation }}
        run: |
          echo "enabled=false" >> "$GITHUB_OUTPUT"
          if [ "$GITHUB_REF" != "refs/heads/main" ]; then
            echo "::error::AWS production recovery may be requested only from main."
            exit 1
          fi
          if [ -z "${REASON//[[:space:]]/}" ]; then
            echo "::error::A non-empty incident/change reason is required."
            exit 1
          fi
          if [ "$CONFIRMATION" != "DEPLOY_AWS_PRODUCTION" ]; then
            echo "::error::Confirmation must exactly match DEPLOY_AWS_PRODUCTION."
            exit 1
          fi
          if [ "$ENABLED" = "true" ]; then
            echo "::error::ENABLE_AWS_DEPLOY must remain false during Phase 0."
          fi
          echo "::error::AWS production delivery is suspended in Phase 0; a reviewed workflow change is required to restore it."
          exit 1

  # ── Step 1: Build Docker image and push to ECR ──
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: gate
    if: needs.gate.outputs.enabled == 'true'
    environment: production-break-glass
    permissions:
      id-token: write   # Required for OIDC token exchange
      contents: read
    outputs:
      image-uri: ${{ steps.push.outputs.image_uri }}
      image-sha-tag: ${{ steps.meta.outputs.sha_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          # Short session — just enough for the build + push + deploy sequence.
          role-session-name: alfa-github-deploy-${{ github.run_id }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Derive image tags
        id: meta
        run: |
          SHA_TAG="${GITHUB_SHA:0:7}"
          ECR_REGISTRY="${{ steps.ecr-login.outputs.registry }}"
          REPO="${{ env.ECR_REPOSITORY }}"
          echo "sha_tag=${SHA_TAG}" >> "$GITHUB_OUTPUT"
          echo "image_sha=${ECR_REGISTRY}/${REPO}:${SHA_TAG}" >> "$GITHUB_OUTPUT"
          echo "registry=${ECR_REGISTRY}" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        # NODE_OPTIONS: --max-old-space-size=6144
        # Matches the production build in deploy-production.yml. The Next.js
        # standalone build has OOMed at the default ~2 GB Node heap on
        # ubuntu-latest runners (7 GB RAM). 6144 MB leaves ample headroom.
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_SUPABASE_URL="${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" \
            --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY="${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" \
            --build-arg NEXT_PUBLIC_SENTRY_DSN="${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}" \
            --build-arg NEXT_PUBLIC_POSTHOG_KEY="${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}" \
            --build-arg NEXT_PUBLIC_POSTHOG_HOST="${{ secrets.NEXT_PUBLIC_POSTHOG_HOST }}" \
            --build-arg NEXT_PUBLIC_POSTHOG_ENABLED="${{ secrets.NEXT_PUBLIC_POSTHOG_ENABLED }}" \
            --build-arg DEPLOY_GIT_SHA="${GITHUB_SHA}" \
            --build-arg NODE_OPTIONS="--max-old-space-size=6144" \
            --tag "${{ steps.meta.outputs.image_sha }}" \
            --file Dockerfile \
            .
        env:
          NODE_OPTIONS: --max-old-space-size=6144

      - name: Push image to ECR (SHA tag only)
        id: push
        run: |
          # Only push the immutable SHA tag. ECR tag immutability is ON —
          # :latest cannot be overwritten once pushed. ECS always deploys
          # from the SHA-pinned URI, never :latest.
          docker push "${{ steps.meta.outputs.image_sha }}"
          echo "image_uri=${{ steps.meta.outputs.image_sha }}" >> "$GITHUB_OUTPUT"
          echo "Pushed: ${{ steps.meta.outputs.image_sha }}"

  # ── Step 2: Deploy to ECS Fargate ──
  deploy:
    name: Deploy to ECS Fargate
    runs-on: ubuntu-latest
    needs: [gate, build-and-push]
    if: needs.gate.outputs.enabled == 'true'
    environment: production-break-glass
    permissions:
      id-token: write
      contents: read
    outputs:
      previous-task-def: ${{ steps.current-revision.outputs.previous_task_def }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: alfa-github-deploy-${{ github.run_id }}

      - name: Record current task definition revision (for rollback)
        id: current-revision
        run: |
          PREV=$(aws ecs describe-services \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --services "${{ env.ECS_SERVICE }}" \
            --query 'services[0].taskDefinition' \
            --output text 2>/dev/null || echo "")
          echo "previous_task_def=${PREV}" >> "$GITHUB_OUTPUT"
          echo "Previous task definition: ${PREV}"

      - name: Render updated task definition (inject new image URI)
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ env.TASK_DEFINITION_FILE }}
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ needs.build-and-push.outputs.image-uri }}

      - name: Deploy task definition to ECS (rolling, wait for stability)
        id: ecs-deploy
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-task-def.outputs.task-definition }}
          cluster: ${{ env.ECS_CLUSTER }}
          service: ${{ env.ECS_SERVICE }}
          wait-for-service-stability: true
          # ECS deployment circuit breaker is configured on the service. If the
          # new tasks fail health checks, ECS automatically rolls back to the
          # previous task definition revision without manual intervention.

      - name: Scale up service on first deploy
        # The service was pre-created with desired-count=0 to satisfy ECS's
        # requirement that the service exist before update-service runs.
        # This step scales to 2 on first deploy; subsequent deploys are no-ops
        # (desired-count stays at whatever ECS rolling deploy left it at).
        run: |
          CURRENT_COUNT=$(aws ecs describe-services \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --services "${{ env.ECS_SERVICE }}" \
            --query 'services[0].desiredCount' \
            --output text \
            --region "${{ env.AWS_REGION }}")
          echo "Current desired task count: ${CURRENT_COUNT}"
          if [ "${CURRENT_COUNT}" = "0" ]; then
            echo "First deploy detected — scaling service from 0 to 2..."
            aws ecs update-service \
              --cluster "${{ env.ECS_CLUSTER }}" \
              --service "${{ env.ECS_SERVICE }}" \
              --desired-count 2 \
              --region "${{ env.AWS_REGION }}"
            echo "Scale-up initiated. ECS will launch 2 tasks with the new task definition."
          else
            echo "Service has ${CURRENT_COUNT} desired tasks — no scale-up needed."
          fi

  # ── Step 3: Smoke test the production endpoint ──
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: [gate, deploy]
    if: needs.gate.outputs.enabled == 'true'
    environment: production-break-glass
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Health check — /api/v1/health (5 attempts, 30s backoff)
        id: health
        run: |
          TARGET_URL="${{ env.PRODUCTION_DOMAIN }}"
          echo "Smoke testing: ${TARGET_URL}/api/v1/health"

          ALL_FAIL=1
          LAST_STATUS=""
          for i in 1 2 3 4 5; do
            RESPONSE=$(curl -s -w "\n%{http_code}" \
              -A "Alfanumrik-CI-AWSHealthCheck/1.0 (+https://alfanumrik.com)" \
              -H "Accept: application/json" \
              -H "x-health-probe: github-actions-aws" \
              --max-time 15 \
              "${TARGET_URL}/api/v1/health" 2>/dev/null)
            STATUS=$(echo "$RESPONSE" | tail -1)
            BODY=$(echo "$RESPONSE" | head -1)
            LAST_STATUS="$STATUS"
            echo "Attempt $i/5 — HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              BODY_OK=$(echo "$BODY" | jq -r '.ok // false' 2>/dev/null || echo false)
              BODY_STATUS=$(echo "$BODY" | jq -r '.status // "unknown"' 2>/dev/null || echo unknown)
              BODY_SHA=$(echo "$BODY" | jq -r '.version.git_sha // "unknown"' 2>/dev/null || echo unknown)
              echo "Health body: ok=${BODY_OK}, status=${BODY_STATUS}, git_sha=${BODY_SHA}"
              if [ "$BODY_OK" = "true" ] && [ "$BODY_STATUS" = "healthy" ]; then
                echo "Smoke test passed (attempt $i)"
                echo "$BODY" | head -c 500
                echo "passed=true" >> "$GITHUB_OUTPUT"
                ALL_FAIL=0
                break
              fi
              echo "Health endpoint returned HTTP 200 but is not healthy; retrying."
              echo "$BODY" | head -c 500
            fi
            if [ $i -lt 5 ]; then
              echo "Waiting 30s before retry..."
              sleep 30
            fi
          done

          if [ "$ALL_FAIL" = "1" ]; then
            echo "passed=false" >> "$GITHUB_OUTPUT"
            echo "Smoke test FAILED after 5 attempts (last status: $LAST_STATUS)"
            echo "The ECS deployment circuit breaker should have already triggered an automatic rollback."
            echo "Manual rollback: aws ecs update-service --cluster ${{ env.ECS_CLUSTER }} --service ${{ env.ECS_SERVICE }} --task-definition <previous-revision>"
            exit 1
          fi

      - name: Configure AWS credentials for rollback (on failure)
        if: failure() && steps.health.outputs.passed == 'false'
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: alfa-github-rollback-${{ github.run_id }}

      - name: Auto-rollback on smoke test failure
        # Re-register the previous task definition and pin the service back to it.
        # This is belt-and-suspenders: the ECS circuit breaker should have already
        # done this automatically. We add an explicit rollback here in case the
        # circuit breaker was not configured or if the service became healthy enough
        # to pass ECS's own checks but is still serving errors at the API layer.
        if: failure() && steps.health.outputs.passed == 'false'
        run: |
          PREV="${{ needs.deploy.outputs.previous-task-def }}"
          if [ -z "$PREV" ]; then
            echo "WARNING: No previous task definition recorded — cannot roll back automatically."
            echo "Manual rollback required: go to ECS Console → ${{ env.ECS_CLUSTER }} → ${{ env.ECS_SERVICE }} → Update service → choose previous revision."
            exit 1
          fi
          echo "Rolling back service to: ${PREV}"
          aws ecs update-service \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --service "${{ env.ECS_SERVICE }}" \
            --task-definition "${PREV}" \
            --force-new-deployment \
            --output json | jq '.service.taskDefinition'
          echo "Rollback initiated. Monitor ECS Console for stability."

  # ── Step 4: Deployment summary ──
  summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [gate, build-and-push, deploy, smoke-test]
    if: always() && needs.gate.outputs.enabled == 'true'
    steps:
      - name: Write summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## AWS ECS Deployment Summary

          | Detail | Value |
          |--------|-------|
          | **Commit** | \`${GITHUB_SHA:0:7}\` |
          | **Branch** | \`${GITHUB_REF_NAME}\` |
          | **Image** | \`${{ needs.build-and-push.outputs.image-sha-tag }}\` |
          | **Cluster** | ${{ env.ECS_CLUSTER }} |
          | **Service** | ${{ env.ECS_SERVICE }} |
          | **Region** | ${{ env.AWS_REGION }} |
          | **Build** | ${{ needs.build-and-push.result }} |
          | **Deploy** | ${{ needs.deploy.result }} |
          | **Smoke Test** | ${{ needs.smoke-test.result }} |
          | **Deployed at** | $(date -u '+%Y-%m-%d %H:%M:%S UTC') |

          EOF
          if [ "${{ needs.smoke-test.result }}" = "success" ]; then
            echo "Deployment to ECS succeeded and smoke test passed." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Deployment FAILED or smoke test did not pass. Check rollback status above." >> "$GITHUB_STEP_SUMMARY"
          fi
