name: Mobile CI

# Wave 2.6.1: analyze/test/build gate for the Flutter mobile app.
#
# Verified locally on Flutter 3.41.9 / channel stable:
#   build_runner (in lib/api/v2) + flutter analyze (0 issues)
#   + flutter test (75/75) + flutter build all exit 0.
#
# CRITICAL: the generated /v2 Dart client (*.g.dart in mobile/lib/api/v2) is
# intentionally gitignored and NOT committed. A clean checkout therefore does
# NOT compile until build_runner regenerates those `part` files. The "Regenerate
# /v2 Dart client" step below MUST run before analyze/test/build, mirroring the
# verified sequence in mobile/build_apk.sh (dart pub get + build_runner inside
# lib/api/v2, then flutter pub get at the app root).
#
# Scope: analyze + test + build only. NO Play Store signing / fastlane / release
# upload — that is Wave 2.6.2 and needs a keystore + Play service-account
# secrets the user must provide. No secrets are required by this workflow.

on:
  pull_request:
    paths:
      - 'mobile/**'
      - 'openapi/v2.json'
      - '.github/workflows/mobile-ci.yml'
  push:
    branches: [main]
    paths:
      - 'mobile/**'
      - 'openapi/v2.json'
      - '.github/workflows/mobile-ci.yml'
  workflow_dispatch:

concurrency:
  group: mobile-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mobile:
    name: Flutter analyze + test + build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v7

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: 'stable'
          cache: true

      # The /v2 Dart client is its own package (path dependency). build_runner
      # only generates for the package it is invoked in, so codegen MUST run
      # INSIDE lib/api/v2 — not at the app root. Its DTOs declare
      # `part '*.g.dart';`; without this the analyzer + compiler fail with
      # "missing part" errors. --delete-conflicting-outputs keeps it idempotent.
      - name: Regenerate /v2 Dart client (build_runner)
        working-directory: mobile/lib/api/v2
        run: |
          dart pub get
          dart run build_runner build --delete-conflicting-outputs

      - name: flutter pub get
        run: flutter pub get

      - name: flutter analyze
        run: flutter analyze

      - name: flutter test
        run: flutter test

      # Debug APK exercises real Android packaging (the runner's Android SDK
      # path has no spaces, unlike the local dev machine where release APK
      # failed env-specifically). This is the strongest build floor available
      # without signing secrets.
      - name: flutter build apk --debug
        run: flutter build apk --debug
