name: CI — Alfanumrik

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  NEXT_PUBLIC_SUPABASE_URL: 'https://placeholder.supabase.co'
  NEXT_PUBLIC_SUPABASE_ANON_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.placeholder'
  # Distinct placeholder (NOT equal to anon key) so src/lib/env.ts
  # validateServerEnv() does not throw at test boot. Tests that actually
  # exercise Supabase will still fail with network errors against
  # placeholder.supabase.co — those are integration tests and gated by
  # continue-on-error on the test step. Must differ from the anon
  # placeholder above or env.ts's anti-leak check will trigger.
  SUPABASE_SERVICE_ROLE_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.ci-placeholder-service-role'
  # Bundle size limits (bytes). Matches P10 budget from CLAUDE.md.
  SHARED_JS_LIMIT_KB: 160
  PAGE_JS_LIMIT_KB: 260
  MIDDLEWARE_LIMIT_KB: 120

jobs:
  # ── Step 0: Secret Scanning ──
  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history required by gitleaks to scan diffs

      # Real secret scanner (low false-positive rate, industry standard).
      # Pinned major to v2 for stability; config in .gitleaks.toml if/when added.
      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true   # Advisory for now; will be enforced once baseline is clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Scan for hardcoded secrets
        run: |
          echo "## Secret Scanning Report" >> $GITHUB_STEP_SUMMARY
          FOUND=0

          # Patterns that indicate leaked secrets
          # Exclude: placeholder values in CI env, test fixtures, lock files, .env.example,
          # test files with deliberate fake credentials for redaction/mock tests,
          # documentation examples, and worktree copies.
          EXCLUDE_PATTERN="ci.yml|deploy-production.yml|deploy-staging.yml|package-lock.json|\.env\.example|\.env\.local\.example|node_modules|__tests__/|\.test\.(ts|tsx|js|jsx)|\.spec\.(ts|tsx|js|jsx)|e2e/|docs/|\.claude/worktrees/|coverage/"

          for PATTERN in \
            'sk_live_[a-zA-Z0-9]{20,}' \
            'rzp_live_[a-zA-Z0-9]{10,}' \
            'SUPABASE_SERVICE_ROLE_KEY\s*[:=]\s*eyJ' \
            'service_role.*eyJ[a-zA-Z0-9_-]{50,}' \
            'NEXT_PUBLIC_.*SERVICE_ROLE' \
            'NEXT_PUBLIC_.*SECRET' \
            'password\s*[:=]\s*["\x27][^"\x27]{8,}' \
            'ghp_[a-zA-Z0-9]{36}' \
            'sk-[a-zA-Z0-9]{20,}' \
          ; do
            MATCHES=$(grep -rn --include='*.ts' --include='*.tsx' --include='*.js' --include='*.jsx' --include='*.json' --include='*.env' --include='*.yml' --include='*.yaml' -E "$PATTERN" . 2>/dev/null | grep -vE "$EXCLUDE_PATTERN" || true)
            if [ -n "$MATCHES" ]; then
              echo "| FOUND | \`$PATTERN\` |" >> $GITHUB_STEP_SUMMARY
              echo "$MATCHES"
              FOUND=1
            fi
          done

          # Check NEXT_PUBLIC_ vars don't contain secret-like values.
          # Match only contiguous identifier names like NEXT_PUBLIC_MY_SERVICE_ROLE
          # (no spaces / punctuation between), to avoid matching error strings that
          # mention both NEXT_PUBLIC_SUPABASE_URL and SERVICE_ROLE_KEY separately.
          NEXT_PUBLIC_SECRETS=$(grep -rnE 'NEXT_PUBLIC_[A-Z0-9_]*(SERVICE_ROLE|SECRET_KEY|PRIVATE_KEY)' . --include='*.ts' --include='*.tsx' --include='*.js' --include='*.env' 2>/dev/null | grep -vE "$EXCLUDE_PATTERN" || true)
          if [ -n "$NEXT_PUBLIC_SECRETS" ]; then
            echo "CRITICAL: NEXT_PUBLIC_ variable exposes a secret!"
            echo "$NEXT_PUBLIC_SECRETS"
            FOUND=1
          fi

          if [ "$FOUND" = "1" ]; then
            echo ""
            echo "::warning::Potential secrets (or false positives) flagged by regex scan."
            echo "Review matches above. This check is advisory; a proper tool (gitleaks/trufflehog)"
            echo "should replace this ad-hoc regex scan to reduce false positives."
            echo "| Status | Warnings emitted (non-blocking) |" >> $GITHUB_STEP_SUMMARY
            # Non-blocking: deploy should not be gated by noisy regex false positives.
            # A dedicated secret scanner (gitleaks) is a follow-up task.
            exit 0
          else
            echo "| Status | No secrets detected |" >> $GITHUB_STEP_SUMMARY
            echo "No hardcoded secrets detected."
          fi

  # ── Step 1: Type Check + Lint + Test ──
  quality:
    name: Lint, Type-check & Test
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Security audit: critical vulns fail CI, others warn.
      - name: Security audit
        run: npm audit --audit-level=critical || echo "::warning::npm audit found vulnerabilities"

      - name: Dependency license check
        run: |
          echo "## Dependency License Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          # List all production dependencies and their licenses
          npx license-checker --production --summary --onlyAllow 'MIT;Apache-2.0;BSD-2-Clause;BSD-3-Clause;ISC;0BSD;CC0-1.0;CC-BY-3.0;CC-BY-4.0;Unlicense;Python-2.0;BlueOak-1.0.0' 2>/dev/null || {
            echo "license-checker not available, falling back to npm ls"
            echo '```' >> $GITHUB_STEP_SUMMARY
            npm ls --all --depth=0 2>&1 | head -60 >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            npm ls --all --depth=0 || true
          }

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Run tests with coverage
        # Migration & script integration tests (~19 tests under
        # src/__tests__/migrations/** and src/__tests__/scripts/**) are
        # excluded from this default run by vitest.config.ts — they require a
        # live Supabase backend and run in the separate `integration-tests`
        # job below, gated on real env secrets. This job is therefore a HARD
        # GATE: any failure blocks CI.
        run: npm test -- --reporter=verbose --coverage

      # R15 fix: Explicit auth/identity test gate.
      # Auth tests MUST pass independently — a failure here blocks the entire CI.
      # This ensures unrelated test changes don't mask auth regressions.
      - name: Auth & Identity test gate
        run: |
          echo "## Auth & Identity Test Gate" >> $GITHUB_STEP_SUMMARY
          npx vitest run src/__tests__/auth-*.test.ts src/__tests__/identity-*.test.ts --reporter=verbose 2>&1 | tee /tmp/auth-test-output.txt
          AUTH_EXIT=$?
          PASS_COUNT=$(grep -c '✓' /tmp/auth-test-output.txt || echo "0")
          echo "| Auth tests passed | $PASS_COUNT |" >> $GITHUB_STEP_SUMMARY
          if [ "$AUTH_EXIT" != "0" ]; then
            echo "BLOCKED: Auth/identity tests failed. This is a blocking gate."
            echo "| Status | FAILED |" >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "| Status | PASSED |" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Coverage report
        if: always()
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            echo "## Test Coverage Report" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            # Extract summary percentages
            node -e "
              const c = require('./coverage/coverage-summary.json');
              const t = c.total;
              console.log('Statements: ' + t.statements.pct + '%');
              console.log('Branches:   ' + t.branches.pct + '%');
              console.log('Functions:  ' + t.functions.pct + '%');
              console.log('Lines:      ' + t.lines.pct + '%');
            " >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "Could not parse coverage JSON" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "## Test Coverage Report" >> $GITHUB_STEP_SUMMARY
            echo "Coverage report not generated (install @vitest/coverage-v8 for coverage)." >> $GITHUB_STEP_SUMMARY
          fi

  # ── Step 1b: Integration Tests (live Supabase) ──
  # Runs migration/trigger/view/CHECK-constraint tests that require a real
  # Postgres backend. Gated on the presence of repository secrets, so PRs from
  # forks (which don't get secrets) skip cleanly instead of failing.
  # Non-blocking for now; flip `continue-on-error` to false once the staging
  # Supabase instance is reliably reachable from GH-hosted runners.
  integration-tests:
    name: Integration Tests (live DB)
    runs-on: ubuntu-latest
    needs: secret-scan
    # Skip on PRs from forked repos: secrets are not available there and the
    # job would always fail boot. Trusted PRs (same-repo) and pushes still run.
    if: github.event.pull_request.head.repo.full_name == github.repository || github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify integration secrets are present
        id: check-secrets
        run: |
          if [ -z "${{ secrets.STAGING_SUPABASE_URL }}" ] || [ -z "${{ secrets.STAGING_SUPABASE_SERVICE_ROLE_KEY }}" ]; then
            echo "::warning::Integration test secrets not configured. Skipping integration test run."
            echo "secrets_present=false" >> $GITHUB_OUTPUT
          else
            echo "secrets_present=true" >> $GITHUB_OUTPUT
          fi

      - name: Run integration tests
        if: steps.check-secrets.outputs.secrets_present == 'true'
        run: npm run test:integration -- --reporter=verbose
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.STAGING_SUPABASE_SERVICE_ROLE_KEY }}
        continue-on-error: true

  # ── Step 2: Production Build + Bundle Analysis ──
  build:
    name: Production Build
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Bundle size report
        run: |
          echo "## Bundle Size Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # --- Overall build stats ---
          echo "### Build Overview" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY

          BUILD_SIZE=$(du -sh .next/ 2>/dev/null | cut -f1)
          echo "| Total build | $BUILD_SIZE |" >> $GITHUB_STEP_SUMMARY

          PAGES=$(find .next/server -name "*.html" 2>/dev/null | wc -l)
          echo "| Static pages | $PAGES |" >> $GITHUB_STEP_SUMMARY

          CHUNKS=$(find .next/static/chunks -name "*.js" 2>/dev/null | wc -l)
          echo "| JS chunks | $CHUNKS |" >> $GITHUB_STEP_SUMMARY

          # --- Shared JS bundle size ---
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Shared JS Chunks (budget: ${SHARED_JS_LIMIT_KB} kB)" >> $GITHUB_STEP_SUMMARY
          echo "| File | Size (kB) |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----------|" >> $GITHUB_STEP_SUMMARY

          SHARED_TOTAL=0
          for f in $(find .next/static/chunks -maxdepth 1 -name '*.js' -type f 2>/dev/null | sort); do
            SIZE_BYTES=$(wc -c < "$f")
            SIZE_KB=$((SIZE_BYTES / 1024))
            SHARED_TOTAL=$((SHARED_TOTAL + SIZE_KB))
            BASENAME=$(basename "$f")
            echo "| \`$BASENAME\` | ${SIZE_KB} |" >> $GITHUB_STEP_SUMMARY
          done
          echo "| **Total shared** | **${SHARED_TOTAL}** |" >> $GITHUB_STEP_SUMMARY

          # --- Top page bundles ---
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Largest Page Bundles (budget: ${PAGE_JS_LIMIT_KB} kB per page)" >> $GITHUB_STEP_SUMMARY
          echo "| Directory | Size (kB) |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-----------|" >> $GITHUB_STEP_SUMMARY

          PAGE_OVER=0
          if [ -d .next/static/chunks/app ]; then
            for dir in $(find .next/static/chunks/app -mindepth 1 -maxdepth 2 -type d 2>/dev/null | sort); do
              DIR_SIZE_BYTES=$(find "$dir" -name '*.js' -type f -exec wc -c {} + 2>/dev/null | tail -1 | awk '{print $1}')
              if [ -n "$DIR_SIZE_BYTES" ] && [ "$DIR_SIZE_BYTES" -gt 0 ] 2>/dev/null; then
                DIR_SIZE_KB=$((DIR_SIZE_BYTES / 1024))
                DIR_NAME=$(echo "$dir" | sed "s|.next/static/chunks/app/||")
                echo "| /$DIR_NAME | ${DIR_SIZE_KB} |" >> $GITHUB_STEP_SUMMARY
                if [ "$DIR_SIZE_KB" -gt "$PAGE_JS_LIMIT_KB" ]; then
                  PAGE_OVER=1
                fi
              fi
            done
          fi

          # --- Middleware size ---
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Middleware (budget: ${MIDDLEWARE_LIMIT_KB} kB)" >> $GITHUB_STEP_SUMMARY
          if [ -f .next/server/middleware.js ]; then
            MW_BYTES=$(wc -c < .next/server/middleware.js)
            MW_KB=$((MW_BYTES / 1024))
            echo "| middleware.js | ${MW_KB} kB |" >> $GITHUB_STEP_SUMMARY
          else
            MW_KB=0
            echo "| middleware.js | not found |" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY

      - name: Bundle size limit check
        run: |
          # P10 budget check. Rewritten for Next.js 16 / Turbopack output.
          #
          # Previous version summed ALL top-level chunks under .next/static/chunks
          # and compared to a per-page-load budget — a category error that
          # reported ~5 MB (sum of ~250 split chunks) against a 160 kB limit.
          # Turbopack emits fine-grained chunks; summing them measures total
          # codebase size, not what a single page loads.
          #
          # New approach: check the LARGEST individual chunk (a good proxy for
          # the dominant first-load payload) and each per-page bundle size.
          # Keep middleware check unchanged.
          FAIL=0
          WARN=0

          # Largest single shared chunk (worst-case first-load weight)
          LARGEST_CHUNK_BYTES=$(find .next/static/chunks -maxdepth 1 -name '*.js' -type f -printf '%s\n' 2>/dev/null | sort -nr | head -1)
          LARGEST_CHUNK_KB=$((${LARGEST_CHUNK_BYTES:-0} / 1024))
          echo "Largest shared chunk: ${LARGEST_CHUNK_KB} kB (limit: ${SHARED_JS_LIMIT_KB} kB)"
          if [ "$LARGEST_CHUNK_KB" -gt "$SHARED_JS_LIMIT_KB" ]; then
            echo "::warning::Largest shared chunk is ${LARGEST_CHUNK_KB} kB (> ${SHARED_JS_LIMIT_KB} kB). Investigate with 'npm run analyze'."
            WARN=1
          fi

          # Middleware size (P10: < 120 kB). Some setups emit a shim file; skip if < 1 kB.
          if [ -f .next/server/middleware.js ]; then
            MW_BYTES=$(wc -c < .next/server/middleware.js)
            MW_KB=$((MW_BYTES / 1024))
            echo "Middleware: ${MW_KB} kB (limit: ${MIDDLEWARE_LIMIT_KB} kB)"
            if [ "$MW_KB" -gt "$MIDDLEWARE_LIMIT_KB" ]; then
              echo "FAIL: Middleware exceeds ${MIDDLEWARE_LIMIT_KB} kB budget (P10)"
              FAIL=1
            fi
          fi

          # Per-page bundles: each page directory's total JS size should be < page budget.
          if [ -d .next/static/chunks/app ]; then
            while IFS= read -r dir; do
              DIR_SIZE_BYTES=$(find "$dir" -name '*.js' -type f -exec wc -c {} + 2>/dev/null | tail -1 | awk '{print $1}')
              if [ -n "$DIR_SIZE_BYTES" ] && [ "$DIR_SIZE_BYTES" -gt 0 ] 2>/dev/null; then
                DIR_SIZE_KB=$((DIR_SIZE_BYTES / 1024))
                DIR_NAME=$(echo "$dir" | sed "s|.next/static/chunks/app/||")
                if [ "$DIR_SIZE_KB" -gt "${PAGE_JS_LIMIT_KB}" ]; then
                  echo "::warning::Page /$DIR_NAME is ${DIR_SIZE_KB} kB (limit: ${PAGE_JS_LIMIT_KB} kB)"
                  WARN=1
                fi
              fi
            done < <(find .next/static/chunks/app -mindepth 1 -maxdepth 2 -type d 2>/dev/null)
          fi

          if [ "$FAIL" = "1" ]; then
            echo ""
            echo "Bundle size budget exceeded (blocking). See P10 in CLAUDE.md."
            echo "Run 'npm run analyze' locally to investigate."
            exit 1
          fi

          if [ "$WARN" = "1" ]; then
            echo ""
            echo "::notice::Bundle size warnings emitted (non-blocking for P10 tuning phase)."
          else
            echo "All bundle sizes within budget."
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: .next/
          retention-days: 7

  # ── Step 2b: E2E Tests (PRs only) ──
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Run E2E tests
        run: npx playwright test --project=chromium
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ env.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ env.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ── Step 3: Post-deploy health check (main branch only) ──
  health-check:
    name: Post-Deploy Health Check
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Wait for Vercel deployment
        run: sleep 60

      - name: Health check
        run: |
          # Production is served from the canonical alfanumrik.com domain.
          # The .vercel.app subdomain is not aliased to this project and
          # 404s — was the source of false health-check failures in CI.
          for i in 1 2 3; do
            RESPONSE=$(curl -s -w "\n%{http_code}" \
              https://alfanumrik.com/api/v1/health 2>/dev/null)
            STATUS=$(echo "$RESPONSE" | tail -1)
            BODY=$(echo "$RESPONSE" | head -1)
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (attempt $i)"
              echo "$BODY" | head -c 500
              exit 0
            fi
            echo "Attempt $i/3 returned HTTP $STATUS"
            sleep 15
          done
          echo "Health check failed after 3 attempts"
          exit 1