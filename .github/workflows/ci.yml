name: CI — Alfanumrik

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  NEXT_PUBLIC_SUPABASE_URL: 'https://placeholder.supabase.co'
  NEXT_PUBLIC_SUPABASE_ANON_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.placeholder'
  # Distinct placeholder (NOT equal to anon key) so src/lib/env.ts
  # validateServerEnv() does not throw at test boot. Tests that actually
  # exercise Supabase will still fail with network errors against
  # placeholder.supabase.co — those are integration tests and gated by
  # continue-on-error on the test step. Must differ from the anon
  # placeholder above or env.ts's anti-leak check will trigger.
  SUPABASE_SERVICE_ROLE_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.ci-placeholder-service-role'
  # Bundle size limits (kB gzipped). Matches P10 budget from CLAUDE.md.
  # Restored 2026-05-05: cap returned to 160 kB after (1) PostHogProvider
  # lazy-loaded via next/dynamic (PR #534, e34a7452) and (2) the local
  # scripts/check-bundle-size.mjs measureShared() rewritten to count layout
  # chunks (D5 follow-up). The CI bash gate below checks the LARGEST single
  # shared chunk (currently ~91 kB gzipped), well under 160. The local
  # script reports total honest first-paint shared (~265 kB) under its own
  # interim 270 kB cap; reduce that cap once Supabase auth client is
  # split out of the root layout (TODO #1 in scripts/check-bundle-size.mjs).
  SHARED_JS_LIMIT_KB: 160
  PAGE_JS_LIMIT_KB: 260
  MIDDLEWARE_LIMIT_KB: 120

jobs:
  # ── Step 0: Secret Scanning ──
  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    permissions:
      contents: read       # gitleaks needs to read repo history
      pull-requests: read  # gitleaks needs the PR commit list (fixes 403)
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # Full history required by gitleaks to scan diffs

      # Real secret scanner (low false-positive rate, industry standard).
      # Pinned major to v2 for stability; config in .gitleaks.toml if/when added.
      # Audit 2026-04-27 F23: flipped from advisory → BLOCKING. Secret leaks
      # must fail CI. If a finding is a known false positive, allowlist it via
      # .gitleaks.toml (preferred) rather than re-disabling this gate.
      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Scan for hardcoded secrets
        run: |
          echo "## Secret Scanning Report" >> $GITHUB_STEP_SUMMARY
          FOUND=0

          # Patterns that indicate leaked secrets
          # Exclude: placeholder values in CI env, test fixtures, lock files, .env.example,
          # test files with deliberate fake credentials for redaction/mock tests,
          # documentation examples, and worktree copies.
          EXCLUDE_PATTERN="ci.yml|deploy-production.yml|deploy-staging.yml|package-lock.json|\.env\.example|\.env\.local\.example|node_modules|__tests__/|\.test\.(ts|tsx|js|jsx)|\.spec\.(ts|tsx|js|jsx)|e2e/|docs/|\.claude/worktrees/|coverage/"

          for PATTERN in \
            'sk_live_[a-zA-Z0-9]{20,}' \
            'rzp_live_[a-zA-Z0-9]{10,}' \
            'SUPABASE_SERVICE_ROLE_KEY\s*[:=]\s*eyJ' \
            'service_role.*eyJ[a-zA-Z0-9_-]{50,}' \
            'NEXT_PUBLIC_.*SERVICE_ROLE' \
            'NEXT_PUBLIC_.*SECRET' \
            'password\s*[:=]\s*["\x27][^"\x27]{8,}' \
            'ghp_[a-zA-Z0-9]{36}' \
            'sk-[a-zA-Z0-9]{20,}' \
          ; do
            MATCHES=$(grep -rn --include='*.ts' --include='*.tsx' --include='*.js' --include='*.jsx' --include='*.json' --include='*.env' --include='*.yml' --include='*.yaml' -E "$PATTERN" . 2>/dev/null | grep -vE "$EXCLUDE_PATTERN" || true)
            if [ -n "$MATCHES" ]; then
              echo "| FOUND | \`$PATTERN\` |" >> $GITHUB_STEP_SUMMARY
              echo "$MATCHES"
              FOUND=1
            fi
          done

          # Check NEXT_PUBLIC_ vars don't contain secret-like values.
          # Match only contiguous identifier names like NEXT_PUBLIC_MY_SERVICE_ROLE
          # (no spaces / punctuation between), to avoid matching error strings that
          # mention both NEXT_PUBLIC_SUPABASE_URL and SERVICE_ROLE_KEY separately.
          NEXT_PUBLIC_SECRETS=$(grep -rnE 'NEXT_PUBLIC_[A-Z0-9_]*(SERVICE_ROLE|SECRET_KEY|PRIVATE_KEY)' . --include='*.ts' --include='*.tsx' --include='*.js' --include='*.env' 2>/dev/null | grep -vE "$EXCLUDE_PATTERN" || true)
          if [ -n "$NEXT_PUBLIC_SECRETS" ]; then
            echo "CRITICAL: NEXT_PUBLIC_ variable exposes a secret!"
            echo "$NEXT_PUBLIC_SECRETS"
            FOUND=1
          fi

          if [ "$FOUND" = "1" ]; then
            echo ""
            echo "::warning::Potential secrets (or false positives) flagged by regex scan."
            echo "Review matches above. This check is advisory; a proper tool (gitleaks/trufflehog)"
            echo "should replace this ad-hoc regex scan to reduce false positives."
            echo "| Status | Warnings emitted (non-blocking) |" >> $GITHUB_STEP_SUMMARY
            # Non-blocking: deploy should not be gated by noisy regex false positives.
            # A dedicated secret scanner (gitleaks) is a follow-up task.
            exit 0
          else
            echo "| Status | No secrets detected |" >> $GITHUB_STEP_SUMMARY
            echo "No hardcoded secrets detected."
          fi

      # P8 enforcement: every migration that creates a table must enable RLS in
      # the same file. The post-edit-check.sh hook is per-table and advisory;
      # this is a file-level CI gate that BLOCKS merge. A migration that legitimately
      # creates only views/types/functions will not contain "CREATE TABLE" and
      # is unaffected. _legacy/ is skipped (pre-RLS-baseline migrations).
      - name: Migration safety — RLS-on-CREATE-TABLE
        run: |
          echo "## Migration Safety: RLS Coverage" >> $GITHUB_STEP_SUMMARY
          MISSING=0
          OFFENDERS=""
          # Scan every .sql under supabase/migrations except _legacy/.
          for f in $(find supabase/migrations -name '*.sql' -not -path '*/_legacy/*' 2>/dev/null | sort); do
            # Strip SQL comments (-- and /* */) before pattern checks so commented-out
            # CREATE TABLE in a doc block doesn't trigger a false positive.
            STRIPPED=$(sed -E 's|--.*$||; s|/\*.*\*/||g' "$f")
            HAS_CREATE=$(echo "$STRIPPED" | grep -ciE '\bcreate[[:space:]]+table\b' || true)
            if [ "${HAS_CREATE:-0}" -gt 0 ]; then
              HAS_RLS=$(echo "$STRIPPED" | grep -ciE 'enable[[:space:]]+row[[:space:]]+level[[:space:]]+security' || true)
              if [ "${HAS_RLS:-0}" -eq 0 ]; then
                OFFENDERS="$OFFENDERS\n  - $f"
                MISSING=1
              fi
            fi
          done
          if [ "$MISSING" = "1" ]; then
            echo "BLOCKED: Migrations create tables without enabling RLS:" | tee -a $GITHUB_STEP_SUMMARY
            echo -e "$OFFENDERS" | tee -a $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Per CLAUDE.md P8: every new table must have RLS enabled and at least one policy in the same migration." >> $GITHUB_STEP_SUMMARY
            echo "Add: ALTER TABLE <name> ENABLE ROW LEVEL SECURITY; plus appropriate policies." >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "| Status | All CREATE TABLE migrations enable RLS |" >> $GITHUB_STEP_SUMMARY
          fi

  # ── Step 0b: Exact selected-school migration integration ──
  # Apply only the V3 selected-school RPC migration to an explicit current-
  # schema fixture on local PG17. Historical migrations are out of scope.
  selected-school-rpc-integration:
    name: Selected-School RPC Migration Integration (local PG17)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      NEXT_PUBLIC_SUPABASE_URL: ''
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ''
      SUPABASE_SERVICE_ROLE_KEY: ''
      SUPABASE_ACCESS_TOKEN: ''
      SUPABASE_DB_PASSWORD: ''
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Detect selected-school migration inputs
        id: selected_rpc_changes
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            base_sha="$PR_BASE_SHA"
          else
            base_sha="$PUSH_BEFORE_SHA"
          fi

          git cat-file -e "${HEAD_SHA}^{commit}"

          # Initial/force pushes may have an all-zero or unreachable before SHA.
          # Replay fail-closed instead of incorrectly skipping validation.
          if [[ -z "$base_sha" || "$base_sha" =~ ^0+$ ]] || \
             ! git cat-file -e "${base_sha}^{commit}" 2>/dev/null; then
            echo "::warning::Comparison base is unavailable; forcing selected-school integration."
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "### Selected-school RPC migration integration" >> "$GITHUB_STEP_SUMMARY"
            echo "Comparison base unavailable; integration forced fail-closed." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          changes="$RUNNER_TEMP/selected-school-rpc-changes.txt"
          git diff --name-status --diff-filter=ACDMRTUXB \
            "$base_sha" "$HEAD_SHA" -- \
            '.github/fixtures/selected-school-rpc-current-schema.sql' \
            '.github/workflows/ci.yml' \
            'supabase/config.toml' \
            'supabase/migrations/20260711230713_v3_school_admin_students_selected_scope.sql' \
            > "$changes"

          echo "### Selected-school RPC migration integration" >> "$GITHUB_STEP_SUMMARY"
          if [[ -s "$changes" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Targeted integration inputs changed:" >> "$GITHUB_STEP_SUMMARY"
            echo '```text' >> "$GITHUB_STEP_SUMMARY"
            tee -a "$GITHUB_STEP_SUMMARY" < "$changes"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No selected-school integration inputs changed; local stack not required." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Set up pinned Supabase CLI
        if: steps.selected_rpc_changes.outputs.changed == 'true'
        uses: supabase/setup-cli@v2
        with:
          version: 2.109.1

      - name: Start isolated local Supabase
        if: steps.selected_rpc_changes.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          workdir="$RUNNER_TEMP/selected-school-rpc"
          mkdir -p "$workdir"
          supabase init --workdir "$workdir" --force

          for remote_credential in \
            NEXT_PUBLIC_SUPABASE_URL \
            NEXT_PUBLIC_SUPABASE_ANON_KEY \
            SUPABASE_SERVICE_ROLE_KEY \
            SUPABASE_ACCESS_TOKEN \
            SUPABASE_DB_PASSWORD
          do
            if [[ -n "${!remote_credential:-}" ]]; then
              echo "::error::Remote credential $remote_credential must be absent."
              exit 1
            fi
          done

          # Preserve production schema parity while removing the committed
          # production project ref before any Supabase process starts.
          cp "$GITHUB_WORKSPACE/supabase/config.toml" \
             "$workdir/supabase/config.toml"
          sed -i -E \
            "s|^project_id = .*|project_id = \"ci-selected-rpc-${GITHUB_RUN_ID}\"|" \
            "$workdir/supabase/config.toml"
          grep -Eq \
            '^project_id = "ci-selected-rpc-[0-9]+"$' \
            "$workdir/supabase/config.toml" || {
              echo "::error::Failed to sanitize local Supabase project_id."
              exit 1
            }

          # Start an empty local PG17 stack. The next step builds the explicit
          # current-schema fixture and applies exactly one migration via psql.
          supabase start --workdir "$workdir" \
            --exclude=studio,mailpit,imgproxy,storage-api,realtime,edge-runtime

      - name: Build fixture and apply exact selected-school migration
        if: steps.selected_rpc_changes.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          workdir="$RUNNER_TEMP/selected-school-rpc"
          fixture="$GITHUB_WORKSPACE/.github/fixtures/selected-school-rpc-current-schema.sql"
          migration="$GITHUB_WORKSPACE/supabase/migrations/20260711230713_v3_school_admin_students_selected_scope.sql"

          test -s "$fixture" || {
            echo "::error::Selected-school current-schema fixture is missing or empty."
            exit 1
          }
          test -s "$migration" || {
            echo "::error::Selected-school migration is missing or empty."
            exit 1
          }

          if ! command -v psql >/dev/null 2>&1; then
            sudo apt-get update -qq
            sudo apt-get install -y -qq --no-install-recommends postgresql-client
          fi

          db_url="$(
            supabase status --workdir "$workdir" --output env 2>/dev/null |
              sed -nE 's/^DB_URL="?([^"]+)"?$/\1/p' |
              head -1
          )"

          if [[ ! "$db_url" =~ ^postgresql://postgres(:[^@]*)?@(127\.0\.0\.1|localhost):[0-9]+/postgres$ ]]; then
            echo "::error::Refusing non-local selected-school migration database."
            exit 1
          fi

          server_version_num="$(psql "$db_url" -X -Atqc 'SHOW server_version_num')"
          if [[ ! "$server_version_num" =~ ^17[0-9]{4}$ ]]; then
            echo "::error::Selected-school integration requires PostgreSQL 17; got $server_version_num."
            exit 1
          fi

          psql "$db_url" -X -v ON_ERROR_STOP=1 -f "$fixture"
          psql "$db_url" -X -v ON_ERROR_STOP=1 -f "$migration"

          echo "Applied only 20260711230713 to the current-schema PG17 fixture." \
            >> "$GITHUB_STEP_SUMMARY"

      - name: Verify selected-school RPC behavior and catalog
        if: steps.selected_rpc_changes.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          workdir="$RUNNER_TEMP/selected-school-rpc"

          if ! command -v psql >/dev/null 2>&1; then
            sudo apt-get update -qq
            sudo apt-get install -y -qq --no-install-recommends postgresql-client
          fi

          db_url="$(
            supabase status --workdir "$workdir" --output env 2>/dev/null |
              sed -nE 's/^DB_URL="?([^"]+)"?$/\1/p' |
              head -1
          )"

          if [[ ! "$db_url" =~ ^postgresql://postgres(:[^@]*)?@(127\.0\.0\.1|localhost):[0-9]+/postgres$ ]]; then
            echo "::error::Refusing non-local migration assertion database."
            exit 1
          fi

          psql "$db_url" -X -v ON_ERROR_STOP=1 <<'SQL'
          \set ON_ERROR_STOP on

          BEGIN;

          -- Catalog and privilege contract.
          DO $catalog$
          DECLARE
            v_sig text;
            v_role text;
            v_helper constant text :=
              'public.school_admin_has_selected_permission(uuid,text)';
            v_new text[] := ARRAY[
              'public.school_admin_list_students(uuid,integer,integer,text,text)',
              'public.school_admin_toggle_student_active(uuid,uuid,boolean)',
              'public.school_admin_attach_created_student(uuid,uuid,text,uuid)',
              'public.school_admin_student_create_preflight(uuid,text,integer,uuid)'
            ];
            v_legacy text[] := ARRAY[
              'public.school_admin_list_students(integer,integer,text,text)',
              'public.school_admin_toggle_student_active(uuid,boolean)',
              'public.school_admin_attach_created_student(uuid,text,uuid)',
              'public.school_admin_student_create_preflight(text,integer,uuid)',
              'public.school_admin_student_create_preflight(text,integer)'
            ];
          BEGIN
            IF to_regprocedure(v_helper) IS NULL THEN
              RAISE EXCEPTION 'missing internal selected-school permission helper';
            END IF;

            IF NOT EXISTS (
              SELECT 1
              FROM pg_proc p
              WHERE p.oid = to_regprocedure(v_helper)
                AND p.prosecdef
                AND 'search_path=public' =
                    ANY(COALESCE(p.proconfig, ARRAY[]::text[]))
            ) THEN
              RAISE EXCEPTION
                'permission helper must be SECURITY DEFINER with search_path=public';
            END IF;

            -- “Internal only” includes service_role because the baseline grants
            -- service_role EXECUTE on newly-created functions by default.
            FOREACH v_role IN ARRAY ARRAY[
              'anon',
              'authenticated',
              'service_role'
            ] LOOP
              IF has_function_privilege(v_role, v_helper, 'EXECUTE') THEN
                RAISE EXCEPTION
                  'role % can execute internal permission helper', v_role;
              END IF;
            END LOOP;

            FOREACH v_sig IN ARRAY v_new LOOP
              IF to_regprocedure(v_sig) IS NULL THEN
                RAISE EXCEPTION 'missing new overload: %', v_sig;
              END IF;

              IF NOT has_function_privilege(
                'authenticated',
                v_sig,
                'EXECUTE'
              ) THEN
                RAISE EXCEPTION
                  'authenticated lacks EXECUTE on %', v_sig;
              END IF;

              IF has_function_privilege('anon', v_sig, 'EXECUTE') THEN
                RAISE EXCEPTION 'anon can execute %', v_sig;
              END IF;

              IF NOT EXISTS (
                SELECT 1
                FROM pg_proc p
                WHERE p.oid = to_regprocedure(v_sig)
                  AND p.prosecdef
                  AND 'search_path=public' =
                      ANY(COALESCE(p.proconfig, ARRAY[]::text[]))
              ) THEN
                RAISE EXCEPTION
                  '% must be SECURITY DEFINER with search_path=public', v_sig;
              END IF;
            END LOOP;

            FOREACH v_sig IN ARRAY v_legacy LOOP
              IF to_regprocedure(v_sig) IS NULL THEN
                RAISE EXCEPTION
                  'legacy overload was removed: %', v_sig;
              END IF;

              IF NOT has_function_privilege(
                'authenticated',
                v_sig,
                'EXECUTE'
              ) THEN
                RAISE EXCEPTION
                  'legacy authenticated grant was removed: %', v_sig;
              END IF;
            END LOOP;

            -- Pin the concurrency repair in the mutating toggle overload.
            IF position(
              'pg_advisory_xact_lock' IN pg_get_functiondef(
                to_regprocedure(
                  'public.school_admin_toggle_student_active(uuid,uuid,boolean)'
                )
              )
            ) = 0 OR position(
              'school_seat:' IN pg_get_functiondef(
                to_regprocedure(
                  'public.school_admin_toggle_student_active(uuid,uuid,boolean)'
                )
              )
            ) = 0 THEN
              RAISE EXCEPTION
                'toggle overload lacks the canonical school_seat advisory lock';
            END IF;
          END;
          $catalog$;

          -- The explicit current-schema fixture pins this required RBAC mapping.
          DO $rbac$
          BEGIN
            IF NOT EXISTS (
              SELECT 1
              FROM public.roles r
              JOIN public.role_permissions rp ON rp.role_id = r.id
              JOIN public.permissions p ON p.id = rp.permission_id
              WHERE r.name = 'institution_admin'
                AND r.is_active = true
                AND p.code = 'institution.manage_students'
                AND p.is_active = true
            ) THEN
              RAISE EXCEPTION
                'institution_admin lacks institution.manage_students';
            END IF;
          END;
          $rbac$;

          -- Auth fixtures. role=ci_fixture avoids profile-trigger side effects.
          INSERT INTO auth.users (
            id,
            aud,
            role,
            email,
            email_confirmed_at,
            raw_app_meta_data,
            raw_user_meta_data,
            created_at,
            updated_at
          )
          VALUES
            (
              '20000000-0000-0000-0000-000000000001',
              'authenticated',
              'authenticated',
              'ci-admin-a@example.invalid',
              now(),
              '{"provider":"email","providers":["email"]}'::jsonb,
              '{"role":"ci_fixture"}'::jsonb,
              now(),
              now()
            ),
            (
              '20000000-0000-0000-0000-000000000002',
              'authenticated',
              'authenticated',
              'ci-admin-denied@example.invalid',
              now(),
              '{"provider":"email","providers":["email"]}'::jsonb,
              '{"role":"ci_fixture"}'::jsonb,
              now(),
              now()
            ),
            (
              '20000000-0000-0000-0000-000000000003',
              'authenticated',
              'authenticated',
              'ci-student-attach-ok@example.invalid',
              now(),
              '{"provider":"email","providers":["email"]}'::jsonb,
              '{"role":"ci_fixture"}'::jsonb,
              now(),
              now()
            ),
            (
              '20000000-0000-0000-0000-000000000004',
              'authenticated',
              'authenticated',
              'ci-student-attach-denied@example.invalid',
              now(),
              '{"provider":"email","providers":["email"]}'::jsonb,
              '{"role":"ci_fixture"}'::jsonb,
              now(),
              now()
            );

          INSERT INTO public.schools (
            id,
            name,
            code,
            is_active,
            max_students
          )
          VALUES
            (
              '10000000-0000-0000-0000-000000000001',
              'CI Selected School A',
              'CI-RPC-A',
              true,
              100
            ),
            (
              '10000000-0000-0000-0000-000000000002',
              'CI Other School B',
              'CI-RPC-B',
              true,
              100
            );

          INSERT INTO public.school_admins (
            id,
            auth_user_id,
            school_id,
            role,
            name,
            email,
            is_active
          )
          VALUES
            (
              '21000000-0000-0000-0000-000000000001',
              '20000000-0000-0000-0000-000000000001',
              '10000000-0000-0000-0000-000000000001',
              'institution_admin',
              'CI Authorized Admin',
              'ci-admin-a@example.invalid',
              true
            ),
            (
              '21000000-0000-0000-0000-000000000002',
              '20000000-0000-0000-0000-000000000002',
              '10000000-0000-0000-0000-000000000001',
              'principal',
              'CI Permission-Denied Admin',
              'ci-admin-denied@example.invalid',
              true
            );

          -- Make the authorized fixture deterministic even if trigger behavior
          -- changes; remove all role authority from the denied fixture.
          INSERT INTO public.user_roles (
            auth_user_id,
            role_id,
            is_active
          )
          SELECT
            '20000000-0000-0000-0000-000000000001'::uuid,
            r.id,
            true
          FROM public.roles r
          WHERE r.name = 'institution_admin'
            AND r.is_active = true
          ON CONFLICT (auth_user_id, role_id)
          DO UPDATE SET
            is_active = true,
            expires_at = NULL;

          DELETE FROM public.user_roles
          WHERE auth_user_id =
            '20000000-0000-0000-0000-000000000002'::uuid;

          INSERT INTO public.classes (
            id,
            school_id,
            name,
            grade,
            section,
            is_active
          )
          VALUES
            (
              '40000000-0000-0000-0000-000000000001',
              '10000000-0000-0000-0000-000000000001',
              'CI Class A',
              '6',
              'A',
              true
            ),
            (
              '40000000-0000-0000-0000-000000000002',
              '10000000-0000-0000-0000-000000000002',
              'CI Class B',
              '6',
              'B',
              true
            );

          INSERT INTO public.students (
            id,
            auth_user_id,
            name,
            email,
            grade,
            school_id,
            is_active
          )
          VALUES
            (
              '30000000-0000-0000-0000-000000000001',
              NULL,
              'CI Student A',
              'ci-student-a@example.invalid',
              '6',
              '10000000-0000-0000-0000-000000000001',
              false
            ),
            (
              '30000000-0000-0000-0000-000000000002',
              NULL,
              'CI Student B',
              'ci-student-b@example.invalid',
              '6',
              '10000000-0000-0000-0000-000000000002',
              true
            ),
            (
              '30000000-0000-0000-0000-000000000003',
              '20000000-0000-0000-0000-000000000003',
              'CI Attach Success',
              'ci-student-attach-ok@example.invalid',
              '6',
              NULL,
              false
            ),
            (
              '30000000-0000-0000-0000-000000000004',
              '20000000-0000-0000-0000-000000000004',
              'CI Attach Denied',
              'ci-student-attach-denied@example.invalid',
              '6',
              NULL,
              false
            );

          -- Two records deliberately verify deterministic active/newest
          -- subscription selection; school_id has no UNIQUE constraint.
          INSERT INTO public.school_subscriptions (
            id,
            school_id,
            plan,
            billing_cycle,
            seats_purchased,
            status,
            created_at
          )
          VALUES
            (
              '50000000-0000-0000-0000-000000000001',
              '10000000-0000-0000-0000-000000000001',
              'trial',
              'monthly',
              1,
              'expired',
              now() - interval '2 days'
            ),
            (
              '50000000-0000-0000-0000-000000000002',
              '10000000-0000-0000-0000-000000000001',
              'trial',
              'monthly',
              5,
              'active',
              now()
            );

          -- Authorized selected-school success under the real authenticated role.
          SELECT set_config(
            'request.jwt.claim.sub',
            '20000000-0000-0000-0000-000000000001',
            true
          );
          SELECT set_config(
            'request.jwt.claims',
            '{"sub":"20000000-0000-0000-0000-000000000001","role":"authenticated"}',
            true
          );
          SET LOCAL ROLE authenticated;

          DO $authorized$
          DECLARE
            v_result jsonb;
          BEGIN
            IF auth.uid() IS DISTINCT FROM
              '20000000-0000-0000-0000-000000000001'::uuid
            THEN
              RAISE EXCEPTION 'auth.uid fixture setup failed';
            END IF;

            v_result := public.school_admin_list_students(
              '10000000-0000-0000-0000-000000000001',
              1,
              20,
              NULL,
              NULL
            );

            IF v_result->>'success' IS DISTINCT FROM 'true'
              OR jsonb_array_length(v_result->'data') <> 1
              OR v_result#>>'{data,0,id}' IS DISTINCT FROM
                '30000000-0000-0000-0000-000000000001'
            THEN
              RAISE EXCEPTION
                'selected-school roster leaked or omitted rows: %', v_result;
            END IF;

            v_result := public.school_admin_student_create_preflight(
              '10000000-0000-0000-0000-000000000001',
              'new-student@example.invalid',
              1,
              '40000000-0000-0000-0000-000000000001'
            );

            IF v_result->>'success' IS DISTINCT FROM 'true'
              OR (v_result#>>'{data,seatsPurchased}')::integer
                   IS DISTINCT FROM 5
              OR (v_result#>>'{data,seatCapViolation}')::boolean
                   IS DISTINCT FROM false
            THEN
              RAISE EXCEPTION
                'selected-school preflight failed or chose stale subscription: %',
                v_result;
            END IF;

            v_result := public.school_admin_toggle_student_active(
              '10000000-0000-0000-0000-000000000001',
              '30000000-0000-0000-0000-000000000001',
              true
            );

            IF v_result->>'success' IS DISTINCT FROM 'true' THEN
              RAISE EXCEPTION
                'authorized toggle failed: %', v_result;
            END IF;

            v_result := public.school_admin_attach_created_student(
              '10000000-0000-0000-0000-000000000001',
              '20000000-0000-0000-0000-000000000003',
              '+910000000001',
              '40000000-0000-0000-0000-000000000001'
            );

            IF v_result->>'success' IS DISTINCT FROM 'true' THEN
              RAISE EXCEPTION
                'authorized attach failed: %', v_result;
            END IF;
          END;
          $authorized$;

          RESET ROLE;

          DO $authorized_mutations$
          BEGIN
            IF (
              SELECT s.is_active
              FROM public.students s
              WHERE s.id =
                '30000000-0000-0000-0000-000000000001'::uuid
            ) IS DISTINCT FROM true THEN
              RAISE EXCEPTION 'authorized toggle did not persist';
            END IF;

            IF (
              SELECT s.school_id
              FROM public.students s
              WHERE s.id =
                '30000000-0000-0000-0000-000000000003'::uuid
            ) IS DISTINCT FROM
              '10000000-0000-0000-0000-000000000001'::uuid
            THEN
              RAISE EXCEPTION 'authorized attach did not bind selected school';
            END IF;

            IF NOT EXISTS (
              SELECT 1
              FROM public.class_students cs
              WHERE cs.class_id =
                '40000000-0000-0000-0000-000000000001'::uuid
                AND cs.student_id =
                  '30000000-0000-0000-0000-000000000003'::uuid
            ) THEN
              RAISE EXCEPTION 'authorized attach omitted class membership';
            END IF;
          END;
          $authorized_mutations$;

          -- Non-member and cross-school denial.
          SET LOCAL ROLE authenticated;

          DO $cross_school$
          DECLARE
            v_result jsonb;
          BEGIN
            v_result := public.school_admin_list_students(
              '10000000-0000-0000-0000-000000000002',
              1,
              20,
              NULL,
              NULL
            );

            IF v_result->>'status' IS DISTINCT FROM '403' THEN
              RAISE EXCEPTION
                'non-member school selection did not fail closed: %', v_result;
            END IF;

            v_result := public.school_admin_toggle_student_active(
              '10000000-0000-0000-0000-000000000001',
              '30000000-0000-0000-0000-000000000002',
              false
            );

            IF v_result->>'status' IS DISTINCT FROM '404' THEN
              RAISE EXCEPTION
                'cross-school student toggle did not fail closed: %', v_result;
            END IF;

            v_result := public.school_admin_attach_created_student(
              '10000000-0000-0000-0000-000000000001',
              '20000000-0000-0000-0000-000000000004',
              NULL,
              '40000000-0000-0000-0000-000000000002'
            );

            IF v_result->>'status' IS DISTINCT FROM '403' THEN
              RAISE EXCEPTION
                'cross-school class attach did not fail closed: %', v_result;
            END IF;

            v_result := public.school_admin_student_create_preflight(
              '10000000-0000-0000-0000-000000000001',
              'cross-class@example.invalid',
              1,
              '40000000-0000-0000-0000-000000000002'
            );

            IF v_result->>'status' IS DISTINCT FROM '403' THEN
              RAISE EXCEPTION
                'cross-school class preflight did not fail closed: %', v_result;
            END IF;
          END;
          $cross_school$;

          RESET ROLE;

          DO $negative_mutations$
          BEGIN
            IF (
              SELECT s.is_active
              FROM public.students s
              WHERE s.id =
                '30000000-0000-0000-0000-000000000002'::uuid
            ) IS DISTINCT FROM true THEN
              RAISE EXCEPTION 'cross-school toggle mutated the student';
            END IF;

            IF (
              SELECT s.school_id
              FROM public.students s
              WHERE s.id =
                '30000000-0000-0000-0000-000000000004'::uuid
            ) IS NOT NULL THEN
              RAISE EXCEPTION 'cross-school attach claimed the student';
            END IF;

            IF EXISTS (
              SELECT 1
              FROM public.class_students cs
              WHERE cs.student_id =
                '30000000-0000-0000-0000-000000000004'::uuid
            ) THEN
              RAISE EXCEPTION
                'cross-school attach created a class membership';
            END IF;
          END;
          $negative_mutations$;

          -- Active membership without RBAC permission must still be denied.
          SELECT set_config(
            'request.jwt.claim.sub',
            '20000000-0000-0000-0000-000000000002',
            true
          );
          SELECT set_config(
            'request.jwt.claims',
            '{"sub":"20000000-0000-0000-0000-000000000002","role":"authenticated"}',
            true
          );
          SET LOCAL ROLE authenticated;

          DO $permission_denied$
          DECLARE
            v_result jsonb;
          BEGIN
            v_result := public.school_admin_list_students(
              '10000000-0000-0000-0000-000000000001',
              1,
              20,
              NULL,
              NULL
            );

            IF v_result->>'status' IS DISTINCT FROM '403'
              OR v_result->>'error'
                   IS DISTINCT FROM 'Missing permission for the selected school'
            THEN
              RAISE EXCEPTION
                'membership without permission did not fail closed: %',
                v_result;
            END IF;
          END;
          $permission_denied$;

          RESET ROLE;
          ROLLBACK;
          SQL

          echo "Selected-school RPC catalog and behavioral assertions passed." \
            >> "$GITHUB_STEP_SUMMARY"

      - name: Stop isolated local Supabase
        if: ${{ always() && steps.selected_rpc_changes.outputs.changed == 'true' }}
        shell: bash
        run: |
          workdir="$RUNNER_TEMP/selected-school-rpc"
          if command -v supabase >/dev/null 2>&1; then
            supabase stop --workdir "$workdir" --no-backup || \
              echo "::warning::Local Supabase cleanup reported an error; runner teardown will remove remaining containers."
          fi
          rm -rf -- "$workdir"

  # ── Step 1: Type Check + Lint + Test ──
  # Runs independently of secret-scan so an infra failure in gitleaks
  # (e.g. the v2 action's 403 on individual-account PR commits) can't
  # silently disable test verification. Previously: `needs: secret-scan`
  # caused this job to SKIP on every PR where gitleaks failed, which
  # masked two broken test files (#788 B.2, #798 D.1) until they only
  # surfaced on main when CI finally had time to complete.
  quality:
    name: Lint, Type-check & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache node_modules
        id: cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: npm ci

      # ADR-006 #4: both Anthropic call paths (Node claude.ts, Deno
      # reliability.ts) must keep exponential-backoff retry on 429/5xx/529.
      # Guards against incident class #4 (500/529 cascades).
      - name: AI retry parity gate
        run: node scripts/check-ai-retry-parity.mjs

      # Security audit: critical vulns fail CI, others warn.
      - name: Security audit
        run: npm audit --audit-level=critical || echo "::warning::npm audit found vulnerabilities"

      - name: Dependency license check
        run: |
          echo "## Dependency License Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          # List all production dependencies and their licenses
          npx license-checker --production --summary --onlyAllow 'MIT;Apache-2.0;BSD-2-Clause;BSD-3-Clause;ISC;0BSD;CC0-1.0;CC-BY-3.0;CC-BY-4.0;Unlicense;Python-2.0;BlueOak-1.0.0' 2>/dev/null || {
            echo "license-checker not available, falling back to npm ls"
            echo '```' >> $GITHUB_STEP_SUMMARY
            npm ls --all --depth=0 2>&1 | head -60 >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            npm ls --all --depth=0 || true
          }

      - name: Lint
        run: npm run lint

      # Verify Supabase TypeScript types match the live schema.
      # Skips on PRs from forks (no secrets available there).
      # Currently advisory (continue-on-error: true) — flip to blocking after the
      # team has run a clean `npm run supabase:gen-types` locally and committed.
      # TODO: Remove `continue-on-error` once verified stable in CI.
      - name: Verify Supabase types are up to date
        if: github.event.pull_request.head.repo.full_name == github.repository || github.event_name == 'push'
        continue-on-error: true
        env:
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -z "$SUPABASE_PROJECT_ID" ] || [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::warning::SUPABASE_PROJECT_ID or SUPABASE_ACCESS_TOKEN not set. Skipping type sync check."
            echo "Add these repo secrets to enable schema-drift detection on PRs."
            exit 0
          fi
          # Install Supabase CLI if not already on the runner.
          if ! command -v supabase >/dev/null 2>&1; then
            curl -sL https://github.com/supabase/cli/releases/latest/download/supabase_linux_amd64.tar.gz \
              | tar -xz -C /tmp \
              && sudo mv /tmp/supabase /usr/local/bin/supabase
          fi
          npm run supabase:check-types || {
            echo "::error::Supabase types are out of sync with migrations."
            echo "Run \`npm run supabase:gen-types\` locally and commit the result."
            exit 1
          }

      - name: Type check
        run: npm run type-check
        env:
          NODE_OPTIONS: --max-old-space-size=6144

      - name: Run tests with coverage
        # Migration & script integration tests (~19 tests under
        # src/__tests__/migrations/** and src/__tests__/scripts/**) are
        # excluded from this default run by vitest.config.ts — they require a
        # live Supabase backend and run in the separate `integration-tests`
        # job below, gated on real env secrets. This job is therefore a HARD
        # GATE: any failure blocks CI.
        run: npm test -- --reporter=verbose --coverage

      # R15 fix: Explicit auth/identity test gate.
      # Auth tests MUST pass independently — a failure here blocks the entire CI.
      # This ensures unrelated test changes don't mask auth regressions.
      - name: Auth & Identity test gate
        run: |
          echo "## Auth & Identity Test Gate" >> $GITHUB_STEP_SUMMARY
          npx vitest run src/__tests__/auth-*.test.ts src/__tests__/identity-*.test.ts --reporter=verbose 2>&1 | tee /tmp/auth-test-output.txt
          AUTH_EXIT=$?
          PASS_COUNT=$(grep -c '✓' /tmp/auth-test-output.txt || echo "0")
          echo "| Auth tests passed | $PASS_COUNT |" >> $GITHUB_STEP_SUMMARY
          if [ "$AUTH_EXIT" != "0" ]; then
            echo "BLOCKED: Auth/identity tests failed. This is a blocking gate."
            echo "| Status | FAILED |" >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "| Status | PASSED |" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Coverage report
        if: always()
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            echo "## Test Coverage Report" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            # Extract summary percentages
            node -e "
              const c = require('./coverage/coverage-summary.json');
              const t = c.total;
              console.log('Statements: ' + t.statements.pct + '%');
              console.log('Branches:   ' + t.branches.pct + '%');
              console.log('Functions:  ' + t.functions.pct + '%');
              console.log('Lines:      ' + t.lines.pct + '%');
            " >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "Could not parse coverage JSON" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "## Test Coverage Report" >> $GITHUB_STEP_SUMMARY
            echo "Coverage report not generated (install @vitest/coverage-v8 for coverage)." >> $GITHUB_STEP_SUMMARY
          fi

  # ── Step 1a: Edge Function Deno Tests ──
  # Runs the deterministic, offline-safe Deno test suite for Supabase Edge
  # Functions. Previously these tests existed on disk but were NEVER invoked by
  # CI — they only ran on-demand locally. This job wires them into every PR.
  #
  # SCOPE (deliberately narrow — only hermetic, network-free tests):
  #   - parent-portal/__tests__/      (contract.test.ts: reads index.ts as text,
  #                                     asserts the auth-before-dispatch contract)
  #   - teacher-dashboard/__tests__/  (contract.test.ts: same static-source canary)
  #   - daily-cron/__tests__/         (contract.test.ts: static-source canary —
  #                                     pins the cron auth gate, critical steps,
  #                                     Promise.allSettled isolation, flag gating)
  #   - bulk-jee-neet-curated-import/__tests__/validate.test.ts
  #                                     (pure validation helpers — no I/O)
  #   - grounded-answer/__tests__/*   (12 unit files of pure helpers)
  #   - _shared/__tests__/gmail-transport.test.ts
  #                                     (Gmail API transport — offline, injected
  #                                     fetcher, in-process WebCrypto test key;
  #                                     the ONE Deno test in _shared/__tests__)
  #
  # EXCLUDED ON PURPOSE:
  #   - grounded-answer/__tests__/{e2e,pipeline}.test.ts — import index.ts which
  #     calls Deno.serve() (binds a socket → requires --allow-net + has a server
  #     side-effect). Flaky/non-deterministic in CI.
  #   - alfabot-answer, bulk-jee-neet-import/index.test.ts, _shared/__tests__/*
  #     (EXCEPT gmail-transport.test.ts, a Deno test — see SCOPE above),
  #     _shared/mol/__tests__/* — these are VITEST tests (import from 'vitest'),
  #     already covered by the `quality` job's `npm test`, not `deno test`.
  #
  # Permissions are limited to --allow-read (readTextFileSync of index.ts) and
  # --allow-env (some helpers read Deno.env). No --allow-net is granted, which
  # guarantees no test can reach the network. `--no-lock` decouples CI from the
  # repo's deno.lock (left untouched). Same BLOCKING posture as the unit-test
  # `quality` job: a failure here fails CI.
  edge-function-tests:
    name: Edge Function Deno Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.7.14

      - name: Cache Deno module dependencies
        run: |
          # Pre-warm Deno module cache so the offline test step doesn't need --allow-net.
          # deno cache resolves and downloads all remote imports (std@0.210.0/assert,
          # esm.sh/@supabase/supabase-js@2, etc.) and stores them in the Deno cache dir.
          # The test step then runs with only --allow-read --allow-env (no network).
          attempt=1
          while true; do
            if deno cache --no-lock --no-check \
              supabase/functions/parent-portal/__tests__/contract.test.ts \
              supabase/functions/teacher-dashboard/__tests__/contract.test.ts \
              supabase/functions/daily-cron/__tests__/contract.test.ts \
              supabase/functions/scan-ocr/__tests__/contract.test.ts \
              supabase/functions/bulk-jee-neet-curated-import/__tests__/validate.test.ts \
              supabase/functions/send-auth-email/__tests__/always-200.test.ts \
              supabase/functions/_shared/__tests__/gmail-transport.test.ts \
              supabase/functions/grounded-answer/__tests__/cache.test.ts \
              supabase/functions/grounded-answer/__tests__/circuit.test.ts \
              supabase/functions/grounded-answer/__tests__/citations.test.ts \
              supabase/functions/grounded-answer/__tests__/claude.test.ts \
              supabase/functions/grounded-answer/__tests__/confidence.test.ts \
              supabase/functions/grounded-answer/__tests__/coverage.test.ts \
              supabase/functions/grounded-answer/__tests__/embedding.test.ts \
              supabase/functions/grounded-answer/__tests__/grounding-check.test.ts \
              supabase/functions/grounded-answer/__tests__/retrieval.test.ts \
              supabase/functions/grounded-answer/__tests__/trace.test.ts \
              supabase/functions/grounded-answer/__tests__/validation.test.ts \
              supabase/functions/grounded-answer/__tests__/wrap-as-paragraph.test.ts; then
              break
            fi
            if [ "$attempt" -ge 3 ]; then
              echo "::error::Deno module cache pre-warm failed after $attempt attempts."
              exit 1
            fi
            delay=$((attempt * 5))
            echo "::warning::Deno module download failed on attempt $attempt; retrying in ${delay}s."
            sleep "$delay"
            attempt=$((attempt + 1))
          done

      - name: Run Edge Function Deno tests (deterministic, offline)
        run: |
          deno test --no-lock --no-check --allow-read --allow-env \
            supabase/functions/parent-portal/__tests__/ \
            supabase/functions/teacher-dashboard/__tests__/ \
            supabase/functions/export-report/__tests__/ \
            supabase/functions/daily-cron/__tests__/ \
            supabase/functions/scan-ocr/__tests__/ \
            supabase/functions/bulk-jee-neet-curated-import/__tests__/validate.test.ts \
            supabase/functions/send-auth-email/__tests__/always-200.test.ts \
            supabase/functions/_shared/__tests__/gmail-transport.test.ts \
            supabase/functions/_shared/security/__tests__/internal-cron-auth.test.ts \
            supabase/functions/grounded-answer/__tests__/cache.test.ts \
            supabase/functions/grounded-answer/__tests__/circuit.test.ts \
            supabase/functions/grounded-answer/__tests__/citations.test.ts \
            supabase/functions/grounded-answer/__tests__/claude.test.ts \
            supabase/functions/grounded-answer/__tests__/confidence.test.ts \
            supabase/functions/grounded-answer/__tests__/coverage.test.ts \
            supabase/functions/grounded-answer/__tests__/embedding.test.ts \
            supabase/functions/grounded-answer/__tests__/grounding-check.test.ts \
            supabase/functions/grounded-answer/__tests__/retrieval.test.ts \
            supabase/functions/grounded-answer/__tests__/trace.test.ts \
            supabase/functions/grounded-answer/__tests__/validation.test.ts \
            supabase/functions/grounded-answer/__tests__/wrap-as-paragraph.test.ts

  # ── Step 1b: Integration Tests (live Supabase) ──
  # Runs migration/trigger/view/CHECK-constraint tests that require a real
  # Postgres backend. Gated on the presence of repository secrets, so PRs from
  # forks (which don't get secrets) skip cleanly instead of failing.
  # Non-blocking for now; flip `continue-on-error` to false once the staging
  # Supabase instance is reliably reachable from GH-hosted runners.
  integration-tests:
    name: Integration Tests (live DB)
    runs-on: ubuntu-latest
    # Skip on PRs from forked repos: secrets are not available there and the
    # job would always fail boot. Trusted PRs (same-repo) and pushes still run.
    # (Previously also `needs: secret-scan` — removed for the same masking
    # reason documented on the `quality` job above.)
    if: github.event.pull_request.head.repo.full_name == github.repository || github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache node_modules
        id: cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Verify integration secrets are present
        id: check-secrets
        run: |
          if [ -z "${{ secrets.STAGING_SUPABASE_URL }}" ] || [ -z "${{ secrets.STAGING_SUPABASE_SERVICE_ROLE_KEY }}" ]; then
            echo "::error::Trusted integration job requires STAGING_SUPABASE_URL and STAGING_SUPABASE_SERVICE_ROLE_KEY."
            exit 1
          fi
          echo "secrets_present=true" >> "$GITHUB_OUTPUT"

      - name: Run integration tests
        if: steps.check-secrets.outputs.secrets_present == 'true'
        run: npm run test:integration -- --reporter=verbose
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.STAGING_SUPABASE_SERVICE_ROLE_KEY }}
          # B1 RAG eval-harness (Task 8, 2026-06-13). The retrieval-quality harness
          # (run-eval.integration.test.ts) runs the REAL retrieve() full-path only
          # when VOYAGE_API_KEY is present; without it the harness degrades to
          # FTS-only and emits an INCONCLUSIVE verdict — it does NOT fail the job.
          # NOTE (ops/architect prerequisite #1): the VOYAGE_API_KEY repository
          # secret must be PROVISIONED by ops. Until it is, this resolves to empty
          # and integration runs of the harness stay green via the degrade path.
          VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
        # BLOCKING gate restored (2026-05-05). Original audit Gap 5b mandated this
        # be blocking to enforce P8 (RLS boundary) + P9 (RBAC enforcement) against
        # the live staging schema. Was temporarily flipped to continue-on-error: true
        # on 2026-05-05 during PR #534 launch-readiness work while we debugged a
        # staging schema mismatch (rag_chunks_valid_grade CHECK appeared validated
        # but did not enforce on INSERT). Restored to BLOCKING on 2026-05-05 after
        # staging sync proven green on main (12:21 UTC) and PR #534 — Integration
        # Tests (live DB) now pass at ~50s on both. See
        # docs/runbooks/staging-schema-drift-resolution.md for the post-mortem and
        # smoke test to detect the same drift in future.
        continue-on-error: false

  # ── Step 2: Production Build + Bundle Analysis ──
  build:
    name: Production Build
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache node_modules
        id: cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: npm ci

      # Bump Node heap to 6 GB. Default is ~2 GB which the project's bundle
      # has outgrown — surfaced on PR #817 as a deterministic
      # `FATAL ERROR: Reached heap limit Allocation failed - JavaScript heap
      # out of memory` during `next build`. ubuntu-latest runners have 7 GB
      # RAM so 6144 MB leaves comfortable headroom. Vercel-side prod builds
      # already use a higher limit on their own infra; this is just the CI
      # sanity-check gate catching up.
      - name: Build
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=6144

      - name: Bundle size report
        run: |
          echo "## Bundle Size Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # --- Overall build stats ---
          echo "### Build Overview" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY

          BUILD_SIZE=$(du -sh .next/ 2>/dev/null | cut -f1)
          echo "| Total build | $BUILD_SIZE |" >> $GITHUB_STEP_SUMMARY

          PAGES=$(find .next/server -name "*.html" 2>/dev/null | wc -l)
          echo "| Static pages | $PAGES |" >> $GITHUB_STEP_SUMMARY

          CHUNKS=$(find .next/static/chunks -name "*.js" 2>/dev/null | wc -l)
          echo "| JS chunks | $CHUNKS |" >> $GITHUB_STEP_SUMMARY

          # --- Shared JS bundle size ---
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Shared JS Chunks (budget: ${SHARED_JS_LIMIT_KB} kB)" >> $GITHUB_STEP_SUMMARY
          echo "| File | Size (kB) |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----------|" >> $GITHUB_STEP_SUMMARY

          SHARED_TOTAL=0
          for f in $(find .next/static/chunks -maxdepth 1 -name '*.js' -type f 2>/dev/null | sort); do
            SIZE_BYTES=$(wc -c < "$f")
            SIZE_KB=$((SIZE_BYTES / 1024))
            SHARED_TOTAL=$((SHARED_TOTAL + SIZE_KB))
            BASENAME=$(basename "$f")
            echo "| \`$BASENAME\` | ${SIZE_KB} |" >> $GITHUB_STEP_SUMMARY
          done
          echo "| **Total shared** | **${SHARED_TOTAL}** |" >> $GITHUB_STEP_SUMMARY

          # --- Top page bundles ---
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Largest Page Bundles (budget: ${PAGE_JS_LIMIT_KB} kB per page)" >> $GITHUB_STEP_SUMMARY
          echo "| Directory | Size (kB) |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-----------|" >> $GITHUB_STEP_SUMMARY

          PAGE_OVER=0
          if [ -d .next/static/chunks/app ]; then
            for dir in $(find .next/static/chunks/app -mindepth 1 -maxdepth 2 -type d 2>/dev/null | sort); do
              DIR_SIZE_BYTES=$(find "$dir" -name '*.js' -type f -exec wc -c {} + 2>/dev/null | tail -1 | awk '{print $1}')
              if [ -n "$DIR_SIZE_BYTES" ] && [ "$DIR_SIZE_BYTES" -gt 0 ] 2>/dev/null; then
                DIR_SIZE_KB=$((DIR_SIZE_BYTES / 1024))
                DIR_NAME=$(echo "$dir" | sed "s|.next/static/chunks/app/||")
                echo "| /$DIR_NAME | ${DIR_SIZE_KB} |" >> $GITHUB_STEP_SUMMARY
                if [ "$DIR_SIZE_KB" -gt "$PAGE_JS_LIMIT_KB" ]; then
                  PAGE_OVER=1
                fi
              fi
            done
          fi

          # --- Middleware size ---
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Middleware (budget: ${MIDDLEWARE_LIMIT_KB} kB)" >> $GITHUB_STEP_SUMMARY
          if [ -f .next/server/middleware.js ]; then
            MW_BYTES=$(wc -c < .next/server/middleware.js)
            MW_KB=$((MW_BYTES / 1024))
            echo "| middleware.js | ${MW_KB} kB |" >> $GITHUB_STEP_SUMMARY
          else
            MW_KB=0
            echo "| middleware.js | not found |" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY

      - name: Bundle size limit check
        run: |
          # P10 budget check. Rewritten for Next.js 16 / Turbopack output.
          #
          # Previous version summed ALL top-level chunks under .next/static/chunks
          # and compared to a per-page-load budget — a category error that
          # reported ~5 MB (sum of ~250 split chunks) against a 160 kB limit.
          # Turbopack emits fine-grained chunks; summing them measures total
          # codebase size, not what a single page loads.
          #
          # New approach: check the LARGEST individual chunk (a good proxy for
          # the dominant first-load payload) and each per-page bundle size.
          # Keep middleware check unchanged.
          FAIL=0
          WARN=0

          # Largest single shared chunk. P10 budget is gzipped — must compare
          # gzipped against gzipped. Previous version compared raw bytes vs the
          # gzipped budget and emitted false-positive 400+ kB warnings.
          LARGEST_CHUNK_FILE=$(find .next/static/chunks -maxdepth 1 -name '*.js' -type f 2>/dev/null | xargs -I {} sh -c 'echo "$(wc -c < "{}") {}"' | sort -nr | head -1 | awk '{print $2}')
          if [ -n "$LARGEST_CHUNK_FILE" ]; then
            LARGEST_RAW_KB=$(($(wc -c < "$LARGEST_CHUNK_FILE") / 1024))
            LARGEST_GZ_KB=$(($(gzip -c "$LARGEST_CHUNK_FILE" | wc -c) / 1024))
            echo "Largest shared chunk: ${LARGEST_GZ_KB} kB gzipped (${LARGEST_RAW_KB} kB raw) — limit: ${SHARED_JS_LIMIT_KB} kB gzipped"
            if [ "$LARGEST_GZ_KB" -gt "$SHARED_JS_LIMIT_KB" ]; then
              echo "::error::Largest shared chunk is ${LARGEST_GZ_KB} kB gzipped (> ${SHARED_JS_LIMIT_KB} kB). P10 invariant breach. Investigate with 'npm run analyze'."
              FAIL=1
            fi
          fi

          # Middleware size (P10: < 120 kB). Some setups emit a shim file; skip if < 1 kB.
          if [ -f .next/server/middleware.js ]; then
            MW_BYTES=$(wc -c < .next/server/middleware.js)
            MW_KB=$((MW_BYTES / 1024))
            echo "Middleware: ${MW_KB} kB (limit: ${MIDDLEWARE_LIMIT_KB} kB)"
            if [ "$MW_KB" -gt "$MIDDLEWARE_LIMIT_KB" ]; then
              echo "FAIL: Middleware exceeds ${MIDDLEWARE_LIMIT_KB} kB budget (P10)"
              FAIL=1
            fi
          fi

          # Per-page bundles: each page directory's total JS size should be < page budget.
          if [ -d .next/static/chunks/app ]; then
            while IFS= read -r dir; do
              DIR_SIZE_BYTES=$(find "$dir" -name '*.js' -type f -exec wc -c {} + 2>/dev/null | tail -1 | awk '{print $1}')
              if [ -n "$DIR_SIZE_BYTES" ] && [ "$DIR_SIZE_BYTES" -gt 0 ] 2>/dev/null; then
                DIR_SIZE_KB=$((DIR_SIZE_BYTES / 1024))
                DIR_NAME=$(echo "$dir" | sed "s|.next/static/chunks/app/||")
                if [ "$DIR_SIZE_KB" -gt "${PAGE_JS_LIMIT_KB}" ]; then
                  echo "::error::Page /$DIR_NAME is ${DIR_SIZE_KB} kB (limit: ${PAGE_JS_LIMIT_KB} kB). P10 invariant breach."
                  FAIL=1
                fi
              fi
            done < <(find .next/static/chunks/app -mindepth 1 -maxdepth 2 -type d 2>/dev/null)
          fi

          if [ "$FAIL" = "1" ]; then
            echo ""
            echo "Bundle size budget exceeded (blocking). See P10 in CLAUDE.md."
            echo "Run 'npm run analyze' locally to investigate."
            exit 1
          fi

          if [ "$WARN" = "1" ]; then
            echo ""
            echo "::notice::Bundle size warnings emitted (advisory only — all P10 budget breaches now block via FAIL=1)."
          else
            echo "All bundle sizes within budget."
          fi

      # Authoritative per-page first-load JS gate.
      # The bash check above measures raw bytes and only inspects the LARGEST
      # single shared chunk — it misses per-page violations and overstates
      # sizes ~3x by comparing raw to a gzipped budget.
      # check-bundle-size.mjs measures gzipped, uses HTML-scan to detect what's
      # actually shared first-paint (catches root-layout chunks the manifest
      # omits), and reports per-page page-only cost separately. Caps are in the
      # script itself (CAP_SHARED_KB=270 interim, CAP_PAGE_KB=260, CAP_MIDDLEWARE_KB=120).
      - name: First-load JS budget (authoritative, gzipped per-page)
        run: |
          echo "## First-Load JS Budget (gzipped, per-page)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          npm run check:bundle-size 2>&1 | tee /tmp/bundle-report.txt
          BUNDLE_EXIT=${PIPESTATUS[0]}
          tail -40 /tmp/bundle-report.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          if [ "$BUNDLE_EXIT" != "0" ]; then
            echo "BLOCKED: Per-page first-load JS exceeds budget. See report above and P10 in CLAUDE.md." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: nextjs-build
          path: |
            .next/
            !.next/cache/
          retention-days: 3

  # ── Step 2b: E2E Tests (PRs only) ──
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Cache node_modules
        id: cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: npm ci
      - name: Download build artifact
        uses: actions/download-artifact@v7
        with:
          name: nextjs-build
          path: .next/
      - run: npx playwright install --with-deps chromium
      - name: Run E2E tests
        run: npx playwright test --project=chromium
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ env.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ env.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        # ADVISORY UNTIL 2026-04-27. Audit 2026-04-27 F23 / F9.
        # TODO: flip to blocking after legacy E2E flake cleanup. The new
        # `e2e-critical-paths` job below IS BLOCKING and covers the
        # must-not-break paths (quiz happy path REG-45, payment checkout
        # REG-46), so this advisory does not weaken release safety.
        continue-on-error: true
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ── Step 2c: Critical-path E2E (BLOCKING) ──
  # Audit finding F9: the legacy `e2e` job above is `continue-on-error: true`
  # because it has known flakes; cleanup is a separate session. This new job
  # runs ONLY the two highest-blast-radius specs (quiz happy path, payment
  # checkout) and IS BLOCKING. A scoring or Razorpay regression must not ship
  # through CI green.
  #
  # Catalog entries: REG-45 (quiz), REG-46 (payment) — see
  # `.claude/regression-catalog.md`.
  e2e-critical-paths:
    name: E2E Critical Paths (blocking)
    runs-on: ubuntu-latest
    needs: build
    # Only run on PRs targeting main/staging branches. Don't slow down feature
    # branches that haven't proposed a merge yet. Skip on forked PRs (no
    # secrets) — when staging fixtures are wired in, this `if` should also
    # require the same-repo guard used by the integration-tests job.
    if: |
      github.event_name == 'pull_request' &&
      (github.base_ref == 'main' || github.base_ref == 'master' || github.base_ref == 'staging') &&
      github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Cache node_modules
        id: cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: npm ci
      - name: Download build artifact
        uses: actions/download-artifact@v7
        with:
          name: nextjs-build
          path: .next/
      - run: npx playwright install --with-deps chromium

      - name: Run critical-path E2E specs
        # BLOCKING — no continue-on-error. Tests that need a live test-user
        # fixture are registered with `test.fixme()` so they don't fail the
        # suite while the fixture is being wired (audit F9 follow-up). The
        # spec FILES must parse and any non-fixme tests must pass.
        #
        # BASE_URL points at the deployed production domain so we don't need
        # to run a dev server in CI. Login goes through real Supabase Auth
        # (validates the auth flow); RPC calls are intercepted by page.route()
        # in the spec, so quiz/payment business logic is asserted against
        # deterministic mocked responses (P1/P2/P3 invariant pinning).
        run: npx playwright test e2e/quiz-happy-path.spec.ts e2e/payment-checkout.spec.ts
        env:
          BASE_URL: 'https://alfanumrik.com'
          # Real-auth path: when these secrets are present, the `test.fixme`
          # guards in the specs flip off and the tests drive a live student
          # session. Until then, the specs run their mocked-only assertions
          # and skip the real-auth branches via fixme.
          TEST_STUDENT_EMAIL: ${{ secrets.TEST_STUDENT_EMAIL }}
          TEST_STUDENT_PASSWORD: ${{ secrets.TEST_STUDENT_PASSWORD }}

      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-critical-paths-traces
          path: |
            test-results/
            playwright-report/
          retention-days: 14

  # ── Step 3: Post-deploy health check (main branch only) ──
  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    if: always()
    needs:
      - secret-scan
      - selected-school-rpc-integration
      - quality
      - edge-function-tests
      - integration-tests
      - build
      - e2e
      - e2e-critical-paths
    steps:
      - name: Enforce required CI outcomes
        env:
          EVENT_NAME: ${{ github.event_name }}
          SAME_REPOSITORY_PR: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          node <<'NODE'
          const needs = JSON.parse(process.env.NEEDS_JSON || '{}');
          const required = ['secret-scan','selected-school-rpc-integration','quality','edge-function-tests','integration-tests','build'];
          const forkSkips = [];
          if (process.env.EVENT_NAME === 'pull_request') {
            required.push('e2e');
            if (process.env.SAME_REPOSITORY_PR === 'true') {
              required.push('e2e-critical-paths');
            } else {
              required.splice(required.indexOf('integration-tests'), 1);
              forkSkips.push('integration-tests', 'e2e-critical-paths');
            }
          }
          const failures = required.filter((job) => needs[job]?.result !== 'success');
          failures.push(...forkSkips.filter((job) => needs[job]?.result !== 'skipped'));
          if (failures.length) {
            console.error('CI Gate failed: ' + failures.map((job) => job + '=' + (needs[job]?.result || 'missing')).join(', '));
            process.exit(1);
          }
          console.log('CI Gate passed.');
          NODE

  health-check:
    name: Post-Deploy Health Check
    runs-on: ubuntu-latest
    timeout-minutes: 12
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Poll canonical production for healthy exact SHA
        # Production is served from the canonical alfanumrik.com domain.
        # The .vercel.app subdomain is not aliased to this project and 404s —
        # was a past source of false health-check failures in CI.
        #
        # Fail closed unless canonical production reports healthy exact SHA.
        env:
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          TARGET_URL="https://alfanumrik.com/api/v1/health"
          EXPECTED_SHA="${GITHUB_SHA:0:7}"
          POLL_WINDOW_SECONDS=600
          DEADLINE=$((SECONDS + POLL_WINDOW_SECONDS))
          ATTEMPT=0
          LAST_STATUS=""
          if [ -z "$VERCEL_AUTOMATION_BYPASS_SECRET" ]; then
            echo "::error::Bypass secret is required for CI production verification."
            exit 1
          fi
          BYPASS_HEADER=(-H "x-vercel-protection-bypass: $VERCEL_AUTOMATION_BYPASS_SECRET")
          set +e
          while [ "$SECONDS" -lt "$DEADLINE" ]; do
            ATTEMPT=$((ATTEMPT + 1))
            # Capture body and status WITHOUT piping into head/tail. Writing into
            # a `head` that exits early closes the pipe and produces the
            # "echo: write error: Broken pipe" seen in the old loop. Use a
            # plain temp file + curl's own %{http_code} instead.
            HEADERS_FILE=$(mktemp)
            BODY_FILE=$(mktemp)
            BODY=$(curl -sS -m 10 -D "$HEADERS_FILE" -o "$BODY_FILE" -w "%{http_code}" \
              -A "Alfanumrik-CI-HealthCheck/1.0 (+https://alfanumrik.com; vercel-monitoring)" \
              -H "Accept: application/json" \
              -H "x-health-probe: github-actions" \
              "${BYPASS_HEADER[@]}" \
              "$TARGET_URL" 2>/dev/null)
            CURL_EXIT=$?
            STATUS="$BODY"
            LAST_STATUS="$STATUS"

            if [ "$CURL_EXIT" != "0" ]; then
              echo "Attempt $ATTEMPT: curl failed (exit $CURL_EXIT)"
              LAST_STATUS="curl-exit-$CURL_EXIT"
              rm -f "$HEADERS_FILE" "$BODY_FILE"
              REMAINING=$((DEADLINE - SECONDS))
              if [ "$REMAINING" -le 0 ]; then break; fi
              SLEEP_SECONDS=20
              if [ "$REMAINING" -lt "$SLEEP_SECONDS" ]; then SLEEP_SECONDS="$REMAINING"; fi
              sleep "$SLEEP_SECONDS"
              continue
            fi

            if [ "$STATUS" = "200" ]; then
              HEALTHY=$(node -e "const fs=require('fs');try{const b=JSON.parse(fs.readFileSync(process.argv[1],'utf8'));process.stdout.write(String(b.ok===true&&b.status==='healthy'))}catch{process.stdout.write('false')}" "$BODY_FILE")
              DEPLOYED_SHA=$(node -e "const fs=require('fs');try{const b=JSON.parse(fs.readFileSync(process.argv[1],'utf8'));process.stdout.write(String(b.version?.git_sha||''))}catch{process.stdout.write('')}" "$BODY_FILE")
              if [ "$HEALTHY" = "true" ] && [ "$DEPLOYED_SHA" = "$EXPECTED_SHA" ]; then
                rm -f "$HEADERS_FILE" "$BODY_FILE"
                exit 0
              fi
            fi

            echo "Attempt $ATTEMPT did not prove healthy exact SHA (http=$STATUS)."
            rm -f "$HEADERS_FILE" "$BODY_FILE"
            REMAINING=$((DEADLINE - SECONDS))
            if [ "$REMAINING" -le 0 ]; then break; fi
            SLEEP_SECONDS=20
            if [ "$REMAINING" -lt "$SLEEP_SECONDS" ]; then SLEEP_SECONDS="$REMAINING"; fi
            sleep "$SLEEP_SECONDS"
          done

          echo "::error::Healthy exact SHA $EXPECTED_SHA was not observed within the bounded polling window (last=$LAST_STATUS)."
          exit 1
