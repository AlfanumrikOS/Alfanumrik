title = "Alfanumrik gitleaks configuration"

# Extend the default gitleaks ruleset; only ADD path-based allowlists for
# test fixtures that intentionally use PII-shaped sentinel strings to verify
# our redactor catches them.

[extend]
useDefault = true

[allowlist]
description = "PII test sentinels — intentional fake values for redactor verification"
# 2026-07-20 (PR #1352): CI placeholder JWT used in workflow env blocks
# (ci.yml + deploy-staging.yml line 19 as NEXT_PUBLIC_SUPABASE_ANON_KEY;
# deploy-production.yml line 524 references it in a grep guard, and a JSDoc
# in apps/host/src/__tests__/helpers/integration.ts quotes it verbatim).
# It is a JWT *header* segment plus the literal
# ".placeholder" — NOT a credential (a real Supabase key has base64 payload +
# signature segments). generic-api-key flagged it only because a CRLF→LF
# normalization rewrote deploy-staging.yml, making the pre-existing line
# appear newly added. VALUE-scoped (not path-scoped: path-allowlisting
# workflow files could hide future real leaks) and anchored ^…$ so a real
# token that merely shares the standard JWT-header prefix cannot hide behind
# it. A fingerprint ignore was rejected — it would not survive
# squash-merge SHA changes. regexTarget is intentionally unset: the default
# target is the captured SECRET (gitleaks v8.24.3 detect.go).
regexes = [
    '^eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9\.placeholder$',
]
paths = [
    'src/__tests__/ai-prompt-pii\.test\.ts',
    'src/__tests__/sentry-pii-redaction\.test\.ts',
    'src/__tests__/sentry/.*\.test\.ts',
    'apps/host/src/__tests__/audit\.test\.ts',
    # Analytics P13 redactor spec — injects fake JWT / card-number /
    # Razorpay-signature sentinels into a funnel payload to prove the two-pass
    # redactor scrubs the VALUES before either analytics backend sees them.
    # No real credential; the scrub assertions depend on these exact fake
    # strings, so they cannot be changed. Path-scoped, single-file only.
    'apps/host/src/__tests__/analytics/posthog-identity-p13\.test\.ts',
    '\.agents/skills/upstash-qstash-js/fundamentals/local-development\.md',
    '\.agents/skills/upstash/upstash-qstash-js/fundamentals/local-development\.md',
    # Keyless Vercel-OIDC -> Workload Identity Federation invoker-token client.
    # The generic-api-key rule prose-false-positives on the "STS/impersonation"
    # phrase (the word "token" adjacent to a `/`-containing value) in a JSDoc
    # block and an inline comment. This client mints an EPHEMERAL runtime Google
    # ID token against a public Google endpoint — it is keyless by design and
    # contains NO literal secret, so allowlisting the file hides no real credential.
    # Path-scoped (commit-independent) because fingerprint suppression re-breaks
    # whenever the finding's commit SHA moves. Single-file scope only.
    'packages/lib/src/ai/clients/python-mol\.ts',
    # Analytics Wave 2 funnel-completion specs — fake fixtures for the
    # redactor / distinct-id hash-parity tests. These inject secret-shaped
    # sentinels (fake auth UUIDs like 3f2504e0-…, a `phc_test_key` PostHog
    # placeholder, and a precomputed 16-hex SHA-256 truncation anchor) precisely
    # BECAUSE the suites prove our hashing + person-property allowlist scrub the
    # VALUES. No real credential; the assertions depend on these exact fake
    # strings, so they cannot be changed. Path-scoped, single-file each.
    'apps/host/src/__tests__/analytics/wave2-role-person-prop\.test\.ts',
    'apps/host/src/__tests__/analytics/wave2-hash-parity\.test\.ts',
    'apps/host/src/__tests__/lib/identity/complete-signup-email-verified\.test\.ts',
    'apps/host/src/__tests__/lib/quiz/submit-side-effects-quiz-graded-stitch\.test\.ts',
]
