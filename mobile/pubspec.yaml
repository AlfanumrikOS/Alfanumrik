name: alfanumrik
description: Alfanumrik — Smart CBSE Learning for Indian Students
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter

  # Supabase — Auth, DB, Realtime
  supabase_flutter: ^2.3.0

  # State Management — Lightweight, compile-safe
  flutter_riverpod: ^2.4.9

  # Navigation — Declarative, deep linking
  go_router: ^13.0.0

  # Networking
  dio: ^5.4.0
  connectivity_plus: ^5.0.2

  # Local Storage — Fast NoSQL cache
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2

  # UI
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.9
  google_fonts: ^6.1.0

  # Razorpay Payment
  razorpay_flutter: ^1.3.6

  # Utilities
  intl: ^0.19.0
  equatable: ^2.0.5
  json_annotation: ^4.8.1
  url_launcher: ^6.2.2
  uuid: ^4.3.3

  # WebView — STEM Lab Phase 1 mobile parity (Tier 3 R12).
  # Wraps /stem-centre so 119 simulations + lab streak + coin rewards
  # are reachable on mobile without porting each sim natively. Phase 2
  # will replace the most-used sims with native Flutter widgets.
  webview_flutter: ^4.7.0

  # Crash + error observability. Without this, mobile crashes go to
  # logcat only — opaque to ops. DSN is injected at build time via
  # --dart-define=SENTRY_DSN=... ; if unset (e.g. local dev) the SDK
  # is initialised in disabled mode so the app still launches.
  sentry_flutter: ^8.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: Sora
      fonts:
        - asset: assets/fonts/Sora-Regular.ttf
        - asset: assets/fonts/Sora-Medium.ttf
          weight: 500
        - asset: assets/fonts/Sora-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Sora-Bold.ttf
          weight: 700
