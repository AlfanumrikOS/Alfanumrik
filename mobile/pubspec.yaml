name: alfanumrik
description: Alfanumrik — Smart CBSE Learning for Indian Students
publish_to: 'none'
version: 1.1.0+2

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter

  # Supabase — Auth, DB, Realtime
  supabase_flutter: ^2.3.0

  # State Management — Lightweight, compile-safe
  flutter_riverpod: ^2.4.9

  # Navigation — Declarative, deep linking
  go_router: ^13.0.0

  # Networking
  dio: ^5.4.0
  connectivity_plus: ^5.0.2

  # Generated /v2 contract client (built_value-based, dart-dio). Lives in-tree
  # at lib/api/v2 with its own pubspec; regenerated from the OpenAPI spec via
  # `npm run gen:dart` (Phase 2 Wave 2.1 codegen pipeline). The .g.dart
  # serializers are emitted by `dart run build_runner build` against THAT
  # package before this app compiles — see lib/api/v2/README.md.
  alfanumrik_api_v2:
    path: lib/api/v2

  # Transitive deps the generated client needs at the app level so build_runner
  # and the analyzer resolve the built_value serializers.
  built_value: ^8.9.0
  built_collection: ^5.1.1
  one_of: ^1.5.0
  one_of_serializer: ^1.5.0

  # Local Storage — Fast NoSQL cache
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2

  # UI
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.9
  google_fonts: ^6.1.0

  # Camera / gallery capture — Scan & Solve (Phase 6 sub-phase 8).
  #
  # image_picker is the ONLY new runtime dependency this feature needs.
  # Deliberately NOT paired with permission_handler: on Android, image_picker
  # launches the system camera app via ACTION_IMAGE_CAPTURE and the system
  # photo picker for gallery — both prompt for (or entirely avoid) the runtime
  # permission themselves. Adding permission_handler would force us to DECLARE
  # permissions we never actually need, which is a Play Store data-safety
  # liability, not a fix.
  #
  # Downsizing (Indian 4G, 2-5 Mbps): every capture goes through
  # `maxWidth`/`maxHeight`/`imageQuality` so we never upload a 12MP original.
  # See `ScanCaptureConfig` in lib/data/models/scan_solve_models.dart —
  # /api/scan-solve rejects anything over 5MB on its multipart branch.
  image_picker: ^1.0.7

  # Razorpay Payment
  razorpay_flutter: ^1.3.6

  # Utilities
  intl: ^0.19.0
  equatable: ^2.0.5
  json_annotation: ^4.8.1
  url_launcher: ^6.2.2
  uuid: ^4.3.3

  # WebView — STEM Lab Phase 1 mobile parity (Tier 3 R12).
  # Wraps /stem-centre so 119 simulations + lab streak + coin rewards
  # are reachable on mobile without porting each sim natively. Phase 2
  # will replace the most-used sims with native Flutter widgets.
  webview_flutter: ^4.7.0

  # Crash + error observability. Without this, mobile crashes go to
  # logcat only — opaque to ops. DSN is injected at build time via
  # --dart-define=SENTRY_DSN=... ; if unset (e.g. local dev) the SDK
  # is initialised in disabled mode so the app still launches.
  sentry_flutter: ^8.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Physical-device benchmark harness (Option A gate — see
  # docs/benchmark-runbook.md). Both are Flutter-SDK dev packages used ONLY by
  # `flutter drive` timeline capture:
  #   * integration_test — provides IntegrationTestWidgetsFlutterBinding +
  #     binding.traceAction() timeline capture for the jank drivers in
  #     integration_test/.
  #   * flutter_driver — provides Timeline / TimelineSummary, consumed by
  #     test_driver/perf_driver.dart to summarize the captured timeline and
  #     emit the jank JSON.
  # APK / method-count impact: ZERO. dev_dependencies are never linked into a
  # `flutter build apk/appbundle --release` artifact — they only exist in the
  # throwaway `--profile` build that `flutter drive` spins up on the device.
  # The shipping v1.1.0+2 release AAB is byte-unaffected by adding these.
  integration_test:
    sdk: flutter
  flutter_driver:
    sdk: flutter

  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  hive_generator: ^2.0.1
  # NOTE: the /v2 client's built_value serializers are generated INSIDE the
  # lib/api/v2 package (it declares its own built_value_generator + build_runner
  # in lib/api/v2/pubspec.yaml). build_runner does not build path-dependency
  # packages from this app root, so no built_value_generator is needed here.

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: Sora
      fonts:
        - asset: assets/fonts/Sora-Regular.ttf
        - asset: assets/fonts/Sora-Medium.ttf
          weight: 500
        - asset: assets/fonts/Sora-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Sora-Bold.ttf
          weight: 700
