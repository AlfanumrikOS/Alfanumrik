include: package:flutter_lints/flutter.yaml

linter:
  rules:
    prefer_const_constructors: true
    prefer_const_declarations: true
    avoid_unnecessary_containers: true
    sized_box_for_whitespace: true
    use_key_in_widget_constructors: true
    prefer_final_locals: true
    avoid_print: true

analyzer:
  errors:
    missing_required_param: error
    missing_return: error
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    # Generated /v2 dart-dio client package (own pubspec + analysis_options).
    # Excluded from the app analyzer so its OpenAPI-generated source isn't held
    # to the app's stricter lints. The package is analyzed on its own terms.
    - "lib/api/v2/**"
