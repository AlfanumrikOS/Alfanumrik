plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

// Release signing: load key.properties ONLY if present.
// In CI (mobile-ci.yml `flutter build apk --debug`) and local dev this file is
// ABSENT, so keystoreProperties stays empty and the release buildType falls back
// to the debug signing config below. The Play Store release workflow writes
// key.properties + the .jks from CI secrets before `flutter build appbundle --release`.
def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
def hasReleaseKeystore = keystorePropertiesFile.exists()
if (hasReleaseKeystore) {
    keystorePropertiesFile.withReader('UTF-8') { reader ->
        keystoreProperties.load(reader)
    }
}

android {
    namespace "com.alfanumrik.student"
    compileSdk flutter.compileSdkVersion
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.alfanumrik.student"
        // Bumped 21 -> 24 (2026-07-22): image_picker_android 0.8.13+19 (pulled in
        // by image_picker ^1.0.7, added this session for Scan & Solve) declares
        // minSdk=24 in its own AAR. AGP's manifest merger hard-fails
        // ("uses-sdk:minSdkVersion 21 cannot be smaller than version 24 declared
        // in library [:image_picker_android]") if the app minSdk stays below a
        // library's minSdk — there is no manifest-merge override for this
        // attribute. API 24 = Android 7.0 (2016); negligible marketshare loss.
        minSdkVersion 24
        targetSdkVersion flutter.targetSdkVersion
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName

        // Enable multidex for 64K method limit
        multiDexEnabled true
    }

    signingConfigs {
        // Populated only when key.properties exists. The block is always declared
        // so `signingConfigs.release` resolves at configuration time, but it points
        // at real credentials only on the release machine (CI with secrets, or a
        // developer who copied key.properties). With no key.properties present the
        // values are null and this config is never referenced (see buildTypes.release).
        release {
            if (hasReleaseKeystore) {
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
                storeFile keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
                storePassword keystoreProperties['storePassword']
            }
        }
    }

    buildTypes {
        release {
            // Enable code shrinking + obfuscation
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'

            // Sign with the real upload key when key.properties is present;
            // otherwise fall back to debug signing so unsigned CI/local release
            // builds (and the debug build) still succeed without a keystore.
            signingConfig hasReleaseKeystore ? signingConfigs.release : signingConfigs.debug
        }

        debug {
            minifyEnabled false
            shrinkResources false
        }
    }

    // ABI splitting is driven by the Flutter CLI, not a manual splits block:
    // use `flutter build apk --split-per-abi` for per-ABI APKs, or `flutter build appbundle`
    // (AAB) for Play Store releases where Google Play does per-device ABI delivery server-side.
    // A manual splits.abi block conflicts with Flutter-injected ndk.abiFilters (AGP forbids both).

    // Optimize APK size
    packagingOptions {
        exclude 'META-INF/DEPENDENCIES'
        exclude 'META-INF/LICENSE'
        exclude 'META-INF/NOTICE'
    }

    lint {
        disable 'InvalidPackage'
    }
}

flutter {
    source '../..'
}

dependencies {
    implementation 'androidx.multidex:multidex:2.0.1'
}
